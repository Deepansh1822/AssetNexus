<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Profile | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/public/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="/public/js/layout-loader.js" defer></script>
    <style>
        .profile-header-img img { width: 120px; height: 120px; border-radius: 20px; object-fit: cover; border: 4px solid var(--primary); box-shadow: var(--card-shadow); }
        .emp-meta-badges { display: flex; gap: 0.75rem; margin-top: 1.25rem; flex-wrap: wrap; }
        .badge-pill { padding: 0.5rem 1.25rem; border-radius: 12px; font-size: 0.8rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.6rem; border: 1px solid transparent; }
        .badge-email { background: rgba(56, 189, 248, 0.08); color: #38bdf8; border-color: rgba(56, 189, 248, 0.2); }
        .badge-phone { background: rgba(232, 121, 249, 0.08); color: #e879f9; border-color: rgba(232, 121, 249, 0.2); }
        .badge-dept { background: rgba(99, 102, 241, 0.08); color: var(--primary); border-color: rgba(99, 102, 241, 0.2); }
        .badge-role-admin { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }
        .badge-role-emp { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; }
        .stats-mini-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 2rem; }
    </style>
</head>

<body data-page="employees">
    <div class="app-container">
        <!-- Sidebar container -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar container -->
            <div id="topbar-container"></div>

            <div class="dashboard-scrollable">
                <section class="welcome-section" style="display: flex; gap: 2rem; align-items: flex-end; flex-wrap: wrap;">
                    <div class="profile-header-img">
                        <img id="empLargeImg" src="https://ui-avatars.com/api/?name=User&size=120" alt="Employee Photo">
                    </div>
                    <div style="flex: 1;">
                        <p style="text-transform: uppercase; font-size: 0.75rem; font-weight: 700; color: var(--primary); letter-spacing: 0.05em; margin-bottom: 0.5rem;">Employee Profile</p>
                        <h1 style="margin: 0;"><span id="empName">Loading...</span></h1>
                        <p style="margin: 0.25rem 0 0.75rem 0; color: var(--text-muted);"><i class="fas fa-briefcase" style="margin-right:0.4rem;"></i><span id="empRole">---</span></p>
                        <div class="emp-meta-badges">
                            <span id="empEmailBadge" class="badge-pill badge-email"><i class="fas fa-envelope"></i> ---</span>
                            <span id="empPhoneBadge" class="badge-pill badge-phone"><i class="fas fa-phone"></i> ---</span>
                            <span id="empDeptBadge" class="badge-pill badge-dept"><i class="fas fa-building"></i> ---</span>
                            <span id="empAccessRole" class="badge-pill"><i class="fas fa-shield-alt"></i> ---</span>
                            <span id="empIdBadge" class="badge-pill" style="background:rgba(148,163,184,0.08); color:#94a3b8;"><i class="fas fa-id-badge"></i> ID: ---</span>
                        </div>
                    </div>
                    <div class="header-actions">
                        <button class="btn-secondary" onclick="window.history.back()"><i class="fas fa-arrow-left"></i> Back</button>
                        <a href="#" id="editEmpBtn" class="btn-primary" style="display:none; text-decoration:none;"><i class="fas fa-edit"></i> Update</a>
                    </div>
                </section>

                <div class="stats-mini-grid">
                    <div class="card glass" style="padding:1.5rem; display:flex; align-items:center; gap:1rem;">
                        <div class="kpi-icon blue" style="width:40px; height:40px;"><i class="fas fa-box"></i></div>
                        <div><h3 style="margin:0; font-size:0.9rem; color:var(--text-muted);">Assigned Assets</h3><p id="assignedCount" style="margin:0; font-size:1.5rem; font-weight:700;">0</p></div>
                    </div>
                    <div class="card glass" style="padding:1.5rem; display:flex; align-items:center; gap:1rem;">
                        <div class="kpi-icon indigo" style="width:40px; height:40px;"><i class="fas fa-tools"></i></div>
                        <div><h3 style="margin:0; font-size:0.9rem; color:var(--text-muted);">Service Requests</h3><p id="requestCount" style="margin:0; font-size:1.5rem; font-weight:700;">0</p></div>
                    </div>
                </div>

                <section class="card glass" style="margin-top:2rem;">
                    <div class="card-header"><h2 style="margin:0;"><i class="fas fa-check-double" style="margin-right:0.5rem; color:var(--primary);"></i>Currently Assigned Assets</h2></div>
                    <div class="table-responsive">
                        <table class="assets-table">
                            <thead><tr><th>Asset</th><th>Tag</th><th>Category</th><th>Assigned On</th><th>Status</th></tr></thead>
                            <tbody id="assignedAssetsBody"><tr><td colspan="5" style="text-align:center;">No assets assigned</td></tr></tbody>
                        </table>
                    </div>
                </section>

                <section class="card glass" style="margin-top:2rem;">
                    <div class="card-header"><h2 style="margin:0;"><i class="fas fa-history" style="margin-right:0.5rem; color:var(--primary);"></i>Assignment History</h2></div>
                    <div class="table-responsive">
                        <table class="assets-table">
                            <thead><tr><th>Asset</th><th>Tag</th><th>Assigned On</th><th>Returned On</th><th>Status</th></tr></thead>
                            <tbody id="empHistoryBody"><tr><td colspan="5" style="text-align:center;">No history found</td></tr></tbody>
                        </table>
                    </div>
                </section>
                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8085/api';
        const urlParams = new URLSearchParams(window.location.search);
        const empId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!empId) { window.location.href = '/employees.html'; return; }

            try {
                const userRes = await fetch(`${API_BASE}/auth/me`);
                const user = await userRes.json();
                if (user.userRole === 'ADMIN') {
                    const btn = document.getElementById('editEmpBtn');
                    btn.href = `/update-employee.html?id=${empId}`;
                    btn.style.display = 'inline-flex';
                }

                loadProfile();
                loadAssets();
                loadHistory();
                loadRequests();
            } catch (err) { window.location.href = '/login.html'; }
        });

        async function loadProfile() {
            const res = await fetch(`${API_BASE}/employees/${empId}`);
            const emp = await res.json();
            document.getElementById('empName').textContent = emp.name;
            document.getElementById('empRole').textContent = emp.role || 'Employee';
            document.getElementById('empEmailBadge').innerHTML = `<i class="fas fa-envelope"></i> ${emp.email}`;
            document.getElementById('empPhoneBadge').innerHTML = `<i class="fas fa-phone"></i> ${emp.phone || 'N/A'}`;
            document.getElementById('empDeptBadge').innerHTML = `<i class="fas fa-building"></i> ${emp.department || 'General'}`;
            document.getElementById('empIdBadge').innerHTML = `<i class="fas fa-id-badge"></i> ID: ${emp.systemId || 'N/A'}`;
            
            const roleBadge = document.getElementById('empAccessRole');
            roleBadge.innerHTML = `<i class="fas fa-shield-alt"></i> ${emp.userRole || 'EMPLOYEE'}`;
            roleBadge.className = `badge-pill ${emp.userRole === 'ADMIN' ? 'badge-role-admin' : 'badge-role-emp'}`;

            if (emp.hasImage) document.getElementById('empLargeImg').src = `${API_BASE}/employees/${emp.id}/image`;
        }

        async function loadAssets() {
            const res = await fetch(`${API_BASE}/assets`);
            const assets = await res.json();
            const assigned = assets.filter(a => a.employee?.id == empId);
            document.getElementById('assignedCount').textContent = assigned.length;
            
            if (assigned.length > 0) {
                document.getElementById('assignedAssetsBody').innerHTML = assigned.map(a => `
                    <tr>
                        <td><a href="/asset-details.html?id=${a.id}" style="text-decoration:none; color:inherit; font-weight:600;">${a.name}</a></td>
                        <td><span class="a-tag">#${a.assetTag}</span></td>
                        <td>${a.category?.name || '---'}</td>
                        <td>${a.assignmentDate ? new Date(a.assignmentDate).toLocaleDateString() : '---'}</td>
                        <td><span class="status-badge ${a.status.toLowerCase().replace('_', '-')}">${a.status}</span></td>
                    </tr>
                `).join('');
            }
        }

        async function loadHistory() {
            const res = await fetch(`${API_BASE}/reports/employee/${empId}`);
            const history = await res.json();
            if (history.length > 0) {
                document.getElementById('empHistoryBody').innerHTML = history.sort((a,b) => new Date(b.assignedDate) - new Date(a.assignedDate)).map(r => `
                    <tr>
                        <td><a href="/asset-details.html?id=${r.asset.id}" style="text-decoration:none; color:inherit;">${r.asset.name}</a></td>
                        <td>#${r.asset.assetTag}</td>
                        <td>${new Date(r.assignedDate).toLocaleDateString()}</td>
                        <td>${r.returnedDate ? new Date(r.returnedDate).toLocaleDateString() : '<span style="color:var(--primary);">Active</span>'}</td>
                        <td><span class="status-badge ${r.returnedDate ? 'disposed' : 'in-use'}">${r.returnedDate ? 'RETURNED' : 'HELD'}</span></td>
                    </tr>
                `).join('');
            }
        }

        async function loadRequests() {
            const res = await fetch(`${API_BASE}/maintenance/employee/${empId}`);
            const requests = await res.json();
            document.getElementById('requestCount').textContent = requests.length;
        }
    </script>
</body>
</html>
