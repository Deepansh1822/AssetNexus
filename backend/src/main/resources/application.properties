# Application Name Configuration
spring.application.name=AssetManagement

# Port Configuration
server.port=8085
# server.port=${PORT:8085}

# H2 Console and Database Configuration
spring.h2.console.enabled=true
spring.datasource.url=jdbc:mysql://localhost:3306/assetsdb
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=Deepansh
spring.datasource.password=Deepansh@18
# spring.datasource.url=${DB_URL}
# spring.datasource.username=${DB_USER}
# spring.datasource.password=${DB_PASS}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Maximum File Upload Size
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=20MB

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.in.sfp.main=DEBUG
    
# Frontend Configuration (Integrated Static Serving)
spring.web.resources.static-locations=file:../frontend/
spring.thymeleaf.cache=false
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-binding-errors=always

