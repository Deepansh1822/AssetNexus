<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Work Order | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/public/js/layout-loader.js" defer></script>
</head>

<body class="loading" data-page="site-management" data-module="labour">
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="topbar-container"></div>
            <div class="dashboard-scrollable">

                <section class="welcome-section"
                    style="width: 100%; margin: 0 auto 1rem; padding-left: 1rem; display: flex; align-items: center; gap: 1rem;">
                    <div
                        style="width: 45px; height: 45px; background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                        <i class="fas fa-microchip"></i>
                    </div>
                    <div>
                        <h1
                            style="margin:0; font-size: 1.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px;">
                            Assign Work Order</h1>
                        <p style="margin:0; font-size:0.9rem; color:var(--text-muted);">Authorized deployment and
                            critical path assignment.</p>
                    </div>
                </section>

                <div class="card"
                    style="width: 100%; margin: 0 auto; padding: 2rem; border-radius: 20px; border: 1px solid #e2e8f0; background: #ffffff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
                    <form id="workOrderForm" class="standard-form">

                        <h3
                            style="font-size:0.9rem; font-weight:700; margin-bottom:1.5rem; color:#475569; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid #f1f5f9; padding-bottom:0.75rem;">
                            <i class="fas fa-bullseye"></i> Milestone Objective & Target
                        </h3>

                        <div
                            style="display: grid; grid-template-columns: 2fr 1fr 1.25fr; gap: 1.5rem; align-items: flex-start;">
                            <div class="form-group">
                                <label
                                    style="margin-bottom:0.5rem; display:block; font-weight:600; font-size:0.85rem; color:#64748b;">Title
                                    / Milestone</label>
                                <input type="text" name="title" placeholder="e.g., Structural Steel Erection" required
                                    style="width:100%; height:45px; border-radius:10px; padding:0 0.75rem; border:1px solid #cbd5e1; font-size:0.95rem; font-weight:700; background:white;">
                            </div>

                            <div class="form-group">
                                <label
                                    style="margin-bottom:0.5rem; display:block; font-weight:600; font-size:0.85rem; color:#64748b;">Target
                                    Project Site</label>
                                <select id="siteSelect" name="siteId" required
                                    style="width:100%; height:45px; border-radius:10px; padding:0 0.75rem; border:1px solid #cbd5e1; background:white; font-size:0.9rem; font-weight:600;">
                                    <option value="">Locating Sites...</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label
                                    style="margin-bottom:0.5rem; display:block; font-weight:600; font-size:0.85rem; color:#64748b;">Work
                                    Category</label>
                                <select name="category" id="categorySelect" required onchange="toggleCustomCategory()"
                                    style="width:100%; height:45px; border-radius:10px; padding:0 0.75rem; border:1px solid #cbd5e1; background:white; font-size:0.9rem; font-weight:600;">
                                    <option value="CIVIL">Civil Works</option>
                                    <option value="ELECTRICAL">Electrical Grid</option>
                                    <option value="PLUMBING">Fluid Systems</option>
                                    <option value="FINISHING">Architectural Finishing</option>
                                    <option value="HVAC">HVAC / Fire Controls</option>
                                    <option value="CUSTOM">-- Other / Specify --</option>
                                </select>
                                <input type="text" id="customCategory" placeholder="Specify Category..."
                                    style="display:none; width:100%; height:45px; margin-top:0.75rem; border-radius:10px; padding:0 0.75rem; border:1px solid #cbd5e1; font-weight:700; font-size:0.9rem; background:#f8fafc;">
                            </div>
                        </div>

                        <h3
                            style="font-size:0.9rem; font-weight:700; margin: 2rem 0 1.5rem; color:#475569; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid #f1f5f9; padding-bottom:0.75rem;">
                            <i class="fas fa-clock-rotate-left"></i> Logistics & Scheduling
                        </h3>

                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem;">
                            <div class="form-group">
                                <label
                                    style="margin-bottom:0.5rem; display:block; font-weight:600; font-size:0.85rem; color:#64748b;">Commencement</label>
                                <input type="datetime-local" name="scheduledStart" required
                                    style="width:100%; height:45px; border-radius:10px; padding:0 0.75rem; border:1px solid #cbd5e1; font-weight:600; font-size:0.85rem; background:#f8fafc;">
                            </div>
                            <div class="form-group">
                                <label
                                    style="margin-bottom:0.5rem; display:block; font-weight:600; font-size:0.85rem; color:#64748b;">Deadline</label>
                                <input type="datetime-local" name="scheduledEnd" required
                                    style="width:100%; height:45px; border-radius:10px; padding:0 0.75rem; border:1px solid #cbd5e1; font-weight:600; font-size:0.85rem; background:white;">
                            </div>
                            <div class="form-group">
                                <label
                                    style="margin-bottom:0.5rem; display:block; font-weight:600; font-size:0.85rem; color:#64748b;">Estimated
                                    Hours</label>
                                <input type="number" name="estimatedDurationHours" placeholder="48" required
                                    style="width:100%; height:45px; border-radius:10px; padding:0 0.75rem; border:1px solid #cbd5e1; font-weight:600; font-size:0.9rem;">
                            </div>
                            <div class="form-group">
                                <label
                                    style="margin-bottom:0.5rem; display:block; font-weight:600; font-size:0.85rem; color:#64748b;">Priority
                                    Status</label>
                                <select name="priority"
                                    style="width:100%; height:45px; border-radius:10px; padding:0 0.75rem; border:1px solid #cbd5e1; background:white; font-weight:700; font-size:0.9rem;">
                                    <option value="LOW">Routine</option>
                                    <option value="MEDIUM" selected>Standard</option>
                                    <option value="HIGH">Critical</option>
                                    <option value="URGENT">IMMEDIATE</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group" style="margin-top: 2rem;">
                            <label
                                style="margin-bottom:0.5rem; display:block; font-weight:600; font-size:0.85rem; color:#64748b;"><i
                                    class="fas fa-file-signature"></i> Execution Mission Details</label>
                            <textarea name="description" rows="3" placeholder="Append technical specs and protocols..."
                                style="width:100%; border-radius:10px; padding:1rem; border:1px solid #cbd5e1; font-size:0.9rem; background:white; line-height:1.5; resize:none;"></textarea>
                        </div>

                        <div
                            style="display: flex; justify-content: flex-end; margin-top: 3rem; border-top: 1px solid #f1f5f9; padding-top: 2rem; gap: 1rem; align-items:center;">
                            <p style="margin:0; font-size:0.8rem; color:#64748b; font-weight:600; margin-right:auto;">
                                <i class="fas fa-info-circle" style="color:var(--primary); margin-right:0.25rem;"></i>
                                Site terminal sync is automatic.
                            </p>
                            <button type="button" onclick="history.back()" class="btn-secondary"
                                style="height:45px; padding:0 2rem; border-radius:10px; font-weight:700; font-size:0.85rem; background:#f8fafc; border:1px solid #e2e8f0; color:#64748b; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:0.5rem;">
                                Cancel
                            </button>
                            <button type="submit" class="btn-primary"
                                style="height:45px; padding:0 3rem; border-radius:10px; font-weight:700; font-size:0.9rem; background:var(--primary); border:none; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center;">
                                <i class="fas fa-paper-plane" style="margin-right:0.5rem;"></i> Authorize Plan
                            </button>
                        </div>
                    </form>
                </div>

                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <script>
        let currentUser = null;

        async function initialize() {
            try {
                const authRes = await fetch('/api/auth/me');
                if (!authRes.ok) { window.location.href = '/login.html'; return; }
                currentUser = await authRes.json();

                const siteRes = await fetch('/api/sites/all');
                let sites = await siteRes.json();

                if (currentUser.userRole === 'SITE_MANAGER') {
                    const managed = currentUser.assignedSiteNames || [];
                    sites = sites.filter(s => managed.includes(s.name));
                }

                const select = document.getElementById('siteSelect');
                select.innerHTML = '<option value="">Select an Authorized Site...</option>' +
                    sites.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

                const urlParams = new URLSearchParams(window.location.search);
                const siteId = urlParams.get('siteId');

                if (siteId) {
                    select.value = siteId;
                    fetchWorkOrders(siteId);
                } else if (sites.length === 1) {
                    // Auto-load if only one site
                    select.value = sites[0].id;
                    fetchWorkOrders(sites[0].id);
                }
            } catch (err) { console.error('Site load failed', err); }
        }

        function toggleCustomCategory() {
            const select = document.getElementById('categorySelect');
            const customInput = document.getElementById('customCategory');
            customInput.style.display = select.value === 'CUSTOM' ? 'block' : 'none';
            if (select.value === 'CUSTOM') customInput.required = true;
            else { customInput.required = false; customInput.value = ''; }
        }

        document.getElementById('workOrderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);

            let category = formData.get('category');
            if (category === 'CUSTOM') {
                category = document.getElementById('customCategory').value.trim();
                if (!category) return alert("Please specify the custom category.");
            }

            const data = {
                title: formData.get('title'),
                description: formData.get('description'),
                category: category,
                scheduledStart: formData.get('scheduledStart'),
                scheduledEnd: formData.get('scheduledEnd'),
                estimatedDurationHours: formData.get('estimatedDurationHours'),
                priority: formData.get('priority'),
                site: { id: formData.get('siteId') }
            };

            try {
                const response = await fetch('/api/work-orders/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('Work Order Issued Successfully!');
                    window.location.href = '/daily-progress.html';
                }
            } catch (err) { alert('Network connection lost.'); }
        });

        window.onload = initialize;
    </script>
</body>

</html>
