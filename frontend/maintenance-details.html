<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Details | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="/public/js/layout-loader.js" defer></script>
    <style>
        .detail-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-top: 2rem; }
        .info-card { padding: 1.5rem; }
        .issue-box { background: rgba(0,0,0,0.02); padding: 1.25rem; border-radius: 12px; margin-bottom: 1.5rem; border-left: 4px solid var(--amber); }
        .tech-pill { display: flex; align-items: center; gap: 0.75rem; background: var(--bg-card); padding: 0.75rem 1rem; border-radius: 10px; border: 1px solid var(--border-color); }
        .cost-display { font-size: 2.5rem; font-weight: 800; color: var(--text-main); margin: 0.5rem 0; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        @media (max-width: 1024px) { .detail-grid { grid-template-columns: 1fr; } }
    </style>
</head>

<body class="loading" data-page="maintenance">
    <div class="app-container">
        <!-- Sidebar container -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar container -->
            <div id="topbar-container"></div>

            <div class="dashboard-scrollable">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <section class="welcome-section" style="margin-bottom:0;">
                        <h1><i class="fas fa-tools" style="margin-right:0.6rem; color:var(--primary);"></i><span id="headerName">Ticket Details</span></h1>
                        <div id="refId" class="status-pill in-use" style="margin-top:0.5rem; font-family:monospace;">#0000</div>
                    </section>
                    <div id="adminActions" style="display: none;">
                        <button onclick="openStatus()" class="btn-primary"><i class="fas fa-edit"></i> Update Progress</button>
                    </div>
                </div>

                <div class="detail-grid">
                    <div class="main-col">
                        <section class="card glass info-card">
                            <div class="card-header" style="justify-content: space-between;">
                                <h3 style="margin:0;">Reported Issue</h3>
                                <span id="mainStatus" class="status-badge">PENDING</span>
                            </div>
                            <div class="issue-box">
                                <label style="font-size:0.7rem; text-transform:uppercase; color:var(--text-muted); font-weight:700;">User Description</label>
                                <p id="descText" style="font-size:1.1rem; line-height:1.5; margin-top:0.5rem;">---</p>
                            </div>
                            <div class="form-grid">
                                <div class="form-group"><label>Priority</label><span id="priority" class="priority-badge">---</span></div>
                                <div class="form-group"><label>Type</label><span id="maintType" class="type-badge">---</span></div>
                                <div class="form-group"><label>Reported On</label><span id="reportDate" style="font-weight:600;">---</span></div>
                            </div>
                        </section>

                        <section class="card glass info-card" style="margin-top:1.5rem;">
                            <div class="card-header"><h3 style="margin:0;">Resolution Progress</h3></div>
                            <div class="form-grid">
                                <div class="form-group full-width">
                                    <label>Assigned Technician</label>
                                    <div class="tech-pill"><i class="fas fa-user-cog"></i><span id="techName">Not Assigned</span></div>
                                </div>
                                <div class="form-group full-width">
                                    <label>Admin Resolution Notes</label>
                                    <div id="notesBox" style="background:rgba(255,255,255,0.5); padding:1rem; border-radius:10px; min-height:80px; font-style:italic; color:var(--text-muted);">---</div>
                                </div>
                            </div>
                        </section>

                        <section class="card glass info-card" style="margin-top:1.5rem;">
                            <div class="card-header"><h3 style="margin:0;">Costing</h3></div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div><p style="color:var(--text-muted); margin:0;">Maintenance Fee (INR)</p><div class="cost-display" id="costNum">₹ 0</div></div>
                                <div class="kpi-icon green" style="width:70px; height:70px;"><i class="fas fa-receipt" style="font-size:1.8rem;"></i></div>
                            </div>
                        </section>
                    </div>

                    <div class="side-col">
                        <section class="card glass info-card" style="text-align: center;">
                            <div class="card-header"><h3 style="margin:0;">Hardware Info</h3></div>
                            <img id="assetImg" src="" style="width: 100%; height: 140px; object-fit: contain; background: white; border-radius: 12px; padding: 1rem; margin: 1rem 0;">
                            <h4 id="assetName">---</h4>
                            <span id="assetTag" class="a-tag">---</span>
                        </section>

                        <section class="card glass info-card" style="margin-top:1.5rem;">
                            <div class="card-header"><h3 style="margin:0;">Staff Contact</h3></div>
                            <div style="display: flex; gap: 1rem; align-items: center;">
                                <img id="userImg" src="" style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary);">
                                <div><h4 id="userName" style="margin:0;">---</h4><p id="userRole" style="margin:0; font-size:0.8rem; color:var(--text-muted);">---</p></div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
            <div id="footer-container"></div>
        </main>
    </div>

    <!-- Status Update Modal -->
    <div id="statusModal" class="modal-overlay">
        <div class="card glass" style="width: 500px; padding: 2rem;">
            <h2>Update Ticket</h2>
            <div class="form-group"><label>Status</label>
                <select id="modalStatus" class="form-control">
                    <option value="PENDING">Pending</option>
                    <option value="IN_PROGRESS">In Progress</option>
                    <option value="COMPLETED">Completed</option>
                    <option value="CANCELLED">Cancelled</option>
                </select>
            </div>
            <div class="form-group"><label>Technician / Vendor</label><input type="text" id="modalTechnician" class="form-control"></div>
            <div class="form-group"><label>Maintenance Cost (₹)</label><input type="number" id="modalCost" class="form-control" step="0.01"></div>
            <div class="form-group"><label>Admin Notes</label><textarea id="modalNotes" class="form-control" rows="3"></textarea></div>
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button class="btn-secondary" style="flex: 1;" onclick="closeModal()">Close</button>
                <button class="btn-submit" style="flex: 1;" onclick="saveStatus()">Apply Changes</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8085/api';
        let currentId = new URLSearchParams(window.location.search).get('id'), ticket = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const uRes = await fetch(`${API_BASE}/auth/me`);
            const user = await uRes.json();
            if (user.userRole === 'ADMIN') document.getElementById('adminActions').style.display = 'block';
            
            if (currentId) loadTicket(currentId);
        });

        async function loadTicket(id) {
            const res = await fetch(`${API_BASE}/maintenance/${id}`);
            ticket = await res.json();
            
            document.getElementById('headerName').textContent = ticket.asset.name;
            document.getElementById('refId').textContent = `#${ticket.id}`;
            document.getElementById('descText').textContent = ticket.issueDescription;
            document.getElementById('mainStatus').textContent = ticket.status;
            document.getElementById('mainStatus').className = `status-badge ${ticket.status.toLowerCase().replace('_','-')}`;
            document.getElementById('priority').textContent = ticket.priority;
            document.getElementById('priority').className = `priority-badge ${ticket.priority.toLowerCase()}`;
            document.getElementById('maintType').textContent = ticket.maintenanceType;
            document.getElementById('reportDate').textContent = new Date(ticket.requestedDate).toLocaleString();
            document.getElementById('techName').textContent = ticket.assignedTechnician || 'Searching for technician...';
            document.getElementById('notesBox').textContent = ticket.adminNotes || 'No internal notes recorded.';
            document.getElementById('costNum').textContent = '₹ ' + (ticket.cost || 0).toLocaleString();
            
            document.getElementById('assetName').textContent = ticket.asset.name;
            document.getElementById('assetTag').textContent = `#${ticket.asset.assetTag}`;
            document.getElementById('assetImg').src = ticket.asset.hasImage ? `${API_BASE}/assets/${ticket.asset.id}/image` : 'https://cdn-icons-png.flaticon.com/512/1250/1250615.png';
            
            document.getElementById('userName').textContent = ticket.requestedBy.name;
            document.getElementById('userRole').textContent = ticket.requestedBy.role;
            document.getElementById('userImg').src = ticket.requestedBy.hasImage ? `${API_BASE}/employees/${ticket.requestedBy.id}/image` : `https://ui-avatars.com/api/?name=${ticket.requestedBy.name}`;
        }

        function openStatus() {
            document.getElementById('modalStatus').value = ticket.status;
            document.getElementById('modalTechnician').value = ticket.assignedTechnician || '';
            document.getElementById('modalCost').value = ticket.cost || 0;
            document.getElementById('modalNotes').value = ticket.adminNotes || '';
            document.getElementById('statusModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('statusModal').style.display = 'none'; }

        async function saveStatus() {
            const payload = {
                status: document.getElementById('modalStatus').value,
                assignedTechnician: document.getElementById('modalTechnician').value,
                cost: parseFloat(document.getElementById('modalCost').value),
                adminNotes: document.getElementById('modalNotes').value
            };
            const res = await fetch(`${API_BASE}/maintenance/${currentId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) { Toastify({ text: "Ticket updated!", backgroundColor: "#10b981" }).showToast(); setTimeout(()=>location.reload(), 1000); }
        }
    </script>
</body>
</html>
