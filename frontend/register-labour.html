<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Workforce Onboarding | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/public/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="/public/js/layout-loader.js" defer></script>
    <style>
        .reg-card { width: 95%; max-width: 900px; margin: 0 auto; padding: 3rem; border-radius: 28px; border: 1px solid #e2e8f0; background: #ffffff; box-shadow: 0 15px 35px -5px rgba(0,0,0,0.05); }
        .form-section-title { font-size:0.8rem; font-weight:800; margin: 2rem 0 1.5rem; color:var(--primary); text-transform:uppercase; letter-spacing:1.5px; display: flex; align-items: center; gap: 0.75rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.75rem; }
        .form-control { width:100%; height:50px; border-radius:14px; border:1px solid #cbd5e1; padding:0 1.25rem; font-family:'Outfit'; font-size:1rem; transition:0.3s; background:#f8fafc; }
        .form-control:focus { border-color:var(--primary); background:white; outline:none; box-shadow:0 0 0 4px rgba(99,102,241,0.1); }
        .field-label { font-weight:700; font-size:0.85rem; color:#475569; margin-bottom:0.75rem; display:block; }
    </style>
</head>

<body data-page="site-management" data-module="labour">
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="topbar-container"></div>
            <div class="dashboard-scrollable" style="padding: 2rem 0 5rem;">
                
                <section class="welcome-section" style="width: 95%; max-width:900px; margin: 0 auto 2rem; display: flex; align-items: center; justify-content: space-between;">
                    <div style="display:flex; align-items:center; gap:1.25rem;">
                        <div style="width: 55px; height: 55px; background: var(--primary); color: white; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 8px 16px rgba(99,102,241,0.25);">
                            <i class="fas fa-person-digging"></i>
                        </div>
                        <div>
                            <h1 style="margin:0; font-size: 1.75rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px;" id="pageTitle">Workforce Registration</h1>
                            <p style="margin:0; font-size:1rem; color:var(--text-muted);" id="pageSub">Onboard new field personnel to the master project ledger.</p>
                        </div>
                    </div>
                </section>

                <div class="reg-card">
                    <form id="registerLabourForm">
                        <input type="hidden" name="id" id="lId">

                        <div class="form-section-title">
                            <i class="fas fa-id-card"></i> Primary Identification
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label class="field-label">Field Worker Full Name</label>
                                <input type="text" name="name" class="form-control" placeholder="Legal Full Name" required>
                            </div>
                            <div class="form-group">
                                <label class="field-label">Personnel ID / Bio-Tag</label>
                                <input type="text" name="personnelId" class="form-control" placeholder="LBR-XXX" required>
                            </div>
                        </div>

                        <div class="form-grid" style="margin-top: 1.75rem;">
                            <div class="form-group">
                                <label class="field-label">Contact Number (Phone)</label>
                                <input type="tel" name="phone" class="form-control" placeholder="+91 00000 00000">
                            </div>
                            <div class="form-group">
                                <label class="field-label">Trade / Specialty Category</label>
                                <select name="trade" class="form-control" required>
                                    <option value="GENERAL">General Labour</option>
                                    <option value="ELECTRICIAN">Electrician</option>
                                    <option value="MASON">Mason</option>
                                    <option value="PLUMBER">Plumber</option>
                                    <option value="WELDER">Welder</option>
                                    <option value="CARPENTER">Carpenter</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-section-title">
                            <i class="fas fa-briefcase"></i> Deployment & Payroll
                        </div>

                        <div class="form-grid" style="margin-top: 1.75rem;">
                             <div class="form-group">
                                 <label class="field-label">Skill Assessment Level</label>
                                 <select name="skillLevel" class="form-control">
                                     <option value="SKILLED">Skilled</option>
                                     <option value="SEMI_SKILLED">Semi-Skilled</option>
                                     <option value="UNSKILLED">Unskilled / Helper</option>
                                 </select>
                             </div>
                             <div class="form-group">
                                 <label class="field-label">Base Daily Wage (₹)</label>
                                 <input type="number" name="dailyWage" class="form-control" placeholder="500" required>
                             </div>
                        </div>

                        <div class="form-grid" style="margin-top: 1.75rem;">
                             <div class="form-group">
                                 <label class="field-label">Assigned Construction Site</label>
                                 <select name="currentSite" id="siteSelector" class="form-control">
                                     <option value="">SELECT SITE (OPTIONAL / POOL)</option>
                                 </select>
                             </div>
                             <div class="form-group">
                                 <label class="field-label">Operational Status</label>
                                 <select name="status" class="form-control">
                                     <option value="AVAILABLE">Available (Center Pool)</option>
                                     <option value="ACTIVE">Active (On-Site Deployment)</option>
                                 </select>
                             </div>
                        </div>

                        <div class="form-group" style="margin-top: 1.75rem;">
                            <label class="field-label">Security Profile Image (Optional)</label>
                            <input type="file" id="labourPhoto" accept="image/*" class="form-control" style="padding: 10px; height: auto; border: 1px dashed #cbd5e1;">
                        </div>

                        <div class="form-actions" style="margin-top: 3.5rem; border-top: 1px solid #f1f5f9; padding-top: 2rem; display: flex; justify-content: flex-end; gap: 1rem;">
                            <a href="/labour-list.html" class="btn-secondary" style="height:52px; padding:0 2rem; border-radius:15px; text-decoration:none; display:flex; align-items:center; justify-content:center; font-weight:700; color:#64748b; background:#f8fafc; border:1px solid #e2e8f0;">Discard</a>
                            <button type="submit" id="submitBtn" class="btn-primary" style="height:52px; padding:0 3.5rem; border-radius:15px; font-weight:800; font-size:1rem; background:var(--primary); border:none; color:white; cursor:pointer; box-shadow:0 10px 20px rgba(99,102,241,0.2);">
                                <i class="fas fa-save" style="margin-right:0.75rem;"></i> <span id="submitLabel">Register Workforce</span>
                            </button>
                        </div>
                    </form>
                </div>

                <div id="footer-container" style="width: 95%; max-width:900px; margin: 0 auto;"></div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = '/api';
        let existingId = null;

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            existingId = urlParams.get('id');
            
            await initializeContext();

            if (existingId) {
                await loadExistingRecord(existingId);
            }
        }

        async function initializeContext() {
            try {
                const [authRes, sitesRes] = await Promise.all([
                    fetch('/api/auth/me'),
                    fetch('/api/sites/all')
                ]);

                const user = await authRes.json();
                const sites = await sitesRes.json();
                const selector = document.getElementById('siteSelector');

                // 1. Populate Sites (Filter by Manager Scope if applicable)
                let availableSites = sites;
                if (user.userRole === 'SITE_MANAGER' && user.assignedSiteNames) {
                    availableSites = sites.filter(s => user.assignedSiteNames.includes(s.name));
                }

                availableSites.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.name;
                    opt.textContent = s.name;
                    selector.appendChild(opt);
                });

                // 2. Apply Site Manager Restrictions
                if (user.userRole === 'SITE_MANAGER' && user.assignedSiteNames) {
                    if (user.assignedSiteNames.length === 1) {
                        selector.value = user.assignedSiteNames[0];
                        selector.disabled = true; // Lock if only one site
                        
                        // Hidden field for single-site forced post
                        const hiddenSite = document.createElement('input');
                        hiddenSite.type = 'hidden';
                        hiddenSite.name = 'currentSite';
                        hiddenSite.value = user.assignedSiteNames[0];
                        document.getElementById('registerLabourForm').appendChild(hiddenSite);
                    }
                    
                    document.querySelector('select[name="status"]').value = 'ACTIVE';
                    document.querySelector('select[name="status"]').disabled = true;
                    
                    const hiddenStatus = document.createElement('input');
                    hiddenStatus.type = 'hidden';
                    hiddenStatus.name = 'status';
                    hiddenStatus.value = 'ACTIVE';
                    document.getElementById('registerLabourForm').appendChild(hiddenStatus);
                }
            } catch (err) {
                console.error("Context initialization failed", err);
            }
        }

        async function loadExistingRecord(id) {
            try {
                const res = await fetch(`${API_BASE}/labour/${id}`);
                if (!res.ok) throw new Error();
                const person = await res.json();
                
                const form = document.getElementById('registerLabourForm');
                form.id.value = person.id;
                form.name.value = person.name || '';
                form.personnelId.value = person.personnelId || '';
                form.phone.value = person.phone || '';
                form.trade.value = person.trade || 'GENERAL';
                form.skillLevel.value = person.skillLevel || 'SKILLED';
                form.dailyWage.value = person.dailyWage || '';
                form.currentSite.value = person.currentSite || '';
                form.status.value = person.status || 'AVAILABLE';

                document.getElementById('pageTitle').innerText = 'Update Personnel File';
                document.getElementById('pageSub').innerText = `Editing registry for ${person.name}`;
                document.getElementById('submitLabel').innerText = 'Sync Records';
                document.getElementById('submitBtn').style.background = '#10b981';
            } catch (err) { 
                Toastify({ text: "Failed to load record", backgroundColor: "#ef4444" }).showToast();
            }
        }

        document.getElementById('registerLabourForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const data = Object.fromEntries(new FormData(e.target).entries());
            data.userRole = 'LABOURER';
            
            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

                const res = await fetch(`${API_BASE}/labour/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    const saved = await res.json();
                    const photoFile = document.getElementById('labourPhoto').files[0];
                    if (photoFile) {
                        const photoData = new FormData();
                        photoData.append('file', photoFile);
                        await fetch(`${API_BASE}/labour/${saved.id}/image`, { method: 'POST', body: photoData });
                    }
                    Toastify({ text: "Workforce Ledger Updated!", backgroundColor: "#10b981" }).showToast();
                    setTimeout(() => window.location.href = '/labour-list.html', 1200);
                } else {
                    const err = await res.text();
                    Toastify({ text: "Update failed: " + err, backgroundColor: "#ef4444" }).showToast();
                }
            } catch (err) {
                Toastify({ text: "Connection error", backgroundColor: "#ef4444" }).showToast();
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = (existingId ? '<i class="fas fa-save"></i> Sync Records' : '<i class="fas fa-save"></i> Register Workforce');
            }
        });
    </script>
</body>
</html>
