<header class="top-bar">
    <button class="menu-toggle-open" id="mobileMenuOpen" title="Open Navigation">
        <i class="fas fa-bars"></i>
    </button>
    <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="topSearchInput" placeholder="Search assets, employees, or requests...">
        <div id="globalSearchResults" class="search-results-dropdown" style="display: none;"></div>
    </div>
    <div class="header-actions" style="margin-left: auto; display: flex; align-items: center; gap: 1.5rem;">
        <a href="/profile.html" class="header-profile" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 1rem;">
            <div style="text-align: right;">
                <p id="profileName" style="font-weight: 700; font-size: 0.85rem; margin: 0; color: #1e293b; line-height: 1;">User</p>
                <p id="profileRole" style="font-size: 0.7rem; margin: 0; color: var(--text-muted);">Staff</p>
            </div>
            <img id="profileImg" src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="Profile" 
                 style="width: 40px; height: 40px; border-radius: 12px; object-fit: cover; border: 2px solid #f1f5f9;">
        </a>
    </div>
</header>
