<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Command Center | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/public/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/public/js/layout-loader.js" defer></script>
    <style>
        .site-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card-premium { background: white; padding: 2rem; border-radius: 24px; border-bottom: 4px solid var(--primary); transition: transform 0.3s; }
        .stat-card-premium:hover { transform: translateY(-5px); }
        .progress-track-lg { background: rgba(0,0,0,0.05); height: 16px; border-radius: 12px; overflow: hidden; margin-top: 1rem; }
        .progress-bar-lg { height: 100%; border-radius: 12px; background: linear-gradient(90deg, var(--primary), #818cf8); transition: width 0.8s ease; }
    </style>
</head>

<body data-page="site-management" data-module="labour">
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="topbar-container"></div>
            <div class="dashboard-scrollable">
                <section class="welcome-section" style="display:flex; justify-content:space-between; align-items:flex-end;">
                    <div>
                        <h1 id="siteDetailName"><i class="fas fa-building-circle-check" style="color:var(--primary); margin-right:0.5rem;"></i>Loading Site...</h1>
                        <p id="siteDetailLocation"><i class="fas fa-map-marker-alt"></i> --</p>
                    </div>
                    <div style="display:flex; gap:1rem;">
                        <button class="btn-action admin-only" onclick="window.location.href='/attendance-list.html'" style="padding:0.75rem 1.5rem;"><i class="fas fa-calendar-check"></i> Mark Attendance</button>
                        <button class="btn-action" onclick="window.location.href='/assign-work.html'" style="padding:0.75rem 1.5rem; background:var(--primary); color:white; border:none;"><i class="fas fa-plus-circle"></i> Add Module</button>
                    </div>
                </section>

                <div class="site-stats-grid">
                    <div class="card glass stat-card-premium">
                        <small style="text-transform:uppercase; font-weight:800; color:var(--text-muted); letter-spacing:1px;">Active Workforce</small>
                        <h2 id="workerCount" style="font-size:2.5rem; margin: 0.5rem 0;">0</h2>
                        <p style="color:var(--green); font-weight:700;"><i class="fas fa-arrow-up"></i> Assigned Personnel</p>
                    </div>
                    <div class="card glass stat-card-premium">
                        <small style="text-transform:uppercase; font-weight:800; color:var(--text-muted); letter-spacing:1px;">Active Modules</small>
                        <h2 id="moduleCount" style="font-size:2.5rem; margin: 0.5rem 0;">0</h2>
                        <p style="color:var(--amber); font-weight:700;"><i class="fas fa-clock"></i> Current Workflows</p>
                    </div>
                    <div class="card glass stat-card-premium">
                        <small style="text-transform:uppercase; font-weight:800; color:var(--text-muted); letter-spacing:1px;">Average Progress</small>
                        <h2 id="avgProgress" style="font-size:2.5rem; margin: 0.5rem 0;">0%</h2>
                        <div class="progress-track-lg"><div id="avgProgressBar" class="progress-bar-lg" style="width:0%;"></div></div>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap: 2rem;">
                    <!-- Site Personnel -->
                    <section class="card glass" style="padding: 2rem; border-radius:24px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                            <h3><i class="fas fa-users" style="color:var(--primary);"></i> Assigned Local Team</h3>
                            <a href="/labour-list.html" style="font-size:0.75rem; color:var(--primary); font-weight:700;">Full Directory</a>
                        </div>
                        <div class="table-responsive">
                            <table class="assets-table">
                                <tbody id="siteLabourBody">
                                    <tr><td style="text-align:center; padding:3rem; color:var(--text-muted);">Fetching local team...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </section>

                    <!-- Work Modules -->
                    <section class="card glass" style="padding: 2rem; border-radius:24px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                            <h3><i class="fas fa-tasks" style="color:var(--primary);"></i> Site Work Modules</h3>
                            <a href="/daily-progress.html" style="font-size:0.75rem; color:var(--primary); font-weight:700;">Detailed Tracker</a>
                        </div>
                        <div id="siteModules" style="display:flex; flex-direction:column; gap:1.25rem;">
                             <div style="text-align:center; padding:3rem; color:var(--text-muted);">Syncing project modules...</div>
                        </div>
                    </section>
                </div>

                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <script>
        async function loadSiteDashboard() {
            const urlParams = new URLSearchParams(window.location.search);
            const siteId = urlParams.get('id');

            if (!siteId) {
                alert('No Site Context Found. Returning to Site List.');
                window.location.href = '/site-list.html';
                return;
            }

            try {
                // Fetch Site Info
                const siteRes = await fetch(`/api/sites/${siteId}`);
                const site = await siteRes.json();
                document.getElementById('siteDetailName').innerHTML = `<i class="fas fa-building-circle-check" style="color:var(--primary); margin-right:0.5rem;"></i>${site.name}`;
                document.getElementById('siteDetailLocation').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${site.location}`;

                // Fetch Workforce Assigned to this site
                const labRes = await fetch('/api/labour/all');
                const allLabs = await labRes.json();
                const siteLabs = allLabs.filter(l => l.currentSite && l.currentSite.trim().toLowerCase() === site.name.trim().toLowerCase());
                
                document.getElementById('workerCount').innerText = siteLabs.length;
                document.getElementById('siteLabourBody').innerHTML = siteLabs.map(l => `
                    <tr>
                        <td style="border:none; padding:1rem 0;">
                            <div style="display:flex; align-items:center; gap:0.75rem;">
                                <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(l.name)}&background=6366f1&color=fff&size=40" style="width:40px; height:40px; border-radius:10px;">
                                <div><strong class="a-title" style="font-size:0.95rem;">${l.name}</strong><br><small style="color:var(--text-muted); font-weight:700;">${l.trade}</small></div>
                            </div>
                        </td>
                        <td style="border:none; text-align:right;"><span class="status-badge available" style="font-size:0.7rem;">${l.status}</span></td>
                    </tr>
                `).join('') || '<tr><td style="text-align:center; padding:3rem; color:var(--text-muted);">No personnel assigned.</td></tr>';

                // Fetch Work Modules for this site (Work Orders)
                const woRes = await fetch('/api/work-orders/all');
                const allWOs = await woRes.json();
                const siteWOs = allWOs.filter(wo => wo.site && wo.site.id == siteId);

                document.getElementById('moduleCount').innerText = siteWOs.length;

                let totalProg = 0;
                document.getElementById('siteModules').innerHTML = siteWOs.map(wo => {
                    totalProg += wo.currentProgress;
                    return `
                        <div style="background:rgba(0,0,0,0.02); padding:1.25rem; border-radius:16px; border:1px solid rgba(0,0,0,0.05);">
                            <div style="display:flex; justify-content:space-between; margin-bottom:0.75rem;">
                                <h4 style="margin:0;">${wo.title}</h4>
                                <span style="font-size:0.75rem; font-weight:700; color:var(--primary);">${wo.currentProgress}%</span>
                            </div>
                            <div style="background:#e5e7eb; height:8px; border-radius:10px; overflow:hidden;">
                                <div style="background:var(--primary); width:${wo.currentProgress}%; height:100%; border-radius:10px;"></div>
                            </div>
                        </div>
                    `;
                }).join('') || '<div style="text-align:center; padding:3rem; color:var(--text-muted);">No active modules for this project.</div>';

                const avg = siteWOs.length > 0 ? (totalProg / siteWOs.length).toFixed(0) : 0;
                document.getElementById('avgProgress').innerText = `${avg}%`;
                document.getElementById('avgProgressBar').style.width = `${avg}%`;

            } catch (err) { alert('Command Center Sync Failed.'); }
        }

        window.onload = loadSiteDashboard;
    </script>
</body>
</html>
