<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer / Reassign Site | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/public/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/public/js/layout-loader.js" defer></script>
</head>

<body data-page="site-management" data-module="labour">
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="topbar-container"></div>
            <div class="dashboard-scrollable" style="padding: 1rem 0;">
                
                <section class="welcome-section" style="width: 95%; margin: 0 auto 1rem; padding-left: 1rem; display: flex; align-items: center; gap: 1rem;">
                    <div style="width: 45px; height: 45px; background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                        <i class="fas fa-exchange-alt"></i>
                    </div>
                    <div>
                        <h1 style="margin:0; font-size: 1.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px;">Workforce Redeployment</h1>
                        <p style="margin:0; font-size:0.9rem; color:var(--text-muted);">Transfer personnel between active project locations.</p>
                    </div>
                </section>

                <div class="card" style="width: 95%; margin: 0 auto; padding: 2rem; border-radius: 20px; border: 1px solid #e2e8f0; background: #ffffff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
                    <!-- Personnel Source Context: Simple & Clean -->
                    <div id="transferSource" style="margin-bottom: 2rem; padding: 1.5rem; background:#f8fafc; border-radius:15px; border:1px solid #e2e8f0;">
                        <div style="display:flex; justify-content:center; align-items:center;">
                            <i class="fas fa-circle-notch fa-spin" style="color:var(--primary); font-size:1.5rem;"></i>
                            <span style="margin-left:1rem; font-weight:600; color:var(--text-muted); font-size:0.9rem;">Synchronizing current assignment data...</span>
                        </div>
                    </div>

                    <form id="transferForm" class="standard-form">
                        <h3 style="font-size:0.9rem; font-weight:700; margin-bottom:1.5rem; color:#475569; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid #f1f5f9; padding-bottom:0.75rem;">
                            Destination Project & Scheduling
                        </h3>
                        
                        <div style="display: grid; grid-template-columns: 1.5fr 1fr auto; gap: 1rem; align-items: flex-end;">
                            <div class="form-group" style="margin-bottom:0;">
                                <label style="margin-bottom:0.5rem; display:block; font-weight:600; font-size:0.85rem; color:#64748b;">Target Project Site</label>
                                <select id="siteSelect" name="siteName" required style="width:100%; height:45px; border-radius:10px; padding:0 0.75rem; border:1px solid #cbd5e1; background:white; font-size:0.95rem; cursor:pointer;">
                                    <option value="">Selecting Destination...</option>
                                </select>
                            </div>
                            <div class="form-group" style="margin-bottom:0;">
                                <label style="margin-bottom:0.5rem; display:block; font-weight:600; font-size:0.85rem; color:#64748b;">Transfer Date</label>
                                <input type="date" id="execDate" name="effectiveDate" required style="width:100%; height:45px; border-radius:10px; padding:0 0.75rem; border:1px solid #cbd5e1; font-size:0.95rem; background:#f8fafc;">
                            </div>
                            <div style="display: flex; gap: 0.75rem;">
                                <button type="submit" class="btn-primary" style="height:45px; padding:0 2.5rem; border-radius:10px; font-weight:700; font-size:0.9rem; background:#10b981; border:none; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center;">
                                    Finalize Redeployment
                                </button>
                                <a href="/labour-list.html" class="btn-secondary" style="height:45px; padding:0 1.5rem; border-radius:10px; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; font-weight:700; font-size:0.85rem; background:#f8fafc; border:1px solid #e2e8f0; color:#64748b;">
                                   Cancel
                                </a>
                            </div>
                        </div>
                    </form>
                </div>

                <div id="footer-container" style="width: 95%; margin: 0 auto;"></div>
            </div>
        </main>
    </div>

    <script>
        let selectedLabId = null;

         async function init() {
            // Set default date
            document.getElementById('execDate').value = new Date().toISOString().split('T')[0];

            const urlParams = new URLSearchParams(window.location.search);
            selectedLabId = urlParams.get('id');
            const sourceDiv = document.getElementById('transferSource');

            if (!selectedLabId) {
                sourceDiv.innerHTML = '<div class="alert error">System Error: Missing Personnel Identifier. Redirecting...</div>';
                setTimeout(() => window.location.href = '/labour-list.html', 2000);
                return;
            }

            try {
                // Fetch Sites
                const sitesRes = await fetch('/api/sites/all');
                const sites = await sitesRes.json();
                const siteSelect = document.getElementById('siteSelect');
                siteSelect.innerHTML = '<option value="">-- Choose Destination Project --</option>' + 
                    sites.map(s => `<option value="${s.name}">${s.name} (${s.location})</option>`).join('');

                // Fetch Labourer
                const labRes = await fetch(`/api/labour/${selectedLabId}`);
                const lab = await labRes.json();
                sourceDiv.innerHTML = `
                    <div style="display:flex; align-items:center; justify-content:space-between; gap:2rem;">
                        <div style="flex:1;">
                            <div style="font-size:0.7rem; font-weight:700; color:var(--primary); text-transform:uppercase; letter-spacing:1px; margin-bottom:0.25rem;">Relocating Member</div>
                            <h2 style="margin:0; font-size:1.25rem; font-weight:700;">${lab.name}</h2>
                            <div style="font-size:0.85rem; color:var(--text-muted);">${lab.trade} | ${lab.personnelId}</div>
                        </div>
                        
                        <div style="color: #cbd5e1; font-size:1.5rem;">
                            <i class="fas fa-arrow-right"></i>
                        </div>

                        <div style="flex:1; text-align:right;">
                             <div style="font-size:0.7rem; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:1px; margin-bottom:0.25rem;">Origin Station</div>
                             <h2 style="margin:0; font-size:1.25rem; font-weight:700; color:var(--text-main);">${lab.currentSite || 'AVAILABLE'}</h2>
                             <div style="font-size:0.85rem; color:#10b981; font-weight:600;">Current Assignment</div>
                        </div>
                    </div>
                `;
            } catch (err) { sourceDiv.innerHTML = '<div class="alert error">Failed to synchronize personnel deployment data.</div>'; }
        }

        document.getElementById('transferForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const siteName = formData.get('siteName');
            try {
                const res = await fetch(`/api/labour/${selectedLabId}/transfer?siteName=${encodeURIComponent(siteName)}`, { method: 'POST' });
                if (res.ok) {
                    alert('Transfer Successful!');
                    window.location.href = '/labour-list.html';
                }
            } catch (err) { alert('Transfer failed'); }
        });

        window.onload = init;
    </script>
</body>
</html>
