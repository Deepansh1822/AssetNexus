<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: header-assets}">
    <title>Maintenance Requests | AssetNexus</title>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside th:replace="~{fragments/layout :: sidebar('maintenance')}"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header th:replace="~{fragments/layout :: topbar}"></header>

            <div class="dashboard-scrollable">
                <section class="welcome-section" id="requestsWelcome">
                    <h1><i class="fas fa-tools" style="margin-right: 0.5rem; color: var(--primary);"></i>Maintenance
                        Requests</h1>
                    <p>Manage and track all asset maintenance activities</p>
                </section>

                <!-- Branch Selection Landing -->
                <section class="card glass branch-landing" id="branchLanding">
                    <div class="card-header" style="border-bottom: none; text-align: center; display: block; padding-top: 3rem;">
                        <div class="kpi-icon indigo" style="width: 80px; height: 80px; font-size: 2rem; margin: 0 auto 1.5rem;"><i class="fas fa-building"></i></div>
                        <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Select Branch Requests</h2>
                        <p style="color: var(--text-muted);">View maintenance tickets specific to an office location.</p>
                    </div>
                    <div class="card-body" style="padding: 2rem 3rem 4rem; max-width: 600px; margin: 0 auto;">
                        <div class="form-group">
                            <label style="font-weight: 600; margin-bottom: 1rem; display: block; text-align: center;">Target Branch</label>
                            <select id="initialBranchFilter" class="form-control" style="height: 55px; border-radius: 15px; font-size: 1.1rem; text-align-last: center; border: 2px solid var(--border-color); background: var(--bg-card); cursor: pointer; transition: all 0.3s ease;">
                                <option value="" disabled selected>-- Choose a Branch --</option>
                                <option value="ALL">All Branches (Global Tickets)</option>
                            </select>
                        </div>
                        <div style="margin-top: 2rem; text-align: center;">
                            <button class="btn-submit" onclick="revealRequests()" style="width: 100%; height: 55px; border-radius: 15px; font-size: 1rem;">
                                <i class="fas fa-ticket-alt"></i> Access Tickets
                            </button>
                        </div>
                    </div>
                </section>

                <div id="mainRequestsContent" style="display: none;">

                <!-- Filter Tabs -->
                <section class="filter-tabs">
                    <button class="filter-tab active" data-status="all">All Active</button>
                    <button class="filter-tab" data-status="PENDING">Pending</button>
                    <button class="filter-tab" data-status="IN_PROGRESS">In Progress</button>
                </section>

                <!-- Requests Table -->
                <section class="card glass">
                    <div class="card-header">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <div class="kpi-icon indigo" style="width: 40px; height: 40px; font-size: 1rem;"><i
                                    class="fas fa-list-ul"></i></div>
                            <h2 style="margin:0;">Active Employee Requests</h2>
                        </div>
                        
                        <div style="margin-left: auto; display: flex; align-items: center; gap: 0.75rem;">
                            <!-- Branch Context Badge -->
                            <div class="duration-badge" style="background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); color: var(--primary); font-size: 0.75rem; padding: 0.2rem 0.6rem;">
                                <i class="fas fa-building" style="margin-right: 4px;"></i>
                                <span id="activeBranchName">All Branches</span>
                            </div>

                            <button onclick="switchBranchMode()" class="btn-icon btn-switch" title="Change Branch" style="background: var(--bg-card); border: 1px solid var(--border-color); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;">
                                <i class="fas fa-random" style="font-size: 0.8rem;"></i>
                            </button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="assets-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Asset</th>
                                    <th>Requested By</th>
                                    <th>Type</th>
                                    <th>Technician</th>
                                    <th>Issue</th>
                                    <th>Priority</th>
                                    <th>Status</th>
                                    <th>Amount</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="requestsTableBody">
                                <!-- Data loaded via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>
                </div>
                <footer th:replace="~{fragments/layout :: main-footer}"></footer>
            </div>
        </main>
    </div>

    <!-- Status Update Modal -->
    <div id="statusModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Update Request Status</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="modalRequestId">
                <div class="form-group">
                    <label>Status</label>
                    <select id="modalStatus" class="form-control">
                        <option value="PENDING">Pending</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="COMPLETED">Completed</option>
                        <option value="CANCELLED">Cancelled</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Assigned Technician / Vendor</label>
                    <input type="text" id="modalTechnician" class="form-control"
                        placeholder="e.g. John Doe, Dell Service Unit...">
                </div>
                <div class="form-group">
                    <label>Maintenance Cost (₹)</label>
                    <input type="number" id="modalCost" class="form-control" step="0.01" value="0.00">
                </div>
                <div class="form-group" id="notesGroup">
                    <label>Admin Notes</label>
                    <textarea id="modalNotes" class="form-control" rows="4"
                        placeholder="Add notes about this request..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="updateStatus()">Update Status</button>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
    <style>
        .btn-switch:hover {
            border-color: var(--primary) !important;
            background-color: rgba(99, 102, 241, 0.05) !important;
            color: var(--primary) !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .animate-slide-up {
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .duration-badge {
            display: inline-flex;
            align-items: center;
            border-radius: 6px;
            font-weight: 600;
        }
    </style>
    <script>
        let allRequests = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            loadRequests();

            // Filter tabs
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentFilter = tab.dataset.status;
                    filterRequests();
                });
            });
        });

        function loadRequests() {
            // Updated to be truly dynamic - fetch actual branches from system
            Promise.all([
                fetch('/api/employees/branches').then(res => res.json()),
                fetch('/api/maintenance/employee-requests').then(res => res.json())
            ])
            .then(([branches, requests]) => {
                populateBranchDropdown(branches);
                // Only show actionable (Active) requests: PENDING and IN_PROGRESS
                allRequests = requests.filter(r => r.status !== 'COMPLETED' && r.status !== 'CANCELLED');
                filterRequests();
            })
            .catch(err => console.error('Error loading requests:', err));
        }

        function populateBranchDropdown(branches) {
            const initialSelect = document.getElementById('initialBranchFilter');
            const currentValue = initialSelect.value;
            
            // Clear existing options except the first two
            initialSelect.innerHTML = `
                <option value="" disabled ${!currentValue ? 'selected' : ''}>-- Choose a Branch --</option>
                <option value="ALL" ${currentValue === 'ALL' ? 'selected' : ''}>All Branches (Global Tickets)</option>
            `;
            
            // Add actual branches from system
            const uniqueBranches = [...new Set(branches)].filter(b => b).sort();
            uniqueBranches.forEach(branch => {
                const opt = document.createElement('option');
                opt.value = branch;
                opt.textContent = branch;
                if (branch === currentValue) opt.selected = true;
                initialSelect.appendChild(opt);
            });
        }

        function revealRequests() {
            const selected = document.getElementById('initialBranchFilter').value;
            if (!selected) {
                showAlert('Please select a branch first', 'warning');
                return;
            }

            // UI Updates
            document.getElementById('activeBranchName').textContent = selected === 'ALL' ? 'All Branches' : selected;
            
            // UI Transitions
            document.getElementById('branchLanding').classList.add('animate-slide-up');
            setTimeout(() => {
                document.getElementById('branchLanding').style.display = 'none';
                document.getElementById('mainRequestsContent').style.display = 'block';
                document.getElementById('mainRequestsContent').classList.add('animate-slide-up');
                filterRequests();
            }, 300);
        }

        function switchBranchMode() {
            document.getElementById('branchLanding').style.display = 'block';
            document.getElementById('mainRequestsContent').style.display = 'none';
            document.getElementById('initialBranchFilter').value = '';
        }

        function filterRequests() {
            const branchFilter = document.getElementById('initialBranchFilter').value;
            let filtered = allRequests;

            // Branch filtering
            const actualBranch = branchFilter === 'ALL' ? '' : branchFilter;
            if (actualBranch) {
                filtered = filtered.filter(r => r.requestedBy && r.requestedBy.branchName === actualBranch);
            }

            if (currentFilter !== 'all') {
                filtered = filtered.filter(r => r.status === currentFilter);
            }

            renderRequests(filtered);
        }

        function renderRequests(requests) {
            const tbody = document.getElementById('requestsTableBody');

            if (requests.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding: 2rem;">No requests found</td></tr>';
                return;
            }

            tbody.innerHTML = requests.map(req => {
                const empImg = (req.requestedBy && req.requestedBy.hasImage) ? `/api/employees/${req.requestedBy.id}/image` : `https://ui-avatars.com/api/?name=${req.requestedBy.name}&size=24`;
                return `
                <tr>
                    <td><a href="/maintenance/view/${req.id}" class="a-tag" style="text-decoration: none; font-weight: 700; color: var(--primary);">#${req.id}</a></td>
                    <td>
                        <div class="asset-info">
                            <div class="asset-name-v">
                                <span class="a-title">${req.asset.name}</span>
                                <span class="a-tag">#${req.asset.assetTag || 'N/A'}</span>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="user-pill">
                            <img src="${empImg}" alt="">
                            <span>${req.requestedBy.name}</span>
                        </div>
                    </td>
                    <td>
                        <span class="type-badge ${req.maintenanceType.toLowerCase()}">
                            ${req.maintenanceType}
                        </span>
                    </td>
                    <td style="font-weight: 500; color: var(--text-main);">${req.assignedTechnician || '<span style="color:var(--text-muted); font-style:italic;">Not Assigned</span>'}</td>
                    <td style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${req.issueDescription}">${req.issueDescription}</td>
                    <td><span class="priority-badge ${req.priority.toLowerCase()}">${req.priority}</span></td>
                    <td><span class="status-badge ${req.status.toLowerCase().replace('_', '-')}">${req.status.replace('_', ' ')}</span></td>
                    <td style="font-weight: 700; color: #10b981;">${req.cost > 0 ? '₹ ' + req.cost.toFixed(2) : '--'}</td>
                    <td>${new Date(req.requestedDate).toLocaleDateString()}</td>
                    <td style="display: flex; gap: 0.5rem; justify-content: center;">
                        <a href="/maintenance/view/${req.id}" class="btn-icon" title="View Details">
                            <i class="fas fa-eye"></i>
                        </a>
                        <button class="btn-icon" title="Update Request" onclick="openStatusModal(${req.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        function openStatusModal(id) {
            console.log("Opening modal for ID:", id);
            const req = allRequests.find(r => r.id == id);
            if (!req) {
                console.error("Request not found for ID:", id);
                return;
            }

            document.getElementById('modalRequestId').value = id;
            document.getElementById('modalStatus').value = req.status;
            document.getElementById('modalNotes').value = req.adminNotes || '';
            document.getElementById('modalTechnician').value = req.assignedTechnician || '';
            document.getElementById('modalCost').value = req.cost || '0.00';
            document.getElementById('statusModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('statusModal').style.display = 'none';
        }

        function updateStatus() {
            const id = document.getElementById('modalRequestId').value;
            const status = document.getElementById('modalStatus').value;
            const adminNotes = document.getElementById('modalNotes').value;
            const assignedTechnician = document.getElementById('modalTechnician').value;
            const cost = document.getElementById('modalCost').value;
            const btn = event.target; // The clicked button

            console.log("Updating status for ID:", id, { status, adminNotes, assignedTechnician, cost });
            setBtnLoading(btn, true, 'Updating...');

            fetch(`/api/maintenance/${id}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status, adminNotes, assignedTechnician, cost: parseFloat(cost) })
            })
                .then(res => {
                    if (!res.ok) throw new Error('Server returned ' + res.status);
                    return res.json();
                })
                .then(data => {
                    console.log("Update success:", data);
                    closeModal();
                    loadRequests();
                    showAlert('Status updated successfully!');
                })
                .catch(err => {
                    console.error('Error updating status:', err);
                    showAlert('Failed to update status: ' + err.message, 'error');
                })
                .finally(() => {
                    setBtnLoading(btn, false);
                });
        }

        // Close modal on outside click
        window.onclick = function (event) {
            const modal = document.getElementById('statusModal');
            if (event.target === modal) {
                closeModal();
            }
        };
    </script>
</body>

</html>
