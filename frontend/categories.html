<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/public/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="/public/js/layout-loader.js" defer></script>
</head>

<body data-page="categories">
    <div class="app-container">
        <!-- Sidebar container -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar container -->
            <div id="topbar-container"></div>

            <div class="dashboard-scrollable">
                <section class="welcome-section">
                    <h1><i class="fas fa-tags" style="margin-right: 0.5rem; color: var(--primary);"></i>Asset Categories</h1>
                    <p>Organize and manage asset classifications for better inventory control.</p>
                </section>

                <section class="card glass">
                    <div class="card-header">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <div class="kpi-icon blue" style="width: 40px; height: 40px; font-size: 1rem;"><i class="fas fa-folder-open"></i></div>
                            <h2 style="margin:0;">All Categories</h2>
                        </div>
                        <div class="header-actions">
                            <button class="filter-chip" onclick="exportCategoriesToCSV()"><i class="fas fa-file-export"></i> Export List</button>
                            <a href="/add-category.html" id="addCategoryBtn" class="btn-action" style="display: none;"><i class="fas fa-folder-plus"></i> Add Category</a>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="assets-table">
                            <thead>
                                <tr>
                                    <th>Category Name</th>
                                    <th>Description</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="categoryTableBody">
                                <!-- Data loaded via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>
                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8085/api';
        let allCategories = [];
        let isAdmin = false;

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const userRes = await fetch(`${API_BASE}/auth/me`);
                if (!userRes.ok) throw new Error('Not authenticated');
                const user = await userRes.json();
                isAdmin = user.userRole === 'ADMIN';

                if (isAdmin) {
                    document.getElementById('addCategoryBtn').style.display = 'inline-flex';
                }

                loadCategories();
            } catch (err) {
                console.error('Auth check failed:', err);
                window.location.href = '/login.html';
            }
        });

        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE}/categories`);
                allCategories = await res.json();
                renderCategories(allCategories);
            } catch (err) {
                console.error('Error loading categories:', err);
            }
        }

        function renderCategories(categories) {
            const tbody = document.getElementById('categoryTableBody');
            tbody.innerHTML = categories.map(cat => {
                const statusBadge = cat.active
                    ? '<span class="status-badge available">Active</span>'
                    : '<span class="status-badge disposed">Inactive</span>';

                const actionBtn = cat.active
                    ? `<button class="btn-icon text-red" title="Discontinue" onclick="deactivateCategory(${cat.id})"><i class="fas fa-ban"></i></button>`
                    : `<button class="btn-icon text-green" title="Reactivate" onclick="reactivateCategory(${cat.id})"><i class="fas fa-check-circle"></i></button>`;

                const imageUrl = cat.categoryImage
                    ? `data:image/jpeg;base64,${cat.categoryImage}`
                    : '/public/images/default-category.png';

                return `<tr>
                    <td><div class="user-pill"><img src="${imageUrl}" alt="" style="object-fit: cover;"><a href="/category-details.html?id=${cat.id}" style="font-weight: 600; text-decoration:none; color:inherit;">${cat.name}</a></div></td>
                    <td style="color: var(--text-muted);">${cat.description || 'No description provided.'}</td>
                    <td>${statusBadge}</td>
                    <td>
                        <div style="display:flex; gap:0.5rem; justify-content:center;">
                            <a href="/category-details.html?id=${cat.id}" class="btn-icon" title="View Details"><i class="fas fa-eye"></i></a>
                            ${isAdmin ? `
                                <a href="/update-category.html?id=${cat.id}" class="btn-icon" title="Edit"><i class="fas fa-edit"></i></a>
                                ${actionBtn}
                            ` : ''}
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        async function deactivateCategory(id) {
            if (!confirm('Are you sure you want to discontinue this category?')) return;
            const res = await fetch(`${API_BASE}/categories/${id}`, { method: 'DELETE' });
            if (res.ok) {
                Toastify({ text: "Category deactivated", backgroundColor: "#10b981" }).showToast();
                loadCategories();
            } else {
                const msg = await res.text();
                Toastify({ text: "Error: " + msg, backgroundColor: "#ef4444" }).showToast();
            }
        }

        async function reactivateCategory(id) {
            const res = await fetch(`${API_BASE}/categories/${id}/reactivate`, { method: 'POST' });
            if (res.ok) {
                Toastify({ text: "Category reactivated", backgroundColor: "#10b981" }).showToast();
                loadCategories();
            }
        }

        function exportCategoriesToCSV() {
            const headers = ['Name', 'Description', 'Status'];
            const rows = allCategories.map(c => [c.name, c.description, c.active ? 'Active' : 'Inactive']);
            const blob = new Blob([[headers.join(','), ...rows.map(r => r.join(','))].join('\n')], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `categories_${new Date().getTime()}.csv`;
            a.click();
        }
    </script>
</body>
</html>
