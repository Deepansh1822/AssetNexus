<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AssetNexus</title>
    <link rel="icon" type="image/png" th:href="@{/images/AssetNexus.png}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #64748b;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow-x: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            position: relative;
            box-sizing: border-box;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
            color: var(--text-dim);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            transition: color 0.3s;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        input:focus+i {
            color: var(--primary);
        }

        .btn-login {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #ef4444;
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            display: none;
        }

        .footer-text {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-dim);
            font-size: 0.875rem;
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
            margin-top: -0.5rem;
            margin-bottom: 1.5rem;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: var(--primary);
        }

        .back-to-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-to-login:hover {
            color: var(--primary);
        }

        .hidden {
            display: none !important;
        }

        /* Decorative blobs */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(80px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: -1;
        }

        .blob-1 {
            top: -10%;
            right: -10%;
            background: #a855f7;
        }

        .blob-2 {
            bottom: -10%;
            left: -10%;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 1rem;
            }

            .login-card {
                padding: 2rem 1.5rem;
                border-radius: 20px;
            }

            h1 {
                font-size: 1.4rem;
            }

            .subtitle {
                font-size: 0.85rem;
            }

            label {
                font-size: 0.8rem;
                margin-bottom: 0.5rem;
            }

            input {
                font-size: 0.9rem;
                padding: 0.65rem 1rem 0.65rem 2.5rem;
            }

            .input-wrapper i {
                left: 0.85rem;
                font-size: 0.9rem;
            }

            .btn-login {
                padding: 0.75rem;
                font-size: 0.9rem;
            }

            .logo-icon {
                width: 48px;
                height: 48px;
                margin-bottom: 1rem;
                font-size: 1.5rem;
            }

            .logo-icon img {
                width: 32px;
                height: 32px;
            }

            .footer-text {
                font-size: 0.75rem;
                margin-top: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">
                    <img src="/images/AssetNexus.png" alt="Logo" width="64" height="64">
                </div>
                <h1>AssetNexus</h1>
                <p class="subtitle" id="formSubtitle">Management Excellence</p>
            </div>

            <div id="loginSection">
                <div th:if="${param.error}" class="error-message" style="display: block;">
                    <i class="fas fa-exclamation-circle"></i> Invalid credentials. Please try again.
                </div>

                <div th:if="${param.logout}" class="error-message"
                    style="display: block; border-left-color: #10b981; color: #6ee7b7; background: rgba(16, 185, 129, 0.1);">
                    <i class="fas fa-check-circle"></i> You have been logged out.
                </div>

                <form th:action="@{/login}" method="POST">
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" name="username" placeholder="name@company.com" required autofocus>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <a href="javascript:void(0)" class="forgot-link" onclick="toggleForgotPassword(true)">Forgot your password?</a>

                    <button type="submit" class="btn-login">
                        Sign In <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
            </div>

            <div id="forgotSection" class="hidden">
                <div id="forgotStatus" class="error-message"></div>
                
                <p style="text-align: center; margin-bottom: 2rem; color: var(--text-dim); font-size: 0.9rem;">
                    Enter your registered email address and we'll send you a link to reset your password.
                </p>

                <form id="forgotForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="forgotEmail" placeholder="name@company.com" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-login" id="forgotBtn">
                        Send Reset Link <i class="fas fa-paper-plane"></i>
                    </button>
                </form>

                <a href="javascript:void(0)" class="back-to-login" onclick="toggleForgotPassword(false)">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>

            <p class="footer-text">
                Enterprise Identity System
            </p>
        </div>
    </div>
    <script>
        function toggleForgotPassword(show) {
            const login = document.getElementById('loginSection');
            const forgot = document.getElementById('forgotSection');
            const h1 = document.querySelector('h1');
            const subtitle = document.getElementById('formSubtitle');

            if (show) {
                login.classList.add('hidden');
                forgot.classList.remove('hidden');
                h1.textContent = 'Reset Access';
                subtitle.textContent = "We'll help you get back in";
            } else {
                forgot.classList.add('hidden');
                login.classList.remove('hidden');
                h1.textContent = 'AssetNexus';
                subtitle.textContent = 'Management Excellence';
            }
        }

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            const btn = document.getElementById('forgotBtn');
            const status = document.getElementById('forgotStatus');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Sending...';
            
            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                status.style.display = 'block';
                if (res.ok) {
                    status.style.borderLeftColor = '#10b981';
                    status.style.color = '#6ee7b7';
                    status.style.background = 'rgba(16, 185, 129, 0.1)';
                    status.innerHTML = `<i class="fas fa-check-circle"></i> ${data.message}`;
                    document.getElementById('forgotForm').style.display = 'none';
                } else {
                    status.style.borderLeftColor = '#ef4444';
                    status.style.color = '#fca5a5';
                    status.style.background = 'rgba(239, 68, 68, 0.1)';
                    status.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${data.message}`;
                    btn.disabled = false;
                    btn.innerHTML = 'Send Reset Link <i class="fas fa-paper-plane"></i>';
                }
            } catch (err) {
                status.style.display = 'block';
                status.style.borderLeftColor = '#ef4444';
                status.style.color = '#fca5a5';
                status.style.background = 'rgba(239, 68, 68, 0.1)';
                status.innerHTML = `<i class="fas fa-exclamation-circle"></i> Service unavailable. Please try later.`;
                btn.disabled = false;
                btn.innerHTML = 'Send Reset Link <i class="fas fa-paper-plane"></i>';
            }
        });
    </script>
</body>

</html>
