<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labourer Directory | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/public/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/public/js/layout-loader.js" defer></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif !important;
        }

        .role-slider-wrapper {
            position: relative;
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 4px;
            width: fit-content;
            margin: 1rem 0;
        }

        .role-slider-wrapper input {
            display: none;
        }

        .role-slider-wrapper label {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            min-width: 85px;
            text-align: center;
            z-index: 2;
        }

        .slider-indicator {
            position: absolute;
            top: 4px;
            left: 4px;
            height: calc(100% - 8px);
            width: 85px;
            background: var(--primary);
            border-radius: 25px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        #filterAll:checked~.slider-indicator {
            transform: translateX(0);
        }

        #filterAdmin:checked~.slider-indicator {
            transform: translateX(85px);
        }

        #filterManager:checked~.slider-indicator {
            transform: translateX(170px);
        }

        #filterWorkforce:checked~.slider-indicator {
            transform: translateX(255px);
        }

        .role-slider-wrapper input:checked+label {
            color: white;
        }
    </style>
</head>

<body data-page="site-management" data-module="labour">
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="topbar-container"></div>
            <div class="dashboard-scrollable">
                <section class="welcome-section"
                    style="width: 100%; margin: 0 0 1rem; padding-left: 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; padding-bottom: 1.5rem; border-bottom: 1px solid #f1f5f9;">
                        <div style="display:flex; align-items:center; gap:1rem;">
                            <div
                                style="width: 45px; height: 45px; background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                                <i class="fas fa-users-viewfinder"></i>
                            </div>
                            <div>
                                <h1
                                    style="margin:0; font-size: 1.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px;">
                                    Labourer Directory</h1>
                                <p style="margin:0; font-size:0.9rem; color:var(--text-muted);">Complete personnel
                                    registry and stationing ledger.</p>
                            </div>
                        </div>

                        <div style="display:flex; gap:1rem;">
                            <a href="/register-labour.html" class="admin-only btn-primary"
                                style="height:45px; padding:0 1.5rem; border-radius:10px; text-decoration:none; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; background:var(--primary); border:none; color:white; cursor:pointer; gap:0.5rem; box-shadow: 0 4px 6px -1px rgba(99,102,241,0.2);">
                                <i class="fas fa-plus-circle"></i> Add New Member
                            </a>
                            <button onclick="exportDirectoryToCSV()" class="admin-only btn-primary"
                                style="height:45px; padding:0 1.5rem; border-radius:10px; text-decoration:none; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; background:#10b981; border:none; color:white; cursor:pointer; gap:0.5rem; box-shadow: 0 4px 6px -1px rgba(16,185,129,0.2);">
                                <i class="fas fa-file-csv"></i> Export CSV
                            </button>
                        </div>
                    </section>


                    <div class="card"
                        style="width: 100%; margin: 1.5rem 0 0; border-radius: 20px; padding: 1.5rem; border: 1px solid #e2e8f0; background: #ffffff;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid #f1f5f9;">
                            <h3 style="margin:0; font-weight:700; font-size:1.1rem; color:#475569;">Workforce Registry</h3>
                            <div style="flex:1; max-width: 350px; position:relative;">
                                <input type="text" id="directorySearch" oninput="applyRoleFilter()" placeholder="Search personnel..." 
                                    style="width:100%; height:38px; padding:0 1rem 0 2.5rem; border-radius:10px; border:1px solid #e2e8f0; background:#f8fafc; font-size:0.85rem; font-weight:500; outline:none;">
                                <i class="fas fa-search" style="position:absolute; left:0.85rem; top:50%; transform:translateY(-50%); color:#94a3b8; font-size:0.8rem;"></i>
                            </div>
                        </div>
                        <div class="table-responsive">
                            <table class="assets-table">
                                <thead>
                                    <tr>
                                        <th>Personnel ID</th>
                                        <th>Full Name</th>
                                        <th>Current Deployment</th>
                                        <th>Trade / Skill</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="labourTableBody">
                                    <tr>
                                        <td colspan="6" style="text-align:center; padding: 5rem;">
                                            <i class="fas fa-sync fa-spin"
                                                style="font-size:2rem; color:var(--primary); margin-bottom: 1rem;"></i>
                                            <p style="color:var(--text-muted);">Syncing with workforce database...</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div id="footer-container"></div>
                </div>
        </main>
    </div>

    <script>
        const API_BASE = '/api';
        let allLabour = [];
        let allStaff = [];
        let currentFilteredPersonnel = [];

        async function fetchAllPersonnel() {
            const tbody = document.getElementById('labourTableBody');
            try {
                const [authRes, labRes] = await Promise.all([
                    fetch('/api/auth/me'),
                    fetch('/api/labour/all')
                ]);
                
                const user = await authRes.json();
                allLabour = await labRes.json();
                
                // --- SITE MANAGER RESTRICTION ---
                if (user.userRole === 'SITE_MANAGER' && user.assignedSiteNames) {
                    allLabour = allLabour.filter(l => user.assignedSiteNames.includes(l.currentSite));
                }

                applyRoleFilter();
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:5rem;"><strong style="color:var(--text-main);">Database Sync Interrupted</strong></td></tr>`;
            }
        }

        document.querySelectorAll('input[name="roleFilter"]').forEach(r => r.addEventListener('change', applyRoleFilter));

        function applyRoleFilter() {
            const tbody = document.getElementById('labourTableBody');
            const query = document.getElementById('directorySearch').value.toLowerCase();

            // Strictly only show field labourers, excluding Administrative roles (Admins, Managers)
            let filtered = allLabour.filter(l => l.userRole === 'LABOURER');

            if (query) {
                filtered = filtered.filter(p => 
                    (p.name && p.name.toLowerCase().includes(query)) ||
                    (p.personnelId && p.personnelId.toLowerCase().includes(query)) ||
                    (p.trade && p.trade.toLowerCase().includes(query)) ||
                    (p.currentSite && p.currentSite.toLowerCase().includes(query))
                );
            }

            currentFilteredPersonnel = filtered;

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:5rem; color:var(--text-muted);">No field labourers found matching your criteria.</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(p => {
                const statusClass = p.status === 'ACTIVE' || p.status === 'AVAILABLE' ? 'available' : 'disposed';
                const roleLabel = p.trade || 'General Worker';
                const photoUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=6366f1&color=fff&size=32`;

                return `
                <tr>
                    <td><span class="a-tag" style="background:#f1f5f9; padding:0.3rem 0.6rem; border-radius:8px; font-weight:700;">${p.personnelId || 'N/A'}</span></td>
                    <td><div style="display:flex; align-items:center; gap:0.75rem;"><img src="${photoUrl}" style="width:32px; height:32px; border-radius:10px;"><div><strong>${p.name}</strong><br><small>${p.email || p.phone || ''}</small></div></div></td>
                    <td>${p.currentSite || 'CENTRAL POOL'}</td>
                    <td style="text-align:center;"><strong>${roleLabel}</strong></td>
                    <td><span class="status-badge ${statusClass}">${p.status}</span></td>
                    <td>
                        <div style="display:flex; gap:0.65rem; justify-content:center; align-items:center;">
                            <!-- View Details -->
                            <a href="/labour-details.html?id=${p.id}" class="btn-icon" title="Full Personnel Portfolio/History" style="color:#6366f1; background:#efefff;"><i class="fas fa-id-card"></i></a>
                            
                            <!-- Edit Profile -->
                            <a href="/register-labour.html?id=${p.id}" class="admin-only btn-icon" title="Edit Identity/Role Data" style="color:#6d28d9; background:#f5f3ff;"><i class="fas fa-edit"></i></a>
                            
                            <!-- Site Transfer -->
                            <a href="/transfer-site.html?id=${p.id}" class="btn-icon" title="Site Stationing / Relocate" style="color:#10b981; background:#ecfdf5;"><i class="fas fa-map-location-dot"></i></a>
                            
                            <!-- Release / HQ Return -->
                            <button onclick="handleAction(${p.id}, 'unassign')" class="btn-icon" title="Release to Available Inventory" style="color:#f59e0b; background:#fffbeb; border:none; cursor:pointer;"><i class="fas fa-person-arrow-down-to-line"></i></button>

                            <!-- Toggle Disable/Enable -->
                            <button onclick="handleAction(${p.id}, 'deactivate')" class="btn-icon" title="${p.status === 'DISABLED' ? 'Enable Personnel' : 'Disable Personnel'}" style="color:${p.status === 'DISABLED' ? '#10b981' : '#64748b'}; background:${p.status === 'DISABLED' ? '#ecfdf5' : '#f8fafc'}; border:none; cursor:pointer;">
                                <i class="fas ${p.status === 'DISABLED' ? 'fa-user-check' : 'fa-user-slash'}"></i>
                            </button>

                            <!-- Dispose (No database deletion) -->
                            <button onclick="handleAction(${p.id}, 'dispose')" class="btn-icon" title="Final Separation / Dispose" style="color:#ef4444; background:#fef2f2; border:none; cursor:pointer;">
                                <i class="fas fa-user-minus"></i>
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        async function handleAction(id, action) {
            if (!confirm(`Are you sure you want to execute this personnel action?`)) return;
            try {
                const response = await fetch(`/api/labour/${id}/${action}`, { method: 'POST' });
                if (response.ok) {
                    fetchAllPersonnel();
                } else {
                    const errorMsg = await response.text();
                    alert(errorMsg || 'Action failed.');
                }
            } catch (err) { alert('Network or sync interrupted.'); }
        }

        function exportDirectoryToCSV() {
            if (currentFilteredPersonnel.length === 0) return alert("Nothing to export!");
            const headers = ["Personnel_ID", "Full_Name", "Role", "Deployment", "Trade", "Phone_Email", "Status"];
            const csvRows = [headers.join(",")];
            currentFilteredPersonnel.forEach(p => {
                csvRows.push([
                    p.personnelId || 'N/A',
                    `"${p.name}"`,
                    p.uiRole,
                    `"${p.currentSite || (p.isLabour ? 'AVAILABLE' : 'HQ')}"`,
                    `"${p.trade}"`,
                    `"${p.phone || p.email || ''}"`,
                    p.status
                ].join(","));
            });
            const blob = new Blob([csvRows.join("\n")], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Workforce_Directory_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        window.onload = fetchAllPersonnel;
    </script>
</body>

</html>
