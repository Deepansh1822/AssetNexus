<!-- Global Modals and Elements from the original scripts fragment -->
<div id="globalBarcodeModal" class="modal">
    <div class="modal-content" style="max-width: 450px;">
        <div class="modal-header">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div class="kpi-icon indigo" style="width: 40px; height: 40px; font-size: 1rem;"><i
                        class="fas fa-id-card"></i></div>
                <h2 style="margin:0;">Asset Identity BarCode</h2>
            </div>
            <button class="close-modal" id="closeBarButton">&times;</button>
        </div>
        <div class="modal-body" style="text-align: center;">
            <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">
                Static identification for physical tracking and audit.
            </p>

            <div class="barcode-info-card" id="barcodePrintArea">
                <div class="barcode-wrapper">
                    <svg id="globalBarcodeOutput"></svg>
                </div>

                <div class="static-details-grid">
                    <div class="detail-item">
                        <label>Asset Name</label>
                        <span id="bc_assetName">N/A</span>
                    </div>
                    <div class="detail-item">
                        <label>Asset Tag</label>
                        <span id="bc_assetTag">N/A</span>
                    </div>
                    <div class="detail-item">
                        <label>Category</label>
                        <span id="bc_category">N/A</span>
                    </div>
                    <div class="detail-item">
                        <label>Serial No.</label>
                        <span id="bc_serial">N/A</span>
                    </div>
                    <div class="detail-item" style="grid-column: span 2;">
                        <label>Model</label>
                        <span id="bc_model">N/A</span>
                    </div>
                </div>
            </div>

            <div class="share-actions" style="grid-template-columns: 1fr;">
                <button class="btn-share email" id="openEmailButton" style="width: 100%;"><i
                        class="fas fa-envelope"></i> Share via Email</button>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" id="closeBarButtonBottom">Close</button>
            <button class="btn-submit" onclick="downloadAssetPdf()"><i class="fas fa-file-pdf"></i> Download PDF</button>
        </div>
    </div>
</div>

<div id="emailShareModal" class="modal" style="z-index: 1001;">
    <div class="modal-content" style="max-width: 400px; padding: 2rem;">
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <i class="fas fa-paper-plane"
                style="font-size: 2.5rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <h3 style="font-size: 1.25rem; font-weight: 700; color: var(--text-main);">Share Asset Identity</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Send the static details of this asset to anyone.</p>
        </div>

        <div class="form-group">
            <label for="shareRecipientEmail">Recipient Email Address</label>
            <input type="email" id="shareRecipientEmail" class="form-control"
                placeholder="colleague@example.com" required>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button class="btn-secondary" id="closeEmailButton" style="flex: 1;">Cancel</button>
            <button id="submitEmailBtn" class="btn-submit" onclick="submitEmailShare()" style="flex: 1;">Send Now</button>
        </div>
    </div>
</div>

<div id="customConfirmModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <i class="fas fa-exclamation-circle"></i>
        <h3>Are you sure?</h3>
        <p id="confirmMessage">Do you really want to proceed with this action?</p>
        <div class="confirm-actions">
            <button class="btn-cancel" onclick="handleConfirm(false)">Cancel</button>
            <button class="btn-confirm" onclick="handleConfirm(true)">Confirm</button>
        </div>
    </div>
</div>
