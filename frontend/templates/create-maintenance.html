<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: header-assets}">
    <title>Create Maintenance Request | AssetNexus</title>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside th:replace="~{fragments/layout :: sidebar('maintenance')}"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header th:replace="~{fragments/layout :: topbar}"></header>

            <div class="dashboard-scrollable">
                <section class="welcome-section" id="maintenanceWelcome">
                    <h1><i class="fas fa-clipboard-list" style="margin-right: 0.5rem; color: var(--primary);"></i>Create
                        Maintenance Request</h1>
                    <p>Submit a new maintenance request for an asset</p>
                </section>

                <!-- Branch Selection Landing -->
                <section class="card glass branch-landing" id="branchLanding">
                    <div class="card-header" style="border-bottom: none; text-align: center; display: block; padding-top: 3rem;">
                        <div class="kpi-icon indigo" style="width: 80px; height: 80px; font-size: 2rem; margin: 0 auto 1.5rem;"><i class="fas fa-tools"></i></div>
                        <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Select Branch for Maintenance</h2>
                        <p style="color: var(--text-muted);">Identify the location to find local assets needing service.</p>
                    </div>
                    <div class="card-body" style="padding: 2rem 3rem 4rem; max-width: 600px; margin: 0 auto;">
                        <div class="form-group">
                            <label style="font-weight: 600; margin-bottom: 1rem; display: block; text-align: center;">Branch Selection</label>
                            <select id="initialBranchFilter" class="form-control" style="height: 55px; border-radius: 15px; font-size: 1.1rem; text-align-last: center; border: 2px solid var(--border-color); background: var(--bg-card); cursor: pointer; transition: all 0.3s ease;">
                                <option value="" disabled selected>-- Choose a Branch --</option>
                                <option value="ALL">All Branches (Global Inventory)</option>
                            </select>
                        </div>
                        <div style="margin-top: 2rem; text-align: center;">
                            <button class="btn-submit" onclick="revealForm()" style="width: 100%; height: 55px; border-radius: 15px; font-size: 1rem;">
                                <i class="fas fa-arrow-right"></i> Continue to Form
                            </button>
                        </div>
                    </div>
                </section>

                <div id="mainFormContent" style="display: none;">
                    <section class="card glass form-card">
                        <div class="card-header">
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <div class="kpi-icon blue" style="width: 40px; height: 40px; font-size: 1rem;"><i
                                        class="fas fa-plus-circle"></i></div>
                                <h2 style="margin:0;">New Maintenance Request</h2>
                            </div>
                            <!-- Switch Branch Button -->
                            <div style="margin-left: auto; display: flex; align-items: center; gap: 0.75rem;">
                                <div class="duration-badge" style="background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); color: var(--primary); font-size: 0.75rem; padding: 0.2rem 0.6rem;">
                                    <i class="fas fa-building" style="margin-right: 4px;"></i>
                                    <span id="activeBranchName">Branch</span>
                                </div>
                                <button onclick="switchBranchMode()" class="btn-icon btn-switch" title="Change Branch" style="background: var(--bg-card); border: 1px solid var(--border-color); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; transition: all 0.3s ease;">
                                    <i class="fas fa-random" style="font-size: 0.7rem;"></i>
                                </button>
                            </div>
                        </div>
                    <div class="card-body">
                        <form id="maintenanceForm">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="assetSelect">Select Asset *</label>
                                    <select id="assetSelect" class="form-control" required>
                                        <option value="">-- Choose Asset --</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="priority">Priority *</label>
                                    <select id="priority" class="form-control" required>
                                        <option value="LOW">Low</option>
                                        <option value="MEDIUM" selected>Medium</option>
                                        <option value="HIGH">High</option>
                                        <option value="URGENT">Urgent</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label for="type">Type *</label>
                                    <select id="type" class="form-control" required>
                                        <option value="REPAIR" selected>Repair</option>
                                        <option value="UPGRADE">Upgrade</option>
                                        <option value="PREVENTIVE">Preventive</option>
                                        <option value="INSPECTION">Inspection</option>
                                    </select>
                                </div>

                                <!-- Removed Initial Status as it must always be PENDING at start -->

                                <div class="form-group">
                                    <label for="assignedTechnician">Assigned Technician / Vendor</label>
                                    <input type="text" id="assignedTechnician" class="form-control"
                                        placeholder="e.g. John Doe, Dell Service Unit...">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="issueDescription">Issue Description *</label>
                                <textarea id="issueDescription" class="form-control" rows="5"
                                    placeholder="Describe the maintenance issue in detail..." required></textarea>
                            </div>

                            <div class="form-group">
                                <label for="adminNotes">Admin Notes (Optional)</label>
                                <textarea id="adminNotes" class="form-control" rows="3"
                                    placeholder="Add any internal notes..."></textarea>
                            </div>

                            <div class="form-actions">
                                <button type="button" class="btn-secondary"
                                    onclick="window.history.back()">Cancel</button>
                                <button type="submit" class="btn-submit">Create Request</button>
                            </div>
                        </form>
                    </div>
                </section>

                <!-- Asset Preview Card -->
                <section id="assetPreview" class="card glass form-card" style="display: none; margin-top: 1.5rem;">
                    <div class="card-header">
                        <h3>Selected Asset Details</h3>
                    </div>
                    <div class="card-body">
                        <div class="asset-preview-grid">
                            <div class="preview-item">
                                <span class="label">Asset Name:</span>
                                <span id="previewName">-</span>
                            </div>
                            <div class="preview-item">
                                <span class="label">Asset Tag:</span>
                                <span id="previewTag">-</span>
                            </div>
                            <div class="preview-item">
                                <span class="label">Category:</span>
                                <span id="previewCategory">-</span>
                            </div>
                            <div class="preview-item">
                                <span class="label">Status:</span>
                                <span id="previewStatus">-</span>
                            </div>
                            <div class="preview-item">
                                <span class="label">Assigned To:</span>
                                <span id="previewEmployee">-</span>
                            </div>
                        </div>
                    </div>
                </section>
                </div>
            <footer th:replace="~{fragments/layout :: main-footer}"></footer>
            </div>
        </main>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
    <style>
        .btn-switch:hover {
            border-color: var(--primary) !important;
            background-color: rgba(99, 102, 241, 0.05) !important;
            color: var(--primary) !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .animate-slide-up {
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .duration-badge {
            display: inline-flex;
            align-items: center;
            border-radius: 6px;
            font-weight: 600;
        }
    </style>
    <script>
        let assets = [];
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadAssets();
            loadCurrentUser();

            document.getElementById('assetSelect').addEventListener('change', showAssetPreview);
            document.getElementById('maintenanceForm').addEventListener('submit', handleSubmit);
        });

        async function loadAssets() {
            try {
                const [assetsRes, requestsRes] = await Promise.all([
                    fetch('/api/assets'),
                    fetch('/api/maintenance')
                ]);
                const data = await assetsRes.json();
                const requests = await requestsRes.json();
                
                // Active maintenance check
                const blockedAssetIds = new Set(
                    requests.filter(r => r.status === 'PENDING' || r.status === 'IN_PROGRESS').map(r => r.asset.id)
                );
                
                assets = data.filter(a => a.status !== 'DISPOSED' && !blockedAssetIds.has(a.id));
                populateBranchDropdown(assets);
            } catch (err) {
                console.error('Error loading assets:', err);
            }
        }

        function populateBranchDropdown(data) {
            const initialSelect = document.getElementById('initialBranchFilter');
            const branches = [...new Set(data.map(a => a.employee ? a.employee.branchName : a.location).filter(b => b))].sort();
            
            branches.forEach(branch => {
                const opt = document.createElement('option');
                opt.value = branch;
                opt.textContent = branch;
                initialSelect.appendChild(opt);
            });
        }

        function revealForm() {
            const selected = document.getElementById('initialBranchFilter').value;
            if (!selected) {
                showAlert('Please select a branch first', 'warning');
                return;
            }

            // Sync Asset Dropdown based on branch
            const select = document.getElementById('assetSelect');
            select.innerHTML = '<option value="">-- Choose Asset --</option>';
            
            const filteredAssets = selected === 'ALL' 
                ? assets 
                : assets.filter(a => (a.employee && a.employee.branchName === selected) || (!a.employee && a.location === selected));

            filteredAssets.forEach(asset => {
                const option = document.createElement('option');
                option.value = asset.id;
                option.textContent = `${asset.name} - #${asset.assetTag || 'N/A'}`;
                select.appendChild(option);
            });

            // UI Updates
            document.getElementById('activeBranchName').textContent = selected === 'ALL' ? 'All Branches' : selected;
            document.getElementById('branchLanding').classList.add('animate-slide-up');
            
            setTimeout(() => {
                document.getElementById('branchLanding').style.display = 'none';
                document.getElementById('mainFormContent').style.display = 'block';
                document.getElementById('mainFormContent').classList.add('animate-slide-up');
            }, 300);
        }

        function switchBranchMode() {
            document.getElementById('branchLanding').style.display = 'block';
            document.getElementById('mainFormContent').style.display = 'none';
            document.getElementById('initialBranchFilter').value = '';
            document.getElementById('assetSelect').value = '';
            document.getElementById('assetPreview').style.display = 'none';
        }

        function loadCurrentUser() {
            // In a real app, fetch from /api/auth/current-user or similar
            // For now, we'll use a placeholder
            fetch('/api/employees')
                .then(res => res.json())
                .then(employees => {
                    // Assuming first admin user
                    currentUser = employees.find(e => e.userRole === 'ADMIN') || employees[0];
                })
                .catch(err => console.error('Error loading user:', err));
        }

        function showAssetPreview() {
            const assetId = document.getElementById('assetSelect').value;
            if (!assetId) {
                document.getElementById('assetPreview').style.display = 'none';
                return;
            }

            const asset = assets.find(a => a.id == assetId);
            if (asset) {
                document.getElementById('previewName').textContent = asset.name;
                document.getElementById('previewTag').textContent = asset.assetTag || 'N/A';
                document.getElementById('previewCategory').textContent = asset.category ? asset.category.name : 'N/A';
                document.getElementById('previewStatus').innerHTML = `<span class="status-badge ${asset.status.toLowerCase().replace('_', '-')}">${asset.status}</span>`;
                document.getElementById('previewEmployee').textContent = asset.employee ? asset.employee.name : 'Unassigned';
                document.getElementById('assetPreview').style.display = 'block';
            }
        }

        function handleSubmit(e) {
            e.preventDefault();

            if (!currentUser) {
                showAlert('Unable to identify current user. Please refresh and try again.', 'error');
                return;
            }

            const assetId = document.getElementById('assetSelect').value;
            const priority = document.getElementById('priority').value;
            const type = document.getElementById('type').value;
            const issueDescription = document.getElementById('issueDescription').value;
            const adminNotes = document.getElementById('adminNotes').value;
            const assignedTechnician = document.getElementById('assignedTechnician').value;

            const submitBtn = e.target.querySelector('.btn-submit');
            setBtnLoading(submitBtn, true, 'Creating...');

            const requestData = {
                asset: { id: parseInt(assetId) },
                requestedBy: { id: currentUser.id },
                issueDescription: issueDescription,
                priority: priority,
                status: 'PENDING',
                maintenanceType: type,
                adminNotes: adminNotes || null,
                assignedTechnician: assignedTechnician || null,
                requestedByAdmin: true
            };

            fetch('/api/maintenance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            })
                .then(async res => {
                    if (res.ok) {
                        showAlert('Maintenance request created successfully!');
                        setTimeout(() => window.location.href = '/maintenance/requests', 1500);
                    } else {
                        const errData = await res.json().catch(() => ({}));
                        throw new Error(errData.message || 'Failed to create request');
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    showAlert(err.message || 'Failed to create maintenance request. Please try again.', 'error');
                    setBtnLoading(submitBtn, false);
                });
        }
    </script>

</body>

</html>
