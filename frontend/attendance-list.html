<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Registry | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/public/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/public/js/layout-loader.js" defer></script>
</head>

<body data-page="site-management" data-module="labour">
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="topbar-container"></div>
            <div class="dashboard-scrollable" style="padding: 1rem 0;">
                
                <section class="welcome-section" style="width: 95%; margin: 0 auto 1rem; padding-left: 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;">
                    <div style="display:flex; align-items:center; gap:1rem;">
                        <div style="width: 45px; height: 45px; background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                            <i class="fas fa-clipboard-user"></i>
                        </div>
                        <div>
                            <h1 style="margin:0; font-size: 1.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px;">Daily Attendance Registry</h1>
                            <p style="margin:0; font-size:0.9rem; color:var(--text-muted);">Verify and mark workforce presence for project site records.</p>
                        </div>
                    </div>
                    
                    <div style="display:flex; gap:0.75rem; align-items:center;">
                        <input type="date" id="attendanceDate" onchange="loadView()" style="height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; background:#f8fafc; font-weight:600; font-size:0.9rem;">
                        <select id="siteFilter" onchange="loadView()" style="height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; font-weight:600; min-width:240px; background:white; font-size:0.9rem;">
                            <option value="">Select Project Site</option>
                        </select>
                    </div>
                </section>

                <!-- Quick Stats Dashboard -->
                <div class="stats-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; width: 95%; margin: 1rem auto;">
                    <div class="card" style="padding: 1rem; text-align: center; border-radius: 15px; border: 1px solid #e2e8f0; background:#f8fafc;">
                        <small style="color: #64748b; font-weight:700; text-transform:uppercase; letter-spacing:1px; font-size:0.7rem;">Active Workforce</small>
                        <h2 id="totalCount" style="margin:0.25rem 0 0; font-size:1.75rem; font-weight:800; color:var(--text-main);">0</h2>
                    </div>
                    <div class="card" style="padding: 1rem; text-align: center; border-radius: 15px; border: 1px solid #d1fae5; background:#ecfdf5;">
                        <small style="color: #10b981; font-weight:700; text-transform:uppercase; letter-spacing:1px; font-size:0.7rem;">Present</small>
                        <h2 id="presentCount" style="margin:0.25rem 0 0; font-size:1.75rem; font-weight:800; color: #10b981;">0</h2>
                    </div>
                    <div class="card" style="padding: 1rem; text-align: center; border-radius: 15px; border: 1px solid #fef3c7; background:#fffbeb;">
                        <small style="color: #b45309; font-weight:700; text-transform:uppercase; letter-spacing:1px; font-size:0.7rem;">Half Day</small>
                        <h2 id="halfDayCount" style="margin:0.25rem 0 0; font-size:1.75rem; font-weight:800; color: #b45309;">0</h2>
                    </div>
                    <div class="card" style="padding: 1rem; text-align: center; border-radius: 15px; border: 1px solid #fee2e2; background:#fef2f2;">
                        <small style="color: #ef4444; font-weight:700; text-transform:uppercase; letter-spacing:1px; font-size:0.7rem;">Absent</small>
                        <h2 id="absentCount" style="margin:0.25rem 0 0; font-size:1.75rem; font-weight:800; color: #ef4444;">0</h2>
                    </div>
                </div>

                <div class="card" style="width: 95%; margin: 1.5rem auto 0; border-radius: 20px; padding: 1rem; border: 1px solid #e2e8f0; background: #ffffff;">
                    <div class="table-responsive">
                        <table class="assets-table">
                            <thead>
                                <tr>
                                    <th>Personnel Detail</th>
                                    <th>Trade Category</th>
                                    <th>Marked Status</th>
                                    <th>Attendance Control</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceTable">
                                <tr>
                                    <td colspan="4" style="text-align:center; padding:5rem; color:var(--text-muted);">
                                        Please select a project site to view assigned personnel.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="footer-container" style="width: 95%; margin: 0 auto;"></div>
            </div>
        </main>
    </div>

    <script>
        // Initialize state on load
        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('attendanceDate').value = today;
            loadSites();
        };

        async function loadSites() {
            try {
                const res = await fetch('/api/sites/all');
                const sites = await res.json();
                const siteFilter = document.getElementById('siteFilter');
                
                // SITE_MANAGER ENFORCEMENT
                let availableSites = sites;
                let checkUser = setInterval(() => {
                    if (window.userContext) {
                        clearInterval(checkUser);
                        const user = window.userContext;
                        
                        if (user.userRole === 'SITE_MANAGER' && user.assignedSiteNames) {
                            availableSites = sites.filter(s => user.assignedSiteNames.includes(s.name));
                        }

                        if (availableSites.length) {
                            siteFilter.innerHTML = '<option value="">Select Project Site</option>' +
                                availableSites.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                        } else {
                            siteFilter.innerHTML = '<option value="">No Active Sites Found</option>';
                        }

                        if (user.userRole === 'SITE_MANAGER' && user.assignedSiteNames) {
                            if (user.assignedSiteNames.length === 1) {
                                // Find the ID for the single site
                                const mySite = availableSites.find(s => s.name === user.assignedSiteNames[0]);
                                if (mySite) {
                                    siteFilter.value = mySite.id;
                                    siteFilter.disabled = true;
                                    loadView();
                                }
                            }
                        }
                    }
                }, 100);
            } catch (err) { console.error('Site sync failed'); }
        }

        async function loadView() {
            const siteFilter = document.getElementById('siteFilter');
            const table = document.getElementById('attendanceTable');
            const dateInput = document.getElementById('attendanceDate');

            // Force date if empty
            if (!dateInput.value) {
                dateInput.value = new Date().toISOString().split('T')[0];
            }
            const date = dateInput.value;
            const siteId = siteFilter.value;

            if (!siteId) {
                table.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:5rem; color:var(--text-muted);">Please select a project site to view assigned personnel.</td></tr>';
                return;
            }

            try {
                const siteName = siteFilter.options[siteFilter.selectedIndex].text;

                // Fetch site-specific Labourers and Attendance in parallel
                const [labRes, attRes] = await Promise.all([
                    fetch(`/api/labour/by-site?siteName=${encodeURIComponent(siteName)}`),
                    fetch(`/api/attendance/by-date?date=${date}`)
                ]);

                if (!labRes.ok || !attRes.ok) throw new Error('API Sync Failed');

                const filtered = await labRes.json();
                const existingRecords = await attRes.json();

                // Calculate Stats
                const stats = { total: filtered.length, present: 0, half: 0, absent: 0 };
                filtered.forEach(lab => {
                    const record = existingRecords.find(r => r.labourer.id === lab.id);
                    if (record?.status === 'PRESENT') stats.present++;
                    else if (record?.status === 'HALF_DAY') stats.half++;
                    else if (record?.status === 'ABSENT') stats.absent++;
                });

                // Update Stats UI
                document.getElementById('totalCount').innerText = stats.total;
                document.getElementById('presentCount').innerText = stats.present;
                document.getElementById('halfDayCount').innerText = stats.half;
                document.getElementById('absentCount').innerText = stats.absent;

                if (filtered.length === 0) {
                    table.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:5rem; color:var(--text-muted);">No personnel currently assigned to this site.</td></tr>';
                    return;
                }

                table.innerHTML = filtered.map(lab => {
                    const record = existingRecords.find(r => r.labourer.id === lab.id);
                    const status = record ? record.status : 'UNMARKED';

                    let statusStyle = 'background:#f1f5f9; color:#64748b;';
                    if (status === 'PRESENT') statusStyle = 'background:rgba(16,185,129,0.1); color:var(--green);';
                    if (status === 'ABSENT') statusStyle = 'background:rgba(239,68,68,0.1); color:var(--red);';
                    if (status === 'HALF_DAY') statusStyle = 'background:rgba(245,158,11,0.1); color:#b45309;';
                    if (status === 'PAID_LEAVE' || status === 'HOLIDAY') statusStyle = 'background:rgba(110,231,183,0.1); color:#059669;';

                    return `
                        <tr>
                            <td>
                                <div style="display:flex; align-items:center; gap:0.75rem; justify-content:flex-start; text-align:left;">
                                <img src="${lab.hasImage ? '/api/labour/' + lab.id + '/image' : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(lab.name) + '&background=6366f1&color=fff&size=32'}" 
                                     style="width:32px; height:32px; border-radius:8px;">
                                    <div><strong class="a-title">${lab.name}</strong><br><small style="color:var(--text-muted);">${lab.personnelId}</small></div>
                                </div>
                            </td>
                            <td><span style="font-weight:600;">${lab.trade}</span></td>
                            <td><span id="status-${lab.id}" class="status-badge" style="${statusStyle}">${status}</span></td>
                            <td>
                                <div style="display:flex; gap:0.5rem; justify-content:center;">
                                    <button class="attendance-btn present" onclick="markStatus(${lab.id}, 'PRESENT')"><i class="fas fa-check"></i> Present</button>
                                    <button class="attendance-btn half-day" onclick="markStatus(${lab.id}, 'HALF_DAY')">Half Day</button>
                                    <button class="attendance-btn absent" onclick="markStatus(${lab.id}, 'ABSENT')"><i class="fas fa-times"></i> Absent</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (err) { table.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red; padding:3rem;">Connection error.</td></tr>'; }
        }

        async function markStatus(labId, status) {
            const date = document.getElementById('attendanceDate').value;
            const siteId = document.getElementById('siteFilter').value;

            try {
                const res = await fetch(`/api/attendance/mark?labourerId=${labId}&date=${date}&status=${status}&siteId=${siteId}`, { method: 'POST' });
                if (res.ok) {
                    const badge = document.getElementById(`status-${labId}`);
                    badge.innerText = status;
                    badge.className = 'status-badge ' + (status === 'PRESENT' ? 'available' : (status === 'ABSENT' ? 'disposed' : 'under-maintenance'));

                    // Reset style then apply specifics
                    badge.style.background = '';
                    badge.style.color = '';

                    if (status === 'PRESENT') badge.style.background = 'rgba(16,185,129,0.1)';
                    if (status === 'ABSENT') badge.style.background = 'rgba(239,68,68,0.1)';
                    if (status === 'HALF_DAY') { badge.style.background = 'rgba(245,158,11,0.1)'; badge.style.color = '#b45309'; }
                } else {
                    const errorMsg = await res.text();
                    alert('Action Failed: ' + errorMsg);
                }
                // Refresh stats after change
                await updateSummaryOnly();
            } catch (err) { alert('Failed to contact server.'); }
        }

        async function updateSummaryOnly() {
            const date = document.getElementById('attendanceDate').value;
            const siteFilter = document.getElementById('siteFilter');
            const siteName = siteFilter.options[siteFilter.selectedIndex].text;

            try {
                const [labRes, attRes] = await Promise.all([
                    fetch(`/api/labour/by-site?siteName=${encodeURIComponent(siteName)}`),
                    fetch(`/api/attendance/by-date?date=${date}`)
                ]);
                const labs = await labRes.json();
                const records = await attRes.json();

                const stats = { present: 0, half: 0, absent: 0 };
                labs.forEach(lab => {
                    const record = records.find(r => r.labourer.id === lab.id);
                    if (record?.status === 'PRESENT') stats.present++;
                    else if (record?.status === 'HALF_DAY') stats.half++;
                    else if (record?.status === 'ABSENT') stats.absent++;
                });

                document.getElementById('presentCount').innerText = stats.present;
                document.getElementById('halfDayCount').innerText = stats.half;
                document.getElementById('absentCount').innerText = stats.absent;
            } catch (e) { console.error('Stat sync failed'); }
        }

        window.onload = loadSites;
    </script>
</body>

</html>
