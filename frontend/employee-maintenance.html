<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Maintenance Requests | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/images/AssetNexus.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script src="/public/js/layout-loader.js" defer></script>
</head>

<body class="loading" data-page="maintenance">
    <div class="app-container">
        <!-- Sidebar -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <div id="topbar-container"></div>

            <div class="dashboard-scrollable">
                <!-- Statistics Cards (Employee) -->
                <section class="kpi-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); margin-bottom: 2rem;">
                    <div class="kpi-card glass">
                        <div class="kpi-icon blue"><i class="fas fa-clipboard-list"></i></div>
                        <div class="kpi-data">
                            <h3>My Total</h3>
                            <p class="number" id="myTotalReqs">0</p>
                        </div>
                    </div>
                    <div class="kpi-card glass">
                        <div class="kpi-icon amber"><i class="fas fa-clock"></i></div>
                        <div class="kpi-data">
                            <h3>Pending</h3>
                            <p class="number" id="myPendingReqs">0</p>
                        </div>
                    </div>
                    <div class="kpi-card glass">
                        <div class="kpi-icon green"><i class="fas fa-check-circle"></i></div>
                        <div class="kpi-data">
                            <h3>Resolved</h3>
                            <p class="number" id="myResolvedReqs">0</p>
                        </div>
                    </div>
                </section>

                <!-- Request Form -->
                <section class="card glass form-card" style="margin-bottom: 2rem;">
                    <div class="card-header">
                        <h2>Submit New Request</h2>
                    </div>
                    <div class="card-body">
                        <form id="requestForm" class="asset-form" style="padding: 1.5rem;">
                            <div class="form-grid">
                                <div class="form-group full-width">
                                    <label for="assetSelect">Select Your Asset *</label>
                                    <select id="assetSelect" class="form-control" required>
                                        <option value="">-- Choose Asset --</option>
                                    </select>
                                    <small class="form-text" style="color:var(--text-muted);">Only assets assigned to you are shown</small>
                                </div>

                                <div class="form-group">
                                    <label for="priority">Priority *</label>
                                    <select id="priority" class="form-control" required>
                                        <option value="LOW">Low - Can wait</option>
                                        <option value="MEDIUM" selected>Medium - Normal priority</option>
                                        <option value="HIGH">High - Needs attention soon</option>
                                        <option value="URGENT">Urgent - Critical issue</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label for="type">Maintenance Type *</label>
                                    <select id="type" class="form-control" required>
                                        <option value="REPAIR" selected>Repair</option>
                                        <option value="UPGRADE">Upgrade</option>
                                        <option value="INSPECTION">Inspection</option>
                                        <option value="PREVENTIVE">Preventive</option>
                                    </select>
                                </div>

                                <div class="form-group full-width">
                                    <label for="issueDescription">Describe the Issue *</label>
                                    <textarea id="issueDescription" class="form-control" rows="3" placeholder="Describe the issue in detail..." required></textarea>
                                </div>
                            </div>
                            <div class="form-actions" style="margin-top: 1rem;">
                                <button type="reset" class="btn-secondary">Clear</button>
                                <button type="submit" class="btn-submit">Submit Request</button>
                            </div>
                        </form>
                    </div>
                </section>

                <!-- My Requests Table -->
                <section class="card glass">
                    <div class="card-header">
                        <h1><i class="fas fa-wrench" style="margin-right: 0.5rem; color: var(--primary);"></i>My Maintenance Requests</h1>
                        <p>Track and manage maintenance requests for your assigned assets</p>
                        <div class="header-actions" style="display: flex; gap: 1rem;">
                            <!-- Type Filter -->
                            <div style="position: relative; display: flex; align-items: center;">
                                <i class="fas fa-tools" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                                <select id="filterType" class="form-control" style="width: auto; padding-left: 2.5rem;">
                                    <option value="all">All Types</option>
                                    <option value="REPAIR">Repair</option>
                                    <option value="UPGRADE">Upgrade</option>
                                    <option value="INSPECTION">Inspection</option>
                                    <option value="PREVENTIVE">Preventive</option>
                                </select>
                            </div>
                            <!-- Status Filter -->
                            <div style="position: relative; display: flex; align-items: center;">
                                <i class="fas fa-filter" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                                <select id="filterStatus" class="form-control" style="width: auto; padding-left: 2.5rem;">
                                    <option value="all">All Status</option>
                                    <option value="PENDING">Pending</option>
                                    <option value="IN_PROGRESS">In Progress</option>
                                    <option value="COMPLETED">Completed</option>
                                    <option value="CANCELLED">Cancelled</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="assets-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Asset</th>
                                    <th>Type</th>
                                    <th>Technician</th>
                                    <th>Issue</th>
                                    <th>Priority</th>
                                    <th>Status</th>
                                    <th>Submitted</th>
                                    <th>Completed</th>
                                    <th>Admin Notes</th>
                                    <th style="text-align: center;">Action</th>
                                </tr>
                            </thead>
                            <tbody id="requestsTableBody">
                                <!-- Data loaded via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>
                <!-- Footer -->
                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8085/api';
        let myAssets = [];
        let myRequests = [];
        let currentEmployee = null;

        function showToast(message, type = 'success') {
            Toastify({
                text: message,
                duration: 3000,
                close: true,
                gravity: "top",
                position: "right",
                backgroundColor: type === 'success' ? "#10b981" : "#ef4444",
                style: { borderRadius: "10px", padding: "12px 24px", fontSize: "14px", fontWeight: "600" }
            }).showToast();
        }

        function setBtnLoading(btn, isLoading, text = 'Processing...') {
            if (isLoading) {
                btn.dataset.originalText = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${text}`;
                btn.disabled = true;
            } else {
                btn.innerHTML = btn.dataset.originalText || btn.innerHTML;
                btn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCurrentEmployee();

            document.getElementById('requestForm').addEventListener('submit', handleSubmit);
            document.getElementById('filterStatus').addEventListener('change', filterRequests);
            document.getElementById('filterType').addEventListener('change', filterRequests);
        });

        function loadCurrentEmployee() {
            fetch(`${API_BASE}/auth/me`)
                .then(res => {
                    if (!res.ok) throw new Error('Not authenticated');
                    return res.json();
                })
                .then(employee => {
                    if (employee.userRole !== 'EMPLOYEE') {
                        console.warn('Current user is not an EMPLOYEE');
                    }
                    currentEmployee = employee;
                    loadMyAssets();
                    loadMyRequests();
                })
                .catch(err => {
                    console.error('Error loading employee:', err);
                    showToast('Authentication error map failed.', 'error');
                });
        }

        function loadMyAssets() {
            fetch(`${API_BASE}/assets`)
                .then(res => res.json())
                .then(assets => {
                    myAssets = assets.filter(a => a.employee && a.employee.id === currentEmployee.id);
                    const select = document.getElementById('assetSelect');
                    if (myAssets.length === 0) {
                        select.innerHTML = '<option value="">No assets assigned to you</option>';
                        select.disabled = true;
                        document.querySelector('button[type="submit"]').disabled = true;
                    } else {
                        myAssets.forEach(asset => {
                            const option = document.createElement('option');
                            option.value = asset.id;
                            option.textContent = `${asset.name} - #${asset.assetTag || 'N/A'}`;
                            select.appendChild(option);
                        });
                    }
                })
                .catch(err => console.error('Error loading assets:', err));
        }

        function loadMyRequests() {
            fetch(`${API_BASE}/maintenance/employee/${currentEmployee.id}`)
                .then(res => res.json())
                .then(requests => {
                    myRequests = requests;
                    updateStats();
                    filterRequests();
                })
                .catch(err => console.error('Error loading requests:', err));
        }

        function updateStats() {
            document.getElementById('myTotalReqs').textContent = myRequests.length;
            document.getElementById('myPendingReqs').textContent = myRequests.filter(r => r.status === 'PENDING').length;
            document.getElementById('myResolvedReqs').textContent = myRequests.filter(r => r.status === 'COMPLETED').length;
        }

        function filterRequests() {
            const statusFilter = document.getElementById('filterStatus').value;
            const typeFilter = document.getElementById('filterType').value;
            
            let filtered = myRequests;

            if (statusFilter !== 'all') {
                filtered = filtered.filter(r => r.status === statusFilter);
            }
            if (typeFilter !== 'all') {
                filtered = filtered.filter(r => r.maintenanceType === typeFilter);
            }

            renderRequests(filtered);
        }

        function renderRequests(requests) {
            const tbody = document.getElementById('requestsTableBody');
            if (requests.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" style="text-align:center; padding: 2rem;">No logs found</td></tr>';
                return;
            }

            tbody.innerHTML = requests.map(req => {
                const assetName = req.asset ? req.asset.name : 'Unknown';
                const assetTag = req.asset ? req.asset.assetTag : 'N/A';
                return `
                <tr>
                    <td><a href="/maintenance-details.html?id=${req.id}" class="a-tag" style="text-decoration: none; font-weight: 700; color: var(--primary);">#${req.id}</a></td>
                    <td>
                        <div class="asset-info">
                            <div class="asset-name-v">
                                <span class="a-title">${assetName}</span>
                                <span class="a-tag">#${assetTag}</span>
                            </div>
                        </div>
                    </td>
                    <td><span class="type-badge ${req.maintenanceType.toLowerCase()}">${req.maintenanceType}</span></td>
                    <td style="font-weight: 500;">${req.assignedTechnician || '-'}</td>
                    <td>
                        <div style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${req.issueDescription}">
                            ${req.issueDescription}
                        </div>
                    </td>
                    <td><span class="priority-badge ${req.priority.toLowerCase()}">${req.priority}</span></td>
                    <td><span class="status-badge ${req.status.toLowerCase().replace('_', '-')}">${req.status.replace('_', ' ')}</span></td>
                    <td>${new Date(req.requestedDate).toLocaleDateString()}</td>
                    <td>${req.completedDate ? new Date(req.completedDate).toLocaleDateString() : '-'}</td>
                    <td>
                        <div style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${req.adminNotes || '-'}">
                            ${req.adminNotes || '-'}
                        </div>
                    </td>
                    <td style="text-align: center;">
                        <a href="/maintenance-details.html?id=${req.id}" class="btn-icon" title="View Progress">
                            <i class="fas fa-eye" style="color: var(--primary);"></i>
                        </a>
                    </td>
                </tr>
            `}).join('');
        }

        function handleSubmit(e) {
            e.preventDefault();
            if (!currentEmployee) {
                showToast('Unable to identify current user. Please log in again.', 'error');
                return;
            }

            const assetId = document.getElementById('assetSelect').value;
            const priority = document.getElementById('priority').value;
            const type = document.getElementById('type').value;
            const issueDescription = document.getElementById('issueDescription').value;
            const submitBtn = e.target.querySelector('.btn-submit');

            setBtnLoading(submitBtn, true, 'Submitting...');

            const requestData = {
                asset: { id: parseInt(assetId) },
                requestedBy: { id: currentEmployee.id },
                issueDescription: issueDescription,
                priority: priority,
                status: 'PENDING',
                maintenanceType: type,
                requestedByAdmin: false
            };

            fetch(`${API_BASE}/maintenance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            })
                .then(async res => {
                    if (res.ok) {
                        showToast('Maintenance request submitted successfully!');
                        document.getElementById('requestForm').reset();
                        loadMyRequests();
                    } else {
                        const errData = await res.json().catch(() => ({}));
                        throw new Error(errData.message || 'Failed to submit request');
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    showToast(err.message || 'Failed to submit request.', 'error');
                })
                .finally(() => {
                    setBtnLoading(submitBtn, false);
                });
        }
    </script>
</body>
</html>
