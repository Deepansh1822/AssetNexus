<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Enrolment | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/public/js/layout-loader.js" defer></script>
</head>

<body class="loading" data-page="site-management" data-module="labour">
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="topbar-container"></div>
            <div class="dashboard-scrollable">
                
                <section class="welcome-section" style="width: 100%; margin-bottom: 1rem; padding-left: 1rem; display: flex; align-items: center; gap: 1rem;">
                    <div style="width: 45px; height: 45px; background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                        <i class="fas fa-truck-moving"></i>
                    </div>
                    <div>
                        <h1 style="margin:0; font-size: 1.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px;">Workforce Deployment</h1>
                        <p style="margin:0; font-size:0.9rem; color:var(--text-muted);">Manage personnel site assignments and transfers.</p>
                    </div>
                </section>

                <div class="card" style="width: 100%; margin-top: 1rem; padding: 2rem; border-radius: 20px; border: 1px solid #e2e8f0; background: #ffffff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
                    
                    <!-- Search Section: Clean & Simple -->
                    <div id="searchPhase" style="margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid #f1f5f9;">
                        <div style="max-width: 600px; margin: 0 auto;">
                            <label style="display:block; margin-bottom:0.75rem; font-weight:600; font-size:0.9rem; color:#475569;">Find Personnel</label>
                            <div style="display:flex; gap:0.75rem;">
                                <div style="flex:1; position:relative;">
                                    <input type="text" id="searchInput" placeholder="Enter Member Name or ID..." 
                                        style="width:100%; padding:0.75rem 1rem 0.75rem 2.5rem; border-radius:10px; border:1px solid #cbd5e1; font-size:0.95rem; background:#f8fafc;">
                                    <i class="fas fa-search" style="position:absolute; left:0.85rem; top:50%; transform:translateY(-50%); color:#94a3b8; font-size:0.9rem;"></i>
                                </div>
                                <button onclick="searchPersonnel()" class="btn-primary" style="padding:0.75rem 1.5rem; border-radius:10px; font-weight:600; font-size:0.9rem; border:none; background:var(--primary); color:white;">
                                    Search
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Member View: Simple Data Card -->
                    <div id="personnelGrid" style="display:none; margin-bottom:2rem;">
                         <div style="background:#f8fafc; border:1px solid #e2e8f0; padding:1.5rem; border-radius:15px; display:flex; align-items:center; justify-content:space-between; gap:2rem;">
                             <div style="display:flex; align-items:center; gap:1.25rem;">
                                 <div style="width:55px; height:55px; background:white; border:1px solid #e2e8f0; border-radius:12px; display:flex; align-items:center; justify-content:center; color:var(--primary); font-size:1.2rem;">
                                     <i class="fas fa-user-check"></i>
                                 </div>
                                 <div>
                                     <h2 id="resName" style="margin:0; font-size:1.2rem; font-weight:700; color:var(--text-main);">--</h2>
                                     <div style="display:flex; align-items:center; gap:0.75rem; margin-top:0.3rem;">
                                         <span id="resID" style="color:#64748b; font-size:0.8rem; font-weight:600;">ID: --</span>
                                         <span id="resTrade" style="color:var(--primary); font-weight:700; font-size:0.8rem; font-weight:bold; background:rgba(99,102,241,0.1); padding:0.2rem 0.5rem; border-radius:6px;">--</span>
                                     </div>
                                 </div>
                             </div>
                             
                             <div style="text-align:right;">
                                 <div style="font-size:0.75rem; color:#94a3b8; font-weight:600; text-transform:uppercase; margin-bottom:0.2rem;">Current Assignment</div>
                                 <div id="resSite" style="font-size:1rem; font-weight:700; color:var(--text-main);">--</div>
                             </div>
                         </div>
                    </div>

                    <!-- Action Section: Functional & Aligned -->
                    <div id="actionPhase" style="display:none;">
                        <h3 style="font-size:0.9rem; font-weight:700; margin-bottom:1.25rem; color:#475569;">Deployment Action</h3>
                        
                        <div id="deploymentForm" style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:1rem; align-items: flex-end;">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label style="margin-bottom:0.5rem; display:block; font-weight:600; font-size:0.85rem; color:#64748b;">Target Site</label>
                                <select id="siteSelect" style="width:100%; height:45px; padding:0 0.75rem; border-radius:10px; border:1px solid #cbd5e1; font-size:0.95rem; background:white; cursor:pointer;">
                                    <option value="">Select location...</option>
                                </select>
                            </div>
                            
                            <button onclick="executeOperation('MOVE')" class="btn-primary" style="height:45px; padding:0 1.5rem; border-radius:10px; font-weight:700; font-size:0.9rem; background:#10b981; border:none; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center; margin:0;">
                                Deploy to Site
                            </button>
                            
                            <button id="returnBtn" onclick="executeOperation('RETURN')" class="btn-secondary" style="height:45px; padding:0 1.5rem; border-radius:10px; font-weight:700; font-size:0.9rem; background:#fef2f2; border:1px solid #fee2e2; color:#ef4444; cursor:pointer; display:flex; align-items:center; justify-content:center; margin:0;">
                                Mark as Available
                            </button>
                        </div>
                    </div>

                    <div id="loadingState" style="display:none; text-align:center; padding:2rem;">
                        <i class="fas fa-circle-notch fa-spin" style="font-size:1.5rem; color:var(--primary); opacity:0.5;"></i>
                        <p style="margin-top:1rem; font-size:0.8rem; font-weight:600; color:#94a3b8;">Processing request...</p>
                    </div>
                </div>
                    
                    <div id="noResults" style="display:none; text-align:center; padding:3rem; color:var(--red);">
                         <i class="fas fa-user-slash" style="font-size:2.5rem; margin-bottom:1rem;"></i>
                         <h3>Personnel Not Found</h3>
                         <p>Verify the name or ID and try again.</p>
                    </div>


                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <script>
        let selectedPersonnel = null;
        let currentUser = null;

        // Initialize Identity and Sites
        async function initialize() {
            try {
                const authRes = await fetch('/api/auth/me');
                if (!authRes.ok) { window.location.href = '/login.html'; return; }
                currentUser = await authRes.json();
                
                const siteRes = await fetch('/api/sites/all');
                let sites = await siteRes.json();
                
                // If Site Manager, only show their assigned sites
                if (currentUser.userRole === 'SITE_MANAGER' && currentUser.assignedSiteNames) {
                    sites = sites.filter(s => currentUser.assignedSiteNames.includes(s.name));
                }

                const sel = document.getElementById('siteSelect');
                sel.innerHTML = '<option value="">Deploy to a New Site...</option>' + 
                    sites.map(s => `<option value="${s.name}">${s.name} - ${s.location}</option>`).join('');
            } catch (err) { console.error('Initialization failed', err); }
        }

        async function searchPersonnel() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            // Reset UI
            document.getElementById('noResults').style.display = 'none';
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('personnelGrid').style.display = 'none';
            document.getElementById('actionPhase').style.display = 'none';

            try {
                // USE GLOBAL SEARCH for Site Managers to find people outside their current team
                const res = await fetch(`/api/labour/global-search?query=${encodeURIComponent(query)}`);
                const results = await res.json();
                
                document.getElementById('loadingState').style.display = 'none';

                if (results.length > 0) {
                    // Pick the best match or first match
                    const found = results[0];
                    selectedPersonnel = found;
                    populateDisplay(found);
                    document.getElementById('personnelGrid').style.display = 'block';
                    document.getElementById('actionPhase').style.display = 'block';
                    document.getElementById('actionPhase').scrollIntoView({ behavior: 'smooth' });
                } else {
                    document.getElementById('noResults').style.display = 'block';
                }
            } catch (err) { 
                console.error('Search error:', err);
                alert('System search failed. Try again.'); 
            }
        }

        function populateDisplay(p) {
            document.getElementById('resName').innerText = p.name || 'Unknown';
            document.getElementById('resID').innerText = `ID: ${p.personnelId || 'N/A'}`;
            document.getElementById('resTrade').innerText = p.trade || 'General';
            
            let statusHtml = `<span class="status-badge available" style="font-size:0.75rem;">${p.currentSite || 'AVAILABLE (FREE)'}</span>`;
            if (p.status === 'DISABLED') {
                statusHtml = `<span class="status-badge" style="font-size:0.75rem; background:#64748b; color:white;">DISABLED</span>`;
            } else if (p.status === 'DISPOSED') {
                statusHtml = `<span class="status-badge" style="font-size:0.75rem; background:#ef4444; color:white;">DISPOSED</span>`;
            }
            document.getElementById('resSite').innerHTML = statusHtml;
            
            const returnBtn = document.getElementById('returnBtn');
            const siteSelect = document.getElementById('siteSelect');
            
            // Site Managers should only be able to Return workers who are already on THEIR sites
            const isOnMySite = currentUser.assignedSiteNames?.includes(p.currentSite);
            if (!isOnMySite || !p.currentSite) {
                 returnBtn.style.display = 'none';
            } else {
                 returnBtn.style.display = 'block';
            }
        }

        async function executeOperation(type) {
            const siteName = type === 'RETURN' ? '' : document.getElementById('siteSelect').value;
            
            if (type === 'MOVE' && !siteName) {
                alert('Please select a target site for deployment.');
                return;
            }

            const confirmMsg = type === 'RETURN' ? 
                `Are you sure you want to remove ${selectedPersonnel.name} from ${selectedPersonnel.currentSite} and release them to Available Inventory?` :
                `Confirm deploying ${selectedPersonnel.name} to ${siteName}?`;

            if (!confirm(confirmMsg)) return;

            try {
                document.getElementById('actionPhase').style.opacity = '0.5';
                const res = await fetch(`/api/labour/${selectedPersonnel.id}/transfer?siteName=${encodeURIComponent(siteName)}`, { method: 'POST' });
                if (res.ok) {
                    alert('Deployment Successful!');
                    window.location.reload();
                } else { 
                    const errorMsg = await res.text();
                    alert(errorMsg || 'Deployment failed. Check if personnel is enabled.');
                    document.getElementById('actionPhase').style.opacity = '1';
                }
            } catch (err) { 
                alert('Connection failed. Only assigned Site Managers or Admins can perform this transfer.');
                document.getElementById('actionPhase').style.opacity = '1';
            }
        }

        window.onload = initialize;
    </script>
</body>
</html>
