<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Category | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="/public/js/layout-loader.js" defer></script>
</head>

<body class="loading" data-page="categories">
    <div class="app-container">
        <!-- Sidebar container -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar container -->
            <div id="topbar-container"></div>

            <div class="dashboard-scrollable">
                <section class="welcome-section">
                    <h1><i class="fas fa-tag" style="margin-right: 0.5rem; color: var(--primary);"></i>Add New Category</h1>
                    <p>Create a new asset classification category.</p>
                </section>

                <section class="card glass form-card">
                    <form id="addCategoryForm" style="padding:1.5rem;">
                        <div class="form-grid">
                            <div class="form-group full-width"><label for="name">Category Name</label><input type="text" id="name" name="name" class="form-control" placeholder="e.g. Computing Hardware" required></div>
                            <div class="form-group full-width"><label for="categoryImage">Category Image</label><input type="file" id="categoryImage" class="form-control" accept="image/*"></div>
                            <div class="form-group full-width"><label for="description">Description (Optional)</label><textarea id="description" name="description" class="form-control" rows="4" placeholder="Briefly describe..."></textarea></div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn-secondary" onclick="window.location.href='/categories.html'">Cancel</button>
                            <button type="submit" class="btn-submit">Create Category</button>
                        </div>
                    </form>
                </section>
                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8085/api';

        document.getElementById('addCategoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const submitBtn = form.querySelector('.btn-submit');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';

            const payload = {
                name: form.name.value,
                description: form.description.value
            };

            const imgFile = document.getElementById('categoryImage').files[0];
            if (imgFile) {
                const reader = new FileReader();
                const base64Promise = new Promise(resolve => {
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(imgFile);
                });
                payload.categoryImage = await base64Promise;
            }

            try {
                const res = await fetch(`${API_BASE}/categories`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    Toastify({ text: "Category created!", backgroundColor: "#10b981" }).showToast();
                    setTimeout(() => window.location.href = '/categories.html', 1500);
                } else {
                    const msg = await res.text();
                    Toastify({ text: "Error: " + msg, backgroundColor: "#ef4444" }).showToast();
                }
            } catch (err) {
                Toastify({ text: "Network error", backgroundColor: "#ef4444" }).showToast();
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Category';
            }
        });
    </script>
</body>
</html>
