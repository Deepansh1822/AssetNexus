<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Asset | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/public/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="/public/js/layout-loader.js" defer></script>
</head>

<body data-page="assets">
    <div class="app-container">
        <!-- Sidebar container -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar container -->
            <div id="topbar-container"></div>

            <div class="dashboard-scrollable">
                <section class="welcome-section">
                    <h1><i class="fas fa-plus-circle" style="margin-right: 0.5rem; color: var(--primary);"></i>Add New Asset</h1>
                    <p>Register a new asset to the inventory system.</p>
                </section>

                <section class="card glass form-card">
                    <form id="addAssetForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="name">Asset Name</label>
                                <input type="text" id="name" name="name" class="form-control" placeholder="e.g. MacBook Pro 14" required>
                            </div>
                            <div class="form-group">
                                <label for="assetTag">Asset Tag / ID</label>
                                <input type="text" id="assetTag" name="assetTag" class="form-control" placeholder="e.g. AST-101" required>
                            </div>
                            <div class="form-group">
                                <label for="category">Category</label>
                                <select id="category" name="category.id" class="form-control" required>
                                    <option value="">Select Category</option>
                                    <!-- Populated via JS -->
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="location">Branch Name</label>
                                <input type="text" id="location" name="location" class="form-control" placeholder="e.g. Headquarters" required>
                            </div>
                            <div class="form-group">
                                <label for="floorNumber">Floor Number</label>
                                <input type="text" id="floorNumber" name="floorNumber" class="form-control" placeholder="e.g. 1st Floor">
                            </div>
                            <div class="form-group">
                                <label for="roomNumber">Room Number</label>
                                <input type="text" id="roomNumber" name="roomNumber" class="form-control" placeholder="e.g. Room 101">
                            </div>
                            <div class="form-group">
                                <label for="vendorName">Vendor Name</label>
                                <input type="text" id="vendorName" name="vendor.vendorName" class="form-control" placeholder="e.g. Apple" required>
                            </div>
                            <div class="form-group">
                                <label for="vendorPhone">Vendor Phone</label>
                                <input type="tel" id="vendorPhone" name="vendor.phone" class="form-control" placeholder="e.g. 9876543210" pattern="[0-9]{10}">
                            </div>
                            <div class="form-group">
                                <label for="vendorEmail">Vendor Email</label>
                                <input type="email" id="vendorEmail" name="vendor.email" class="form-control" placeholder="support@vendor.com">
                            </div>
                            <div class="form-group">
                                <label for="vendorWebsite">Vendor Website</label>
                                <input type="url" id="vendorWebsite" name="vendor.website" class="form-control" placeholder="https://vendor.com">
                            </div>
                            <div class="form-group">
                                <label for="serialNumber">Serial Number</label>
                                <input type="text" id="serialNumber" name="serialNumber" class="form-control" placeholder="Manufacturer Serial No.">
                            </div>
                            <div class="form-group">
                                <label for="modelName">Model Name</label>
                                <input type="text" id="modelName" name="modelName" class="form-control" placeholder="e.g. A2442">
                            </div>
                            <div class="form-group">
                                <label for="purchaseDate">Purchase Date</label>
                                <input type="date" id="purchaseDate" name="purchaseDate" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="purchaseCost">Purchase Cost (₹)</label>
                                <input type="number" step="0.01" id="purchaseCost" name="purchaseCost" class="form-control" placeholder="0.00" min="0">
                            </div>
                            <div class="form-group">
                                <label for="warrantyExpiry">Warranty Expiry Date</label>
                                <input type="date" id="warrantyExpiry" name="warrantyExpiry" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="assetImage">Asset Image</label>
                                <input type="file" id="assetImage" class="form-control" accept="image/*">
                            </div>
                            <div class="form-group full-width">
                                <label for="description">Description</label>
                                <textarea id="description" name="description" class="form-control" rows="3" placeholder="Additional details..."></textarea>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn-secondary" onclick="window.location.href='/assets.html'">Cancel</button>
                            <button type="submit" class="btn-submit">Register Asset</button>
                        </div>
                    </form>
                </section>
                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8085/api';

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const userRes = await fetch(`${API_BASE}/auth/me`);
                const user = await userRes.json();
                if (user.userRole !== 'ADMIN') {
                    window.location.href = '/assets.html';
                    return;
                }

                const catRes = await fetch(`${API_BASE}/categories/active`);
                const cats = await catRes.json();
                const select = document.getElementById('category');
                cats.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.id; opt.textContent = c.name;
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error('Auth/Load error:', err);
                window.location.href = '/login.html';
            }
        });

        document.getElementById('addAssetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const submitBtn = form.querySelector('.btn-submit');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

            const payload = {
                name: form.name.value,
                assetTag: form.assetTag.value,
                category: { id: parseInt(form.category.value) },
                location: form.location.value,
                floorNumber: form.floorNumber.value,
                roomNumber: form.roomNumber.value,
                vendor: {
                    vendorName: form.vendorName.value,
                    phone: form.vendorPhone.value,
                    email: form.vendorEmail.value,
                    website: form.vendorWebsite.value
                },
                serialNumber: form.serialNumber.value,
                modelName: form.modelName.value,
                purchaseDate: form.purchaseDate.value,
                purchaseCost: parseFloat(form.purchaseCost.value) || 0,
                warrantyExpiry: form.warrantyExpiry.value,
                description: form.description.value
            };

            const imageFile = document.getElementById('assetImage').files[0];
            if (imageFile) {
                const reader = new FileReader();
                const base64Promise = new Promise(resolve => {
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(imageFile);
                });
                payload.assetImage = await base64Promise;
            }

            try {
                const res = await fetch(`${API_BASE}/assets`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    Toastify({ text: "Asset registered successfully!", backgroundColor: "#10b981" }).showToast();
                    setTimeout(() => window.location.href = '/assets.html', 1500);
                } else {
                    const error = await res.text();
                    Toastify({ text: "Error: " + error, backgroundColor: "#ef4444" }).showToast();
                }
            } catch (err) {
                Toastify({ text: "Network error", backgroundColor: "#ef4444" }).showToast();
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register Asset';
            }
        });
    </script>
</body>
</html>
