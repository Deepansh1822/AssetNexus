<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Inventory | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/public/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/public/js/layout-loader.js" defer></script>
    <style>
        .inventory-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 2rem; }
        .qty-control { display: flex; align-items: center; gap: 0.5rem; justify-content: center; }
    </style>
</head>

<body data-page="inventory-management" data-module="labour">
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="topbar-container"></div>
            <div class="dashboard-scrollable">
                <section class="welcome-section" style="max-width: 1000px; margin: 0 auto;">
                    <h1><i class="fas fa-boxes-stacked" style="color:var(--primary); margin-right:0.5rem;"></i>Material Inventory</h1>
                    <p>Track consumable assets, vendor supplies, and on-site material consumption.</p>
                </section>

                <div id="siteSearchPhase" class="card glass" style="max-width: 800px; margin: 0 auto; padding: 2.5rem; border-radius: 28px; text-align:center;">
                    <h3 style="margin-bottom:1.5rem;">Select Project Site to Manage Inventory</h3>
                    <div style="display:flex; gap:1rem;">
                        <input type="text" id="siteSearchInput" placeholder="Search Site by Name (e.g. Skyline)..." 
                            style="flex:1; padding:1.2rem; border-radius:16px; border:1.5px solid var(--border);">
                        <button onclick="findSite()" class="btn-login" style="width:160px; margin:0; border-radius:16px;">
                            <i class="fas fa-search"></i> Select Site
                        </button>
                    </div>
                    <div id="siteSearchResults" style="margin-top:1.5rem; display:flex; flex-direction:column; gap:0.75rem;"></div>
                </div>

                <div id="inventoryUI" style="display:none; max-width: 1000px; margin: 0 auto;">
                    <div style="background:rgba(99,102,241,0.05); padding:1.5rem; border-radius:20px; border:1px solid rgba(99,102,241,0.2); margin-bottom:2rem; display:flex; justify-content:space-between; align-items:center;">
                         <div>
                             <h4 id="activeSiteName" style="margin:0; color:var(--primary);">--</h4>
                             <small id="activeSiteLoc" style="color:var(--text-muted);">--</small>
                         </div>
                         <button onclick="location.reload()" class="btn-action" style="background:white; border:1px solid var(--border); font-size:0.75rem;">Switch Site</button>
                    </div>

                    <div class="inventory-grid">
                        <!-- Stock List -->
                        <section class="card glass" style="padding: 2rem; border-radius: 24px;">
                            <h3><i class="fas fa-list"></i> Current Site Stock</h3>
                            <div class="table-responsive">
                                <table class="assets-table">
                                    <thead>
                                        <tr>
                                            <th>Item Name</th>
                                            <th>Vendor</th>
                                            <th style="text-align:center;">Quantity</th>
                                            <th>Unit</th>
                                            <th>Last Update</th>
                                        </tr>
                                    </thead>
                                    <tbody id="stockTableBody">
                                        <tr><td colspan="5" style="text-align:center; padding:3rem; color:var(--text-muted);">Syncing inventory ledger...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </section>

                        <!-- Add Stock Form -->
                        <section class="card glass" style="padding: 2rem; border-radius: 24px; position:sticky; top:1rem; height:fit-content;">
                            <h3><i class="fas fa-plus-circle"></i> Add New Material</h3>
                            <form id="addStockForm" class="standard-form">
                                <div class="form-group">
                                    <label>Item Name</label>
                                    <input type="text" name="itemName" required placeholder="e.g., ACC Cement">
                                </div>
                                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                                    <div class="form-group">
                                        <label>Initial Qty</label>
                                        <input type="number" step="0.01" name="quantity" required value="0">
                                    </div>
                                    <div class="form-group">
                                        <label>Unit</label>
                                        <select name="unit" required>
                                            <option value="BAGS">BAGS</option>
                                            <option value="TONS">TONS</option>
                                            <option value="CFT">CFT (Sand/Stones)</option>
                                            <option value="NOS">NOS (Bricks)</option>
                                            <option value="LTRS">LTRS</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Vendor / Supplier</label>
                                    <input type="text" name="vendor" placeholder="e.g. Metro Builders Supply">
                                </div>
                                <button type="submit" class="btn-login" style="margin-top:1.5rem; width:100%; border-radius:12px;">Add to Inventory</button>
                            </form>
                        </section>
                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <script>
        let selectedSite = null;

        async function findSite() {
            const query = document.getElementById('siteSearchInput').value.trim();
            if (!query) return;
            try {
                const res = await fetch('/api/sites/all');
                const sites = await res.json();
                const filtered = sites.filter(s => s.name.toLowerCase().includes(query.toLowerCase()));
                
                const results = document.getElementById('siteSearchResults');
                results.innerHTML = filtered.map(s => `
                    <div onclick="selectSite(${s.id}, '${s.name}', '${s.location}')" class="search-result-row"
                        style="padding:1.25rem; border:1.5px solid var(--border); border-radius:16px; cursor:pointer; background:white; text-align:left; transition:0.2s; margin-bottom:0.5rem;">
                        <h4 style="margin:0;">${s.name}</h4>
                        <small style="color:var(--text-muted);"><i class="fas fa-map-marker-alt"></i> ${s.location}</small>
                    </div>
                `).join('');
                
                if (!filtered.length) results.innerHTML = '<div style="color:var(--red);">No sites found matching that name.</div>';
            } catch (err) { alert('Network error'); }
        }

        function selectSite(id, name, loc) {
            selectedSite = { id, name, loc };
            document.getElementById('siteSearchPhase').style.display = 'none';
            document.getElementById('inventoryUI').style.display = 'block';
            document.getElementById('activeSiteName').innerText = name;
            document.getElementById('activeSiteLoc').innerText = loc;
            loadStock();
        }

        async function loadStock() {
            const tbody = document.getElementById('stockTableBody');
            try {
                const res = await fetch(`/api/stocks/site/${selectedSite.id}`);
                const stocks = await res.json();
                
                tbody.innerHTML = stocks.map(st => `
                    <tr>
                        <td style="font-weight:700; color:var(--text-main);">${st.itemName}</td>
                        <td style="color:var(--text-muted);">${st.vendor || '--'}</td>
                        <td>
                            <div class="qty-control">
                                <button onclick="adjustStatus(${st.id}, -1)" class="btn-icon" style="color:var(--red); font-size:0.7rem;"><i class="fas fa-minus"></i></button>
                                <span style="font-size:1.1rem; font-weight:800; min-width:60px; text-align:center;">${st.quantity}</span>
                                <button onclick="adjustStatus(${st.id}, 1)" class="btn-icon" style="color:var(--green); font-size:0.7rem;"><i class="fas fa-plus"></i></button>
                            </div>
                        </td>
                        <td><span class="a-tag">${st.unit}</span></td>
                        <td style="font-size:0.75rem; color:var(--text-muted);">${new Date(st.lastRestockedAt).toLocaleString()}</td>
                    </tr>
                `).join('');
                
                if (!stocks.length) tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:4rem; color:var(--text-muted);">No material records for this site.</td></tr>';
            } catch (err) { alert('Sync Failed'); }
        }

        async function adjustStatus(id, delta) {
            try {
                const res = await fetch(`/api/stocks/${id}/adjust?delta=${delta}`, { method: 'POST' });
                if (res.ok) loadStock();
            } catch (err) { alert('Update failed'); }
        }

        document.getElementById('addStockForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const res = await fetch(`/api/stocks/add/${selectedSite.id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    e.target.reset();
                    loadStock();
                }
            } catch (err) { alert('Add failed'); }
        });
    </script>
</body>
</html>
