<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Processing | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/public/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/public/js/layout-loader.js" defer></script>
</head>

<body data-page="site-management" data-module="labour">
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="topbar-container"></div>
            <div class="dashboard-scrollable">

                <section class="welcome-section"
                    style="width: 100%; margin-bottom: 1.5rem; padding-left: 1rem; display: flex; align-items: center; gap: 1rem;">
                    <div
                        style="width: 45px; height: 45px; background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                        <i class="fas fa-file-invoice-dollar"></i>
                    </div>
                    <div>
                        <h1
                            style="margin:0; font-size: 1.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px;">
                            Labour Payroll Processing</h1>
                        <p style="margin:0; font-size:0.9rem; color:var(--text-muted);">Calculate and approve workforce
                            wages based on site attendance.</p>
                    </div>
                </section>

                <div class="card"
                    style="width: 100%; padding: 1.5rem 2rem; border-radius: 20px; border: 1px solid #e2e8f0; background: #ffffff;">
                    <div style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end;">
                        <div class="form-group" style="flex: 1; min-width: 140px; margin-bottom:0;">
                            <label
                                style="font-weight:700; color:#64748b; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:0.5rem;">Settlement
                                Basis</label>
                            <select id="payBasis" onchange="toggleDateInputs()"
                                style="width:100%; height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; font-weight:700; background:white; font-size:0.9rem; cursor:pointer;">
                                <option value="DAILY">Daily Wage</option>
                                <option value="FIXED">Fixed Salary</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1; min-width: 140px; margin-bottom:0;">
                            <label
                                style="font-weight:700; color:#64748b; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:0.5rem;">Category</label>
                            <select id="slipCategory" onchange="updatePeriodDefaults()"
                                style="width:100%; height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; font-weight:700; background:white; font-size:0.9rem; cursor:pointer;">
                                <option value="DAY">Day Wise</option>
                                <option value="WEEK">Weekly</option>
                                <option value="MONTH">Monthly</option>
                                <option value="ADVANCE">Advance / Loan</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1.2; min-width: 180px; margin-bottom:0;">
                            <label
                                style="font-weight:700; color:#64748b; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:0.5rem;">Project
                                Site</label>
                            <select id="siteSelect"
                                style="width:100%; height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; font-weight:600; background:white; font-size:0.9rem; cursor:pointer;">
                                <option value="">Select Project Site...</option>
                                <option value="ALL">Global Workforce (All Sites)</option>
                            </select>
                        </div>

                        <div id="dateRangeContainer" style="flex: 2; min-width: 300px; display: flex; gap: 0.75rem;">
                            <div class="form-group" style="flex: 1; margin-bottom:0;">
                                <label id="startLabel" style="font-weight:700; color:#64748b; font-size:0.75rem; text-transform:uppercase; display:block; margin-bottom:0.5rem;">Start Date</label>
                                <input type="date" id="startDate" style="width:100%; height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; background:#f8fafc; font-weight:600; font-size:0.85rem;">
                                <input type="month" id="startMonth" style="display:none; width:100%; height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; background:#f8fafc; font-weight:600; font-size:0.85rem;">
                            </div>
                            <div class="form-group" style="flex: 1; margin-bottom:0;">
                                <label id="endLabel" style="font-weight:700; color:#64748b; font-size:0.75rem; text-transform:uppercase; display:block; margin-bottom:0.5rem;">End Date</label>
                                <input type="date" id="endDate" style="width:100%; height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; background:#f8fafc; font-weight:600; font-size:0.85rem;">
                                <input type="month" id="endMonth" style="display:none; width:100%; height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; background:#f8fafc; font-weight:600; font-size:0.85rem;">
                            </div>
                        </div>

                        <div class="form-group" style="flex: 0.8; min-width: 140px; margin-bottom:0;">
                            <button class="btn-primary"
                                style="width:100%; height:45px; border-radius:10px; font-weight:700; font-size:0.85rem; background:var(--primary); border:none; color:white; cursor:pointer;"
                                onclick="processPayroll()">
                                <i class="fas fa-search"></i> RETRIEVE DATA
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Bulk Action Bar -->
                <div id="bulkActionBar"
                    style="width: 100%; margin-top: 1.5rem; display:none; justify-content:space-between; align-items:center; background:#f8fafc; padding:0.75rem 1.5rem; border-radius:15px; border:1px solid #e2e8f0;">
                    <div style="font-size:0.85rem; color:#64748b; font-weight:700;">
                        <i class="fas fa-users" style="color:var(--primary); margin-right:0.5rem;"></i> <span
                            id="countDisplay">0</span> personnel ready for settlement.
                    </div>
                    <button class="btn-primary" onclick="finalizeAllSlips()"
                        style="height:35px; padding:0 1.5rem; border-radius:8px; font-size:0.8rem; font-weight:700;">
                        <i class="fas fa-check-double"></i> AUTHORIZE & SAVE ALL SLIPS
                    </button>
                </div>

                <div class="card"
                    style="width: 100%; margin-top: 1.5rem; padding: 1rem; border-radius:20px; border: 1px solid #e2e8f0; background: #ffffff;">
                    <div class="table-responsive">
                        <table class="assets-table">
                            <thead>
                                <tr>
                                    <th>Personnel Detail</th>
                                    <th>Settlement Rate</th>
                                    <th>Active Site</th>
                                    <th>Gross Balance</th>
                                    <th style="min-width:150px;">Audit Actions</th>
                                </tr>
                            </thead>
                            <tbody id="payrollTable">
                                <tr>
                                    <td colspan="5" style="text-align:center; padding:5rem; color:var(--text-muted);"><i
                                            class="fas fa-arrow-up"
                                            style="display:block; font-size:2rem; opacity:0.2; margin-bottom:1rem;"></i>Select
                                        basis and data points to calculate payroll.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Preview Modal -->
                <div id="previewModal"
                    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
                    <div class="card"
                        style="width:90%; max-width:600px; padding:2rem; background:white; border-radius:24px; position:relative;">
                        <button onclick="closePreview()"
                            style="position:absolute; top:1.5rem; right:1.5rem; background:none; border:none; font-size:1.5rem; cursor:pointer; color:#64748b;"><i
                                class="fas fa-times"></i></button>
                        <div id="modalContent"></div>
                        <div
                            style="display:flex; justify-content:flex-end; gap:1rem; margin-top:2rem; padding-top:1.5rem; border-top:1px solid #f1f5f9;">
                            <button onclick="closePreview()" class="btn-secondary"
                                style="height:45px; padding:0 2rem; border-radius:10px; font-weight:700;">Close</button>
                            <button id="modalCommitBtn" class="btn-primary"
                                style="height:45px; padding:0 3rem; border-radius:10px; font-weight:700;">AUTHORIZE &
                                SAVE</button>
                        </div>
                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <script>
        function toggleDateInputs() {
            const basis = document.getElementById('payBasis').value;
            const isFixed = basis === 'FIXED';
            
            document.getElementById('startDate').style.display = isFixed ? 'none' : 'block';
            document.getElementById('endDate').style.display = isFixed ? 'none' : 'block';
            document.getElementById('startMonth').style.display = isFixed ? 'block' : 'none';
            document.getElementById('endMonth').style.display = isFixed ? 'block' : 'none';
            
            document.getElementById('startLabel').textContent = isFixed ? 'From Month' : 'Start Date';
            document.getElementById('endLabel').textContent = isFixed ? 'To Month' : 'End Date';

            if (isFixed) {
                document.getElementById('slipCategory').value = 'MONTH';
                document.getElementById('slipCategory').disabled = true;
            } else {
                document.getElementById('slipCategory').disabled = false;
            }
            updatePeriodDefaults();
        }

        function updatePeriodDefaults() {
            const category = document.getElementById('slipCategory').value;
            const startDateInput = document.getElementById('startDate');
            const endDateInput = document.getElementById('endDate');
            const today = new Date();
            
            if (category === 'DAY') {
                startDateInput.value = today.toISOString().split('T')[0];
                endDateInput.value = today.toISOString().split('T')[0];
                endDateInput.readOnly = true;
                endDateInput.style.opacity = '0.6';
            } else if (category === 'WEEK') {
                const prevWeek = new Date(today);
                prevWeek.setDate(today.getDate() - 7);
                startDateInput.value = prevWeek.toISOString().split('T')[0];
                endDateInput.value = today.toISOString().split('T')[0];
                endDateInput.readOnly = false;
                endDateInput.style.opacity = '1';
            } else if (category === 'MONTH') {
                const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
                startDateInput.value = firstDay.toISOString().split('T')[0];
                endDateInput.value = today.toISOString().split('T')[0];
                endDateInput.readOnly = false;
                endDateInput.style.opacity = '1';
            } else {
                endDateInput.readOnly = false;
                endDateInput.style.opacity = '1';
            }
        }

        window.onload = async () => {
             // Verify if user is Site Manager
            const authRes = await fetch('/api/auth/me');
            if(authRes.ok) {
                 const user = await authRes.json();
                 if(user.userRole === 'SITE_MANAGER') {
                      const title = document.querySelector('h1');
                      if(title) title.textContent = "My Site Salary Slips";
                 }
            }
            
            const today = new Date();
            const curMonth = today.toISOString().substring(0, 7);
            document.getElementById('startMonth').value = curMonth;
            document.getElementById('endMonth').value = curMonth;

            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
            const lastDay = today.toISOString().split('T')[0];
            document.getElementById('startDate').value = firstDay;
            document.getElementById('endDate').value = lastDay;

            try {
                const siteRes = await fetch('/api/sites/all');
                const sites = await siteRes.json();
                
                const authRes = await fetch('/api/auth/me');
                if (!authRes.ok) { window.location.href = '/login.html'; return; }
                const user = await authRes.json();

                const select = document.getElementById('siteSelect');
                const isManager = user.userRole === 'SITE_MANAGER';
                const managedSiteNames = user.assignedSiteNames || [];

                select.innerHTML = '<option value="">Select Project Site...</option>';

                if (isManager) {
                    if (managedSiteNames.length > 1) {
                        select.innerHTML += '<option value="ALL">All My Sites</option>';
                    }
                    const mySites = sites.filter(s => managedSiteNames.includes(s.name));
                    mySites.forEach(s => {
                        const opt = document.createElement('option');
                        opt.value = s.name;
                        opt.textContent = s.name;
                        select.appendChild(opt);
                    });
                    
                    if (managedSiteNames.length === 1) {
                        select.value = managedSiteNames[0];
                        select.disabled = true;
                    }
                } else {
                    select.innerHTML += '<option value="ALL">Global Workforce (All Sites)</option>';
                    sites.forEach(s => {
                        const opt = document.createElement('option');
                        opt.value = s.name;
                        opt.textContent = s.name;
                        select.appendChild(opt);
                    });
                }
            } catch (err) { console.error('Initialization failed', err); }
        };

        async function processPayroll() {
            const basis = document.getElementById('payBasis').value;
            const category = document.getElementById('slipCategory').value;
            const siteName = document.getElementById('siteSelect').value;
            const table = document.getElementById('payrollTable');

            let start, end;
            if (basis === 'DAILY') {
                start = document.getElementById('startDate').value;
                end = document.getElementById('endDate').value;
            } else {
                const sMonth = document.getElementById('startMonth').value;
                const eMonth = document.getElementById('endMonth').value;
                if (!sMonth || !eMonth) return alert('Select time parameters.');
                start = `${sMonth}-01`;
                const [y, m] = eMonth.split('-');
                const lastDate = new Date(y, m, 0).getDate();
                end = `${eMonth}-${lastDate}`;
            }

            if (!start || !end || !siteName) {
                alert('Incomplete parameters for payroll retrieval.');
                return;
            }

            table.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:5rem;"><i class="fas fa-sync fa-spin"></i> Analyzing workforce ledger...</td></tr>';

            try {
                let url = siteName === 'ALL' ? '/api/labour/all' : `/api/labour/by-site?siteName=${encodeURIComponent(siteName)}`;
                const labsRes = await fetch(url);
                const labs = await labsRes.json();

                const filtered = labs.filter(l => (l.paymentType || 'DAILY').toUpperCase() === basis.toUpperCase());
                if (filtered.length === 0) {
                    table.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:5rem;">No members found for ${basis.toLowerCase()} workforce settlement.</td></tr>`;
                    document.getElementById('bulkActionBar').style.display = 'none';
                    return;
                }

                document.getElementById('countDisplay').innerText = filtered.length;
                document.getElementById('bulkActionBar').style.display = 'flex';

                let results = [];
                if (category === 'ADVANCE') {
                    results = filtered.map(lab => ({ lab, amount: 0, advances: 0 }));
                } else {
                    const payrollPromises = filtered.map(async lab => {
                        const wageAmt = await fetch(`/api/attendance/payroll?labourerId=${lab.id}&start=${start}&end=${end}`).then(res => res.json());
                        const advAmt = await fetch(`/api/salary-slips/advances/total?labourerId=${lab.id}&start=${start}&end=${end}`).then(res => res.json());
                        return { lab, amount: (wageAmt - advAmt), base: wageAmt, advances: advAmt };
                    });
                    results = await Promise.all(payrollPromises);
                }

                let rows = "";
                for (const { lab, amount, base, advances } of results) {
                    const rateLabel = basis === 'FIXED' ? '/mo' : '/day';
                    const safeSite = (lab.currentSite || 'N/A').replace(/'/g, "\\'");
                    const safeName = lab.name.replace(/'/g, "\\'");

                    let amountDisplay = "";
                    if (category === 'ADVANCE') {
                        amountDisplay = `<input type="number" id="advAmount-${lab.id}" placeholder="Enter Advance" style="width:120px; padding:0.5rem; border:1px solid var(--primary); border-radius:8px; font-weight:700;">`;
                    } else {
                        amountDisplay = `
                            <div style="text-align:right;">
                                <div style="font-size:0.9rem; font-weight:800; color:var(--primary);">₹ ${amount.toLocaleString()}</div>
                                ${advances > 0 ? `<small style="color:#ef4444; font-size:0.7rem; display:block;">(Base ₹${base} - Adv ₹${advances})</small>` : ''}
                            </div>
                        `;
                    }

                    rows += `
                        <tr id="row-${lab.id}">
                            <td>
                                <div style="display:flex; align-items:center; gap:0.75rem; text-align:left;">
                                    <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(lab.name)}&background=6366f1&color=fff&size=32" style="width:32px; height:32px; border-radius:8px;">
                                    <div><strong>${lab.name}</strong><br><small style="color:var(--text-muted);">${lab.personnelId}</small></div>
                                </div>
                            </td>
                            <td>₹ ${lab.dailyWage}${rateLabel}</td>
                            <td><span class="status-badge available" style="font-size:0.75rem;">${lab.currentSite || 'AVAILABLE'}</span></td>
                            <td style="font-weight:800; color:var(--primary); font-size:1rem;">${amountDisplay}</td>
                            <td>
                                <div style="display:flex; gap:0.5rem; justify-content:center;">
                                    <button onclick="handleAction(${lab.id}, ${amount}, '${safeSite}', '${start}', '${end}', ${lab.dailyWage}, '${basis}', '${category}', 'PREVIEW')" 
                                            class="btn-icon" style="background:#f8fafc; border:1px solid #e2e8f0; color:#64748b;" title="Preview Slip">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                    <button id="commitBtn-${lab.id}" onclick="handleAction(${lab.id}, ${amount}, '${safeSite}', '${start}', '${end}', ${lab.dailyWage}, '${basis}', '${category}', 'SAVE', this)" 
                                            class="commit-btn btn-icon" style="background:rgba(99,102,241,0.05); border:1px solid rgba(99,102,241,0.1); color:var(--primary);" title="Commit Audit">
                                        <i class="fas fa-check-circle"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                }
                table.innerHTML = rows;
            } catch (err) {
                console.error(err);
                table.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red; padding:3rem;">Retrieval failed. Backend sync error.</td></tr>';
            }
        }

        function handleAction(id, amount, site, start, end, rate, type, category, action, btn) {
            let finalAmount = amount;
            if (category === 'ADVANCE') {
                const input = document.getElementById(`advAmount-${id}`);
                finalAmount = parseFloat(input.value);
                if (isNaN(finalAmount) || finalAmount <= 0) return alert('Enter a valid advance amount.');
            }

            if (action === 'PREVIEW') {
                previewSlip(id, finalAmount, site, start, end, rate, type, category);
            } else {
                saveSlip(id, finalAmount, site, start, end, rate, type, category, btn);
            }
        }

        function previewSlip(id, amount, site, start, end, rate, type, category) {
            const modal = document.getElementById('previewModal');
            const content = document.getElementById('modalContent');
            const commitBtn = document.getElementById('modalCommitBtn');
            const rowCommitBtn = document.getElementById(`commitBtn-${id}`);

            content.innerHTML = `
                <div style="background: #ffffff; padding: 1.5rem; border: 2px solid #000; font-family: courier, monospace; color: #000; text-align:left;">
                    <div style="text-align:center; border-bottom: 2px solid #000; padding-bottom: 0.5rem; margin-bottom: 1rem;">
                        <h2 style="margin:0; font-size: 1.1rem; text-transform: uppercase;">ASSETNEXUS LOGISTICS</h2>
                        <p style="margin: 3px 0 0; font-size: 0.75rem;"> Workforce Settlement Preview (${category})</p>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 0.5rem; font-size: 0.85rem; margin-bottom: 1rem;">
                        <div><strong>Personnel ID:</strong> ${id}</div>
                        <div style="text-align: right;"><strong>Site:</strong> ${site}</div>
                    </div>

                    <div style="border-top: 1px dashed #000; border-bottom: 1px dashed #000; padding: 0.75rem 0; margin-bottom: 1rem; font-size: 0.85rem;">
                        <div style="display:flex; justify-content:space-between; margin-bottom: 3px;">
                            <span>Period:</span>
                            <strong>${start} to ${end}</strong>
                        </div>
                        <div style="display:flex; justify-content:space-between;">
                            <span>Category:</span>
                            <strong>${category}</strong>
                        </div>
                    </div>

                    <div style="text-align: right; margin-bottom: 1rem;">
                        <span style="font-size: 0.9rem; font-weight: bold;">TOTAL VALUE:</span>
                        <span style="font-size: 1.3rem; font-weight: 900; margin-left: 10px;">₹ ${amount.toLocaleString()}</span>
                    </div>
                </div>
            `;
            commitBtn.onclick = () => { closePreview(); handleAction(id, amount, site, start, end, rate, type, category, 'SAVE', rowCommitBtn); };
            modal.style.display = 'flex';
        }

        function closePreview() { document.getElementById('previewModal').style.display = 'none'; }

        async function saveSlip(labourerId, amount, siteName, start, end, rate, type, category, btn) {
            if (btn && btn.disabled) return;
            const data = { 
                siteName, 
                startDate: start, 
                endDate: end, 
                amount, 
                baseRate: rate, 
                paymentType: type,
                slipCategory: category
            };
            try {
                if(btn) {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                }
                const res = await fetch(`/api/salary-slips/create?labourerId=${labourerId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.status === 409) {
                    alert('This payroll record already exists.');
                    if(btn) btn.innerHTML = '<i class="fas fa-check-double"></i>';
                    return;
                }
                if (res.ok) {
                    if(btn) {
                        btn.innerHTML = '<i class="fas fa-check-double" style="color:#10b981;"></i>';
                        btn.style.background = 'rgba(16,185,129,0.1)';
                    }
                } else if(btn) { 
                    btn.disabled = false; 
                    btn.innerHTML = '<i class="fas fa-check-circle"></i>'; 
                }
            } catch (err) { if(btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-check-circle"></i>'; } }
        }

        async function finalizeAllSlips() {
            const buttons = document.querySelectorAll('#payrollTable .commit-btn');
            if (confirm(`Authorize payroll records for ${buttons.length} personnel?`)) {
                for (let btn of buttons) {
                    if (!btn.disabled && !btn.querySelector('.fa-check-double')) {
                        btn.click();
                    }
                }
                alert('Batch processing complete.');
            }
        }
    </script>
</body>

</html>
