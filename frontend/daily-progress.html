<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Site Progress | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/public/js/layout-loader.js" defer></script>
    <style>
        .progress-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; max-width: 1400px; }
        .milestone-card { position: relative; padding: 2rem; border-radius: 24px; transition: transform 0.3s; max-width: 420px; }
        .milestone-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .milestone-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 1.5rem; }
        .milestone-tag { font-size: 0.7rem; font-weight: 700; padding: 0.3rem 0.8rem; border-radius: 8px; text-transform: uppercase; }
        .progress-track { background: rgba(0,0,0,0.05); height: 12px; border-radius: 10px; overflow: hidden; margin-bottom: 0.75rem; }
        .progress-bar { height: 100%; border-radius: 10px; transition: width 0.6s ease; }
        
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:9999; align-items:center; justify-content:center; backdrop-filter: blur(8px); }
        .modal-card { width: 550px; border-radius: 28px; padding: 3rem; background: white; }
    </style>
</head>

<body class="loading" data-page="site-management" data-module="labour">
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="topbar-container"></div>
            <div class="dashboard-scrollable">
                
                <section class="welcome-section" style="width: 95%; margin: 0 auto 1.5rem; padding-left: 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;">
                    <div style="display:flex; align-items:center; gap:1rem;">
                        <div style="width: 45px; height: 45px; background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <div>
                            <h1 style="margin:0; font-size: 1.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px;">Workforce Progress Tracker</h1>
                            <p style="margin:0; font-size:0.9rem; color:var(--text-muted);">Detailed performance analytics and completion status across active zones.</p>
                        </div>
                    </div>
                    
                    <div style="display:flex; gap:1rem; align-items:center;">
                        <label style="font-weight:700; color:#64748b; font-size:0.85rem; text-transform:uppercase; letter-spacing:1px; margin-left:1rem;">Active Project:</label>
                        <select id="siteSelect" onchange="onSiteChange()" style="height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; font-weight:600; min-width:260px; background:white; font-size:0.9rem;">
                            <option value="">Select a Site...</option>
                        </select>
                    </div>
                </section>

                <!-- Module Search Row -->
                <div style="width: 95%; margin: 0 auto 2rem; padding-left: 1rem;">
                    <div style="position:relative; width:100%; max-width: 420px;">
                        <input type="text" id="moduleSearch" oninput="filterWorkOrders()" placeholder="Filter active work modules..." 
                            style="width:100%; height:48px; padding:0 1rem 0 3rem; border-radius:15px; border:1px solid #e2e8f0; background:#ffffff; font-size:0.95rem; font-weight:500; outline:none; transition:0.3s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);"
                            onfocus="this.style.border='1.5px solid var(--primary)'; this.style.boxShadow='0 10px 15px -3px rgba(99,102,241,0.1)';" 
                            onblur="this.style.border='1px solid #e2e8f0'; this.style.boxShadow='0 4px 6px -1px rgba(0,0,0,0.05)';"
                        >
                        <i class="fas fa-search" style="position:absolute; left:1.1rem; top:50%; transform:translateY(-50%); color:#94a3b8; font-size:1rem;"></i>
                    </div>
                </div>

                <div class="progress-grid" id="progressGrid" style="width: 95%; margin: 1.5rem auto;">
                    <div style="text-align:center; padding:5rem; grid-column: 1 / -1; color:var(--text-muted);">
                        <i class="fas fa-arrow-up" style="font-size:2rem; color:#cbd5e1; margin-bottom:1rem; display:block;"></i>
                        <p style="font-weight:600; font-size:0.95rem;">Please select a Project Site to view active work modules.</p>
                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <!-- Footer will load here -->

    <script>
        let currentUser = null;
        let allWorkOrders = [];

        async function fetchSites() {
            try {
                const authRes = await fetch('/api/auth/me');
                if (!authRes.ok) { window.location.href = '/login.html'; return; }
                currentUser = await authRes.json();
                const siteRes = await fetch('/api/sites/all');
                let sites = await siteRes.json();
                if (currentUser.userRole === 'SITE_MANAGER') {
                    const managed = currentUser.assignedSiteNames || [];
                    sites = sites.filter(s => managed.includes(s.name));
                }
                const select = document.getElementById('siteSelect');
                select.innerHTML = '<option value="">Select an Authorized Site...</option>' + 
                    sites.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                const urlParams = new URLSearchParams(window.location.search);
                const siteId = urlParams.get('siteId');
                if (siteId) {
                    select.value = siteId;
                    onSiteChange();
                } else if (sites.length === 1) {
                    select.value = sites[0].id;
                    onSiteChange();
                }
            } catch (err) { console.error('Site load failed', err); }
        }

        function onSiteChange() {
            const siteId = document.getElementById('siteSelect').value;
            if (siteId) fetchWorkOrders(siteId);
            else {
                document.getElementById('progressGrid').innerHTML = '<div style="text-align:center; padding:5rem; grid-column: 1 / -1; color:var(--text-muted);"><i class="fas fa-arrow-up" style="font-size:2.5rem; color:var(--primary); opacity:0.3; margin-bottom:1rem; display:block;"></i><p>Please select a Project Site to view active work modules.</p></div>';
            }
        }

        async function fetchWorkOrders(siteId) {
            const grid = document.getElementById('progressGrid');
            grid.innerHTML = '<div style="text-align:center; padding:5rem; grid-column: 1 / -1; color:var(--text-muted);"><i class="fas fa-spinner fa-spin" style="font-size:2rem;"></i></div>';
            try {
                const response = await fetch(`/api/work-orders/by-site/${siteId}`);
                allWorkOrders = await response.json();
                renderWorkOrders(allWorkOrders);
            } catch (err) { grid.innerHTML = '<div style="text-align:center; padding:5rem; grid-column:1/-1; color:red;">Connection Error.</div>'; }
        }

        function filterWorkOrders() {
            const query = document.getElementById('moduleSearch').value.toLowerCase();
            const filtered = allWorkOrders.filter(wo => 
                (wo.title && wo.title.toLowerCase().includes(query)) ||
                (wo.category && wo.category.toLowerCase().includes(query)) ||
                (wo.assignedLabourer && wo.assignedLabourer.name.toLowerCase().includes(query))
            );
            renderWorkOrders(filtered);
        }

        function renderWorkOrders(workOrders) {
            const grid = document.getElementById('progressGrid');
            if (workOrders.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:5rem; grid-column: 1 / -1; color:var(--text-muted);">No modules found.</div>';
                return;
            }
            grid.innerHTML = workOrders.map(wo => `
                    <div class="card glass milestone-card" style="border-top: 4px solid var(--primary);">
                        <div class="milestone-header">
                            <span class="milestone-tag" style="background:rgba(99,102,241,0.1); color:var(--primary);">${wo.category || 'GENERAL'}</span>
                            <span style="font-size:0.75rem; font-weight:700; color:${wo.status === 'COMPLETED' ? '#10b981' : '#f59e0b'};">
                                <i class="fas ${wo.status === 'COMPLETED' ? 'fa-check-circle' : 'fa-clock'}"></i> ${wo.status.toUpperCase()}
                            </span>
                        </div>
                        <h3 style="margin:0.5rem 0; font-size:1.2rem;">${wo.title}</h3>
                        <p style="font-size:0.85rem; color:var(--text-muted);"><i class="fas fa-user-gear"></i> Lead: <strong style="color:var(--text-main);">${wo.assignedLabourer ? wo.assignedLabourer.name : 'Unassigned'}</strong></p>
                        <div style="margin: 1.5rem 0;">
                            <div style="display:flex; justify-content:space-between; font-size:0.85rem; font-weight:600; margin-bottom:0.75rem; color:var(--text-muted);">
                                <span>Completion Status</span><span>${wo.currentProgress}%</span>
                            </div>
                            <div class="progress-track"><div class="progress-bar" style="width:${wo.currentProgress}%; background:var(--primary);"></div></div>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; padding-top:1rem; border-top:1px solid #f0f0f0;">
                              <a href="/work-module-details.html?id=${wo.id}" style="font-size:0.85rem; font-weight:700; color:var(--primary); text-decoration:none;"><i class="fas fa-circle-info"></i> View Details & Logs</a>
                             <small style="color:var(--text-muted); font-weight:700;">Target: ${wo.scheduledEnd ? new Date(wo.scheduledEnd).toLocaleDateString() : 'TBA'}</small>
                        </div>
                    </div>
                `).join('');
        }

        window.onload = fetchSites;
    </script>
</body>
</html>
