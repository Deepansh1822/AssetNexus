<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Inventory | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/public/js/layout-loader.js" defer></script>
    <style>
        .inventory-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 2rem; }
        .qty-control { display: flex; align-items: center; gap: 0.5rem; justify-content: center; }
    </style>
</head>

<body class="loading" data-page="inventory-management" data-module="labour">
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="topbar-container"></div>
            <div class="dashboard-scrollable">
                
                <section class="welcome-section" style="width: 95%; margin: 0 auto 1.5rem; padding-left: 1rem; display: flex; align-items: center; gap: 1rem;">
                    <div style="width: 45px; height: 45px; background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                        <i class="fas fa-boxes-stacked"></i>
                    </div>
                    <div>
                        <h1 style="margin:0; font-size: 1.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px;">Global Site Inventory</h1>
                        <p style="margin:0; font-size:0.9rem; color:var(--text-muted);">Direct oversight of materials and logistical site flows.</p>
                    </div>
                </section>

                <!-- SITE SELECTOR PHASE -->
                <div id="siteSearchPhase" class="card" style="width: 95%; margin: 0 auto; padding: 2.5rem; border-radius: 20px; text-align:center; border: 1px solid #e2e8f0; background:white;">
                    <h3 style="margin-bottom:0.5rem; font-weight:700; color:#475569; font-size:1.1rem;">Project Identifier</h3>
                    <p style="margin-bottom:1.5rem; color:var(--text-muted); font-size:0.9rem;">Locate an active project to view material records.</p>
                    
                    <div style="max-width: 600px; margin: 0 auto; display:flex; gap:0.75rem; position:relative;">
                        <div style="flex:1; position:relative;">
                            <input type="text" id="siteSearchInput" placeholder="Enter Site Name..." 
                                style="width:100%; height:45px; padding:0 1rem 0 2.5rem; border-radius:10px; border:1px solid #cbd5e1; font-size:0.95rem; background:#f8fafc;">
                            <i class="fas fa-search" style="position:absolute; left:0.85rem; top:50%; transform:translateY(-50%); color:#94a3b8; font-size:0.9rem;"></i>
                        </div>
                        <button onclick="findSite()" class="btn-primary" style="height:45px; padding:0 2rem; border-radius:10px; font-weight:700; font-size:0.9rem; border:none; background:var(--primary); color:white; cursor:pointer;">
                            INITIALIZE VIEW
                        </button>
                    </div>
                    <div id="siteSearchResults" style="margin-top:2rem; display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:1rem; max-width:100%;"></div>
                </div>

                <!-- MAIN INVENTORY CONSOLE -->
                <div id="inventoryUI" style="display:none; width: 95%; margin: 0 auto;">
                    <div style="background:#ffffff; padding:1.25rem 2rem; border-radius:20px; border:1px solid #e2e8f0; margin-bottom:1.5rem; display:flex; justify-content:space-between; align-items:center;">
                         <div style="display:flex; align-items:center; gap:1.25rem;">
                             <div style="width:45px; height:45px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#64748b; font-size:1.1rem;">
                                 <i class="fas fa-industry"></i>
                             </div>
                             <div>
                                 <h2 id="activeSiteName" style="margin:0; font-size:1.25rem; font-weight:700; color:var(--text-main);">--</h2>
                                 <div id="activeSiteLoc" style="color:var(--text-muted); font-weight:600; font-size:0.8rem;"><i class="fas fa-map-pin" style="font-size:0.75rem;"></i> --</div>
                             </div>
                         </div>
                         <button onclick="location.reload()" class="btn-secondary" style="height:45px; padding:0 1.5rem; border-radius:10px; font-weight:700; background:#f8fafc; border:1px solid #e2e8f0; color:#64748b; font-size:0.85rem; cursor:pointer; display:flex; align-items:center; gap:0.5rem;">
                             <i class="fas fa-rotate"></i> SWITCH PROJECT
                         </button>
                    </div>

                    <div style="display: block; width: 100%;">
                        <section class="card" style="padding: 2rem; border-radius: 20px; border: 1px solid #e2e8f0; background: #ffffff;">
                            <div style="margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid #f1f5f9;">
                                <h3 style="margin:0; font-weight:700; font-size:1.1rem; color:#475569;">Stock Ledger</h3>
                            </div>

                            <!-- Control Row (Search Left, Buttons Right) -->
                            <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem;">
                                <div style="flex: 1; max-width: 420px; position:relative;">
                                    <input type="text" id="stockSearch" oninput="filterStock()" placeholder="Search site inventory..." 
                                        style="width:100%; height:45px; padding:0 1rem 0 3rem; border-radius:12px; border:1px solid #e2e8f0; background:#f8fafc; font-size:0.95rem; font-weight:500; outline:none; transition:0.3s;"
                                        onfocus="this.style.border='1.5px solid var(--primary)'; this.style.background='#fff'; this.style.boxShadow='0 4px 10px -2px rgba(99,102,241,0.1)';"
                                        onblur="this.style.border='1px solid #e2e8f0'; this.style.background='#f8fafc'; this.style.boxShadow='none';">
                                    <i class="fas fa-search" style="position:absolute; left:1.1rem; top:50%; transform:translateY(-50%); color:#94a3b8; font-size:1rem;"></i>
                                </div>

                                <div style="display:flex; align-items:center; gap:0.75rem;">
                                    <button onclick="exportToCSV()" class="btn-secondary" style="height:45px; padding:0 1.25rem; border-radius:10px; font-weight:700; font-size:0.85rem; background:#f8fafc; border:1px solid #e2e8f0; color:#64748b; cursor:pointer; display:flex; align-items:center; gap:0.5rem;">
                                        <i class="fas fa-file-csv"></i> EXPORT CSV
                                    </button>
                                    <button onclick="showInductionModal()" class="btn-primary" style="height:45px; padding:0 1.75rem; border-radius:10px; font-weight:700; font-size:0.85rem; background:var(--primary); border:none; color:white; cursor:pointer; box-shadow: 0 4px 6px -1px rgba(99,102,241,0.2); display:flex; align-items:center; gap:0.5rem;">
                                        <i class="fas fa-plus-circle"></i> NEW INDUCTION
                                    </button>
                                </div>
                            </div>
                            
                            <div class="table-responsive">
                                <table class="assets-table">
                                    <thead>
                                        <tr>
                                            <th>Item</th>
                                            <th>Vendor</th>
                                            <th style="text-align:center;">Quantity</th>
                                            <th style="text-align:center;">Unit</th>
                                            <th style="text-align:center;">Last Log</th>
                                        </tr>
                                    </thead>
                                    <tbody id="stockTableBody">
                                        <tr><td colspan="5" style="text-align:center; padding:3rem; color:var(--text-muted); font-size:0.9rem;">Select a project site to view inventory levels.</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </section>
                    </div>
                </div>

                <!-- INDUCTION MODAL -->
                <div id="inductionModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; backdrop-filter: blur(5px);">
                    <div class="card" style="width:450px; padding:2.5rem; border-radius:24px; background:white; position:relative;">
                        <button onclick="hideInductionModal()" style="position:absolute; top:1.5rem; right:1.5rem; background:none; border:none; color:#94a3b8; font-size:1.2rem; cursor:pointer;"><i class="fas fa-times"></i></button>
                        <h3 style="margin-bottom:1.5rem; font-weight:700; font-size:1.25rem; color:var(--text-main); border-bottom:1px solid #f1f5f9; padding-bottom:1rem;">Material Induction</h3>
                        <form id="addStockForm" class="standard-form">
                            <div class="form-group" style="margin-bottom:1.25rem;">
                                <label style="font-weight:600; margin-bottom:0.5rem; display:block; font-size:0.85rem; color:#64748b;">Item Name</label>
                                <input type="text" name="itemName" required placeholder="Cement, Steel, etc." style="width:100%; height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; font-weight:600; font-size:0.95rem; background:#f8fafc;">
                            </div>
                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem; margin-bottom:1.25rem;">
                                <div class="form-group">
                                    <label style="font-weight:600; margin-bottom:0.5rem; display:block; font-size:0.85rem; color:#64748b;">Qty</label>
                                    <input type="number" step="0.01" name="quantity" required value="1" style="width:100%; height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; font-weight:700; font-size:0.95rem; background:#f8fafc;">
                                </div>
                                <div class="form-group">
                                    <label style="font-weight:600; margin-bottom:0.5rem; display:block; font-size:0.85rem; color:#64748b;">Unit</label>
                                    <select name="unit" required style="width:100%; height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; background:white; font-weight:700; font-size:0.9rem; cursor:pointer;">
                                        <option value="BAGS">BAGS</option>
                                        <option value="TONS">TONS</option>
                                        <option value="CFT">CFT</option>
                                        <option value="NOS">NOS</option>
                                        <option value="LTRS">LTRS</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group" style="margin-bottom:1.25rem;">
                                <label style="font-weight:600; margin-bottom:0.5rem; display:block; font-size:0.85rem; color:#64748b;">Vendor / Supplier</label>
                                <input type="text" name="vendor" placeholder="Supplier name" style="width:100%; height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; font-weight:600; font-size:0.95rem; background:#f8fafc;">
                            </div>
                            <div class="form-group" style="margin-bottom:2rem;">
                                <label style="font-weight:600; margin-bottom:0.5rem; display:block; font-size:0.85rem; color:#64748b;">Assign to Work Module (Optional)</label>
                                <select name="workOrderId" id="modalWorkOrder" style="width:100%; height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; background:white; font-weight:600; font-size:0.9rem; cursor:pointer;">
                                    <option value="">-- General Site Stock --</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-primary" style="width:100%; height:45px; border-radius:10px; font-weight:700; font-size:0.9rem; background:var(--primary); border:none; color:white; cursor:pointer;">AUTHORIZE INDUCTION</button>
                        </form>
                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <script>
        let selectedSite = null;
        let currentUser = null;
        let allSites = [];
        let allStocks = [];

        async function initialize() {
            try {
                const authRes = await fetch('/api/auth/me');
                if (!authRes.ok) { window.location.href = '/login.html'; return; }
                currentUser = await authRes.json();
                
                const siteRes = await fetch('/api/sites/all');
                const rawSites = await siteRes.json();
                
                if (currentUser.userRole === 'SITE_MANAGER') {
                    const managedNames = currentUser.assignedSiteNames || [];
                    allSites = rawSites.filter(s => managedNames.includes(s.name));
                    if (allSites.length === 1) {
                        const s = allSites[0];
                        selectSite(s.id, s.name, s.location);
                    }
                } else {
                    allSites = rawSites;
                }
            } catch (err) { console.error('Initialization failed', err); }
        }

        async function findSite() {
            const query = document.getElementById('siteSearchInput').value.trim().toLowerCase();
            if (!query) return;
            const results = document.getElementById('siteSearchResults');
            results.innerHTML = '<div style="color:var(--text-muted); padding:1rem;"><i class="fas fa-spinner fa-spin"></i> Filtering authorized sites...</div>';
            const filtered = allSites.filter(s => s.name.toLowerCase().includes(query) || s.location.toLowerCase().includes(query));
            results.innerHTML = filtered.map(s => `
                <div onclick="selectSite(${s.id}, '${s.name}', '${s.location}')" class="search-result-row"
                    style="padding:1.25rem; border:1px solid #e2e8f0; border-radius:16px; cursor:pointer; background:white; text-align:left; transition:0.2s; margin-bottom:0.8rem;">
                    <h4 style="margin:0; color:#1e293b; font-weight:800;">${s.name}</h4>
                    <small style="color:#64748b; font-weight:600;">${s.location}</small>
                </div>
            `).join('');
            if (!filtered.length) results.innerHTML = '<p style="color:#ef4444; padding:1rem;">No matching authorized sites found.</p>';
        }

        function selectSite(id, name, loc) {
            selectedSite = { id, name, loc };
            document.getElementById('siteSearchPhase').style.display = 'none';
            document.getElementById('inventoryUI').style.display = 'block';
            document.getElementById('activeSiteName').innerText = name;
            document.getElementById('activeSiteLoc').innerText = loc;
            loadStock();
        }

        async function loadStock() {
            const tbody = document.getElementById('stockTableBody');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:3rem;"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';
            try {
                const res = await fetch(`/api/stocks/site/${selectedSite.id}`);
                allStocks = await res.json();
                renderStockTable(allStocks);
            } catch (err) { alert('Material sync failed.'); }
        }

        function filterStock() {
            const query = document.getElementById('stockSearch').value.toLowerCase();
            const filtered = allStocks.filter(st => 
                (st.itemName && st.itemName.toLowerCase().includes(query)) ||
                (st.vendor && st.vendor.toLowerCase().includes(query))
            );
            renderStockTable(filtered);
        }

        function renderStockTable(stocks) {
            const tbody = document.getElementById('stockTableBody');
            if (!stocks.length) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:3rem; color:#94a3b8;">No materials found.</td></tr>';
                return;
            }
            tbody.innerHTML = stocks.map(st => `
                <tr>
                    <td style="font-weight:700; color:#1e293b;">${st.itemName}</td>
                    <td style="color:#64748b; font-weight:600;">${st.vendor || '--'}</td>
                    <td style="text-align:center;">
                        <div class="qty-control">
                            <button onclick="adjustStatus(${st.id}, -1)" class="btn-icon" style="color:#ef4444; background:#fef2f2; width:28px; height:28px; border-radius:8px; border:none; cursor:pointer;"><i class="fas fa-minus"></i></button>
                            <span style="font-size:1.1rem; font-weight:900; min-width:60px; text-align:center;">${st.quantity}</span>
                            <button onclick="adjustStatus(${st.id}, 1)" class="btn-icon" style="color:#10b981; background:#f0fdf4; width:28px; height:28px; border-radius:8px; border:none; cursor:pointer;"><i class="fas fa-plus"></i></button>
                        </div>
                    </td>
                    <td style="text-align:center;"><span class="status-badge" style="background:#f1f5f9; padding:0.3rem 0.6rem; border-radius:6px; font-weight:700;">${st.unit}</span></td>
                    <td style="text-align:center; font-size:0.75rem; color:#94a3b8;">${new Date(st.lastRestockedAt).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }

        async function adjustStatus(id, delta) {
            try {
                const res = await fetch(`/api/stocks/${id}/adjust?delta=${delta}`, { method: 'POST' });
                if (res.ok) loadStock();
            } catch (err) { alert('Update failed.'); }
        }

        async function showInductionModal() { 
            document.getElementById('inductionModal').style.display = 'flex'; 
            const select = document.getElementById('modalWorkOrder');
            select.innerHTML = '<option value="">-- General Site Stock --</option>';
            try {
                const res = await fetch(`/api/work-orders/by-site/${selectedSite.id}`);
                const modules = await res.json();
                if(modules.length > 0) {
                    select.innerHTML += modules.map(m => `<option value="${m.id}">${m.title} (${m.category})</option>`).join('');
                }
            } catch (e) { console.error('Failed to load modules for modal'); }
        }
        function hideInductionModal() { document.getElementById('inductionModal').style.display = 'none'; }

        document.getElementById('addStockForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            // Extract workOrderId if present
            const workOrderId = data.workOrderId;
            delete data.workOrderId;
            
            try {
                const res = await fetch(`/api/stocks/add/${selectedSite.id}${workOrderId ? '?workOrderId=' + workOrderId : ''}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) { e.target.reset(); hideInductionModal(); loadStock(); }
                else { alert('Unauthorized.'); }
            } catch (err) { alert('Failed.'); }
        });

        function exportToCSV() {
            if (!allStocks.length) return;
            const headers = ["Item", "Vendor", "Quantity", "Unit", "Last_Log"];
            const csvRows = [headers.join(",")];
            allStocks.forEach(st => {
                csvRows.push([`"${st.itemName}"`, `"${st.vendor || ''}"`, st.quantity, `"${st.unit}"`, `"${new Date(st.lastRestockedAt).toLocaleDateString()}"`].join(","));
            });
            const blob = new Blob([csvRows.join("\n")], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Stock_Report_${selectedSite.name}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        window.onload = initialize;
    </script>
</body>
</html>
