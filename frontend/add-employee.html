<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Employee | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="/public/js/layout-loader.js" defer></script>
    <style>
        .search-box-large { display: flex; gap: 1rem; max-width: 600px; margin: 0 auto; }
        .search-box-large .form-control { height: 50px; font-size: 1.1rem; padding: 0 1.5rem; border-radius: 12px; border: 2px solid var(--border-color); }
        .verification-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    </style>
</head>

<body class="loading" data-page="employees">
    <div class="app-container">
        <!-- Sidebar container -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar container -->
            <div id="topbar-container"></div>

            <div class="dashboard-scrollable">
                <section class="welcome-section" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
                    <div>
                        <h1><i class="fas fa-user-plus" style="margin-right: 0.75rem; color: var(--primary);"></i>Enroll New User</h1>
                        <p>Initialize a new identity within the AssetNexus global directory.</p>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <input type="file" id="bulkUploadInput" accept=".xlsx" style="display: none;" onchange="handleBulkUpload(event)">
                        <button class="btn btn-secondary" onclick="document.getElementById('bulkUploadInput').click()" style="display: flex; align-items: center; gap: 0.75rem; background: rgba(99,102,241,0.05); color: var(--primary); border: 1.5px dashed var(--primary);">
                            <i class="fas fa-file-excel"></i> Bulk Ledger Import
                        </button>
                    </div>
                </section>

                <section class="card glass form-card" id="addEmployeeCard">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; padding: 2rem 2.5rem; border-bottom: 1px solid rgba(0,0,0,0.05);">
                        <h2 style="margin:0;"><i class="fas fa-id-card" style="margin-right: 0.5rem; color: var(--primary);"></i> Identity Configuration</h2>
                        <span class="section-tag" id="roleVisualTag" style="margin-bottom: 0;">OFFICE PERSONNEL</span>
                    </div>
                    <form id="addEmployeeForm" style="padding: 2.5rem;">
                        <div class="form-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem;">
                            <!-- Identity Group -->
                            <div class="form-group">
                                <label for="name" class="field-label">Legal Full Name</label>
                                <input type="text" id="name" name="name" class="form-control" placeholder="Johnathan Doe" required>
                            </div>
                            <div class="form-group">
                                <label for="email" class="field-label">Official Email ID</label>
                                <input type="email" id="email" name="email" class="form-control" placeholder="john.doe@enterprise.com" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="phone" class="field-label">Primary Contact</label>
                                <input type="tel" id="phone" name="phone" class="form-control" placeholder="+91 00000 00000" pattern="[0-9]{10}" required>
                            </div>
                            <div class="form-group">
                                <label for="role" class="field-label">Functional Designation</label>
                                <input type="text" id="role" name="role" class="form-control" placeholder="e.g. Senior Logistics Officer" required>
                            </div>

                            <div class="form-section-divider" style="grid-column: span 2; height: 1px; background: #f1f5f9; margin: 1rem 0;"></div>

                            <!-- Access Group -->
                            <div class="form-group">
                                <label for="userRole" class="field-label">System Access Tier</label>
                                <select id="userRole" name="userRole" class="form-control" style="background: white;" required>
                                    <option value="EMPLOYEE">Standard Professional (Employee)</option>
                                    <option value="ADMIN">Command Center (Admin)</option>
                                    <option value="SITE_MANAGER">Field Commander (Site Manager)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="companyName" class="field-label">Company / Authority</label>
                                <input type="text" id="companyName" name="companyName" class="form-control" placeholder="Institutional Name" required>
                            </div>

                            <div class="form-group">
                                <label for="branch" class="field-label">Regional Branch</label>
                                <select id="branch" name="branch.id" class="form-control" style="background: white;" required>
                                    <option value="">Select Operational Hub...</option>
                                    <!-- Populated via JS -->
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="department" class="field-label">Department</label>
                                <input type="text" id="department" name="department" class="form-control" placeholder="e.g. Finance & Accounts" required>
                            </div>

                            <div class="form-section-divider" style="grid-column: span 2; height: 1px; background: #f1f5f9; margin: 1rem 0;"></div>

                            <div class="form-group" id="passwordGroup">
                                <label for="password" class="field-label">Security Credentials</label>
                                <div class="password-box-group" style="position: relative;">
                                    <input type="password" id="password" name="password" class="form-control" placeholder="Min 4 characters" minlength="4">
                                    <div class="password-toggle-global" id="togglePassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8;"><i class="fas fa-eye"></i></div>
                                </div>
                            </div>
                            
                            <div class="form-group" style="display:flex; align-items:center; gap:0.75rem; padding-top:1.5rem;">
                                <input type="checkbox" id="sendInvite" style="width:20px; height:20px; cursor:pointer;">
                                <label for="sendInvite" style="font-size: 0.85rem; font-weight: 500; cursor:pointer;">Dispatch Email Invitation for Credential Setup</label>
                            </div>

                            <div class="form-group" style="grid-column: span 2;">
                                <label for="employeeImage" class="field-label">Visual Identity (Avatar)</label>
                                <input type="file" id="employeeImage" class="form-control" accept="image/*" style="padding: 0.5rem; height: auto; border: 1.5px dashed #cbd5e1; background: #f8fafc;">
                            </div>

                            <div class="form-section-divider" style="grid-column: span 2; height: 1px; background: #f1f5f9; margin: 1rem 0;"></div>

                            <!-- KYC Section -->
                            <div style="grid-column: span 2;">
                                <h3 style="font-size: 1rem; margin-bottom: 1.5rem; color: var(--primary); display: flex; align-items: center; gap: 0.5rem;">
                                    <i class="fas fa-file-shield"></i> KYC Verification Documents
                                </h3>
                                <div class="form-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;">
                                    <div class="form-group">
                                        <label for="documentType" class="field-label">Document Type</label>
                                        <select id="documentType" name="documentType" class="form-control" style="background: white;">
                                            <option value="">Select Document...</option>
                                            <option value="AADHAR">Aadhar Card</option>
                                            <option value="PAN">PAN Card</option>
                                            <option value="VOTER_ID">Voter ID</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="documentNumber" class="field-label">Document Number</label>
                                        <input type="text" id="documentNumber" name="documentNumber" class="form-control" placeholder="Unique Identification No.">
                                    </div>
                                    <div class="form-group">
                                        <label for="documentFile" class="field-label">Upload Scan (Max 10MB)</label>
                                        <input type="file" id="documentFile" class="form-control" style="padding: 0.5rem; height: auto;">
                                    </div>
                                </div>
                            </div>

                            <div class="form-section-divider" style="grid-column: span 2; height: 1px; background: #f1f5f9; margin: 1rem 0;"></div>

                            <!-- Tenure Section -->
                            <div style="grid-column: span 2;">
                                <h3 style="font-size: 1rem; margin-bottom: 1.5rem; color: var(--primary); display: flex; align-items: center; gap: 0.5rem;">
                                    <i class="fas fa-clock-rotate-left"></i> Tenure & Contract Management
                                </h3>
                                <div class="form-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;">
                                    <div class="form-group">
                                        <label for="employmentType" class="field-label">Employment Type</label>
                                        <select id="employmentType" name="employmentType" class="form-control" onchange="toggleTenureDates()" style="background: white;">
                                            <option value="PERMANENT">Permanent Staff</option>
                                            <option value="TEMPORARY">Temporary / Contract</option>
                                        </select>
                                    </div>
                                    <div class="form-group tenure-date-group" style="display: none;">
                                        <label for="contractStartDate" class="field-label">Contract Start Date</label>
                                        <input type="date" id="contractStartDate" name="contractStartDate" class="form-control">
                                    </div>
                                    <div class="form-group tenure-date-group" style="display: none;">
                                        <label for="contractEndDate" class="field-label">Contract Expiry Date</label>
                                        <input type="date" id="contractEndDate" name="contractEndDate" class="form-control">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="form-actions" style="margin-top: 3rem; display: flex; justify-content: flex-end; gap: 1rem; border-top: 1px solid #f1f5f9; padding-top: 2rem;">
                            <button type="button" class="btn btn-secondary" onclick="window.location.href='/employees.html'" style="padding: 0.8rem 2.5rem;">Cancel</button>
                            <button type="submit" class="btn btn-primary" style="padding: 0.8rem 4rem; font-weight: 700;">Complete Registration <i class="fas fa-arrow-right" style="margin-left:0.5rem;"></i></button>
                        </div>
                    </form>
                </section>
                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8085/api';

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch(`${API_BASE}/auth/me`);
                const user = await res.json();
                if (user.userRole !== 'ADMIN') { window.location.href = '/index.html'; }
                
                // Prefill Company
                const compRes = await fetch(`${API_BASE}/employees/company`);
                if (compRes.ok) {
                    const data = await compRes.json();
                    if (data.companyName) document.getElementById('companyName').value = data.companyName;
                }

                // Populate Branches
                const branchRes = await fetch(`${API_BASE}/branches`);
                const branches = await branchRes.json();
                const branchSelect = document.getElementById('branch');
                branches.forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b.id; opt.textContent = b.name;
                    branchSelect.appendChild(opt);
                });
            } catch (err) { window.location.href = '/login.html'; }
        });

        async function handleBulkUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                Toastify({ text: "Processing heavy ledger file... Please wait.", backgroundColor: "#6366f1" }).showToast();
                const res = await fetch(`${API_BASE}/employees/bulk-import`, {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    const result = await res.json();
                    Toastify({ 
                        text: `Bulk Import Complete: ${result.importedCount} users added, ${result.skippedCount} duplicates skipped.`, 
                        backgroundColor: "#10b981",
                        duration: 5000
                    }).showToast();
                    setTimeout(() => window.location.href = '/employees.html', 3000);
                } else {
                    const err = await res.json();
                    Toastify({ text: "Import Failed: " + (err.message || 'Check file format'), backgroundColor: "#ef4444" }).showToast();
                }
            } catch (err) {
                Toastify({ text: "Synchronization Error", backgroundColor: "#ef4444" }).showToast();
            }
        }

        // Handle Invite Checkbox visibility
        document.getElementById('sendInvite').addEventListener('change', (e) => {
            const passGrp = document.getElementById('passwordGroup');
            const passInput = document.getElementById('password');
            if (e.target.checked) {
                passGrp.style.opacity = '0.5';
                passInput.disabled = true;
                passInput.required = false;
            } else {
                passGrp.style.opacity = '1';
                passInput.disabled = false;
                passInput.required = true;
            }
        });

        function toggleTenureDates() {
            const type = document.getElementById('employmentType').value;
            const groups = document.querySelectorAll('.tenure-date-group');
            groups.forEach(g => {
                g.style.display = (type === 'TEMPORARY') ? 'block' : 'none';
            });
        }

        document.getElementById('addEmployeeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const inviteChecked = document.getElementById('sendInvite').checked;
            const submitBtn = form.querySelector('.btn-primary');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Initializing...';

            const payload = Object.fromEntries(new FormData(form).entries());
            const imageFile = document.getElementById('employeeImage').files[0];
            if (imageFile) {
                const reader = new FileReader();
                const base64Promise = new Promise(resolve => {
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(imageFile);
                });
                payload.imageData = await base64Promise;
            }

            const docFile = document.getElementById('documentFile').files[0];
            if (docFile) {
                const reader = new FileReader();
                const base64DocPromise = new Promise(resolve => {
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(docFile);
                });
                payload.documentFile = await base64DocPromise;
            }

            try {
                const url = `${API_BASE}/employees${inviteChecked ? '?invite=true' : ''}`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    Toastify({ text: "Identity Synchronized with Master Ledger!", backgroundColor: "#10b981" }).showToast();
                    setTimeout(() => window.location.href = '/employees.html', 1500);
                } else {
                    const err = await res.json();
                    Toastify({ text: "Enrollment Denied: " + (err.message || "Unknown error"), backgroundColor: "#ef4444" }).showToast();
                }
            } catch (err) {
                Toastify({ text: "Network synchronization error", backgroundColor: "#ef4444" }).showToast();
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Complete Registration <i class="fas fa-arrow-right" style="margin-left:0.5rem;"></i>';
            }
        });

        // Password visibility toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passInput = document.getElementById('password');
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        // Role Color Dynamic Feedback
        document.getElementById('userRole').addEventListener('change', function() {
            const role = this.value;
            const card = document.getElementById('addEmployeeCard');
            const tag = document.getElementById('roleVisualTag');
            
            if (role === 'ADMIN') {
                tag.textContent = 'SYSTEM ADMINISTRATOR';
                tag.style.background = 'rgba(79, 70, 229, 0.1)';
                tag.style.color = 'var(--primary)';
                card.style.background = 'rgba(79, 70, 229, 0.03)';
                card.style.borderColor = 'rgba(79, 70, 229, 0.2)';
            } else if (role === 'SITE_MANAGER') {
                tag.textContent = 'FIELD COMMANDER';
                tag.style.background = 'rgba(245, 158, 11, 0.1)';
                tag.style.color = '#d97706';
                card.style.background = 'rgba(245, 158, 11, 0.03)';
                card.style.borderColor = 'rgba(245, 158, 11, 0.2)';
            } else {
                tag.textContent = 'OFFICE PERSONNEL';
                tag.style.background = 'rgba(16, 185, 129, 0.1)';
                tag.style.color = '#10b981';
                card.style.background = 'rgba(16, 185, 129, 0.03)';
                card.style.borderColor = 'rgba(16, 185, 129, 0.2)';
            }
        });
        
        // Initial feedback
        setTimeout(() => {
            document.getElementById('userRole').dispatchEvent(new Event('change'));
        }, 300);
    </script>
</body>
</html>
