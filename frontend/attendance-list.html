<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Registry | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/public/js/layout-loader.js" defer></script>
</head>

<body class="loading" data-page="site-management" data-module="labour">
    <div class="app-container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div id="topbar-container"></div>
            <div class="dashboard-scrollable">
                
                <section class="welcome-section" style="width: 100%; margin: 0 auto 1rem; padding-left: 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;">
                    <div style="display:flex; align-items:center; gap:1rem;">
                        <div style="width: 45px; height: 45px; background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                            <i class="fas fa-clipboard-user"></i>
                        </div>
                        <div>
                            <h1 style="margin:0; font-size: 1.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px;">Daily Attendance Registry</h1>
                            <p style="margin:0; font-size:0.9rem; color:var(--text-muted);">Verify and mark workforce presence for project site records.</p>
                        </div>
                    </div>
                    
                    <div style="display:flex; gap:0.75rem; align-items:center;">
                        <input type="date" id="attendanceDate" onchange="loadView()" style="height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; background:#f8fafc; font-weight:600; font-size:0.9rem;">
                        <select id="siteFilter" onchange="loadView()" style="height:45px; padding:0 1rem; border-radius:10px; border:1px solid #cbd5e1; font-weight:600; min-width:240px; background:white; font-size:0.9rem;">
                            <option value="">Select Project Site</option>
                        </select>
                    </div>
                </section>

                <!-- Quick Stats Dashboard -->
                <div class="stats-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; width: 100%; margin: 1rem auto;">
                    <div class="card" style="padding: 1rem; text-align: center; border-radius: 15px; border: 1px solid #e2e8f0; background:#f8fafc;">
                        <small style="color: #64748b; font-weight:700; text-transform:uppercase; letter-spacing:1px; font-size:0.7rem;">Active Workforce</small>
                        <h2 id="totalCount" style="margin:0.25rem 0 0; font-size:1.75rem; font-weight:800; color:var(--text-main);">0</h2>
                    </div>
                    <div class="card" style="padding: 1rem; text-align: center; border-radius: 15px; border: 1px solid #d1fae5; background:#ecfdf5;">
                        <small style="color: #10b981; font-weight:700; text-transform:uppercase; letter-spacing:1px; font-size:0.7rem;">Present</small>
                        <h2 id="presentCount" style="margin:0.25rem 0 0; font-size:1.75rem; font-weight:800; color: #10b981;">0</h2>
                    </div>
                    <div class="card" style="padding: 1rem; text-align: center; border-radius: 15px; border: 1px solid #fef3c7; background:#fffbeb;">
                        <small style="color: #b45309; font-weight:700; text-transform:uppercase; letter-spacing:1px; font-size:0.7rem;">Half Day</small>
                        <h2 id="halfDayCount" style="margin:0.25rem 0 0; font-size:1.75rem; font-weight:800; color: #b45309;">0</h2>
                    </div>
                    <div class="card" style="padding: 1rem; text-align: center; border-radius: 15px; border: 1px solid #fee2e2; background:#fef2f2;">
                        <small style="color: #ef4444; font-weight:700; text-transform:uppercase; letter-spacing:1px; font-size:0.7rem;">Absent</small>
                        <h2 id="absentCount" style="margin:0.25rem 0 0; font-size:1.75rem; font-weight:800; color: #ef4444;">0</h2>
                    </div>
                </div>

                <div class="card" style="width: 100%; margin: 1.5rem auto 0; border-radius: 20px; padding: 1.5rem; border: 1px solid #e2e8f0; background: #ffffff;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid #f1f5f9;">
                        <h3 style="margin:0; font-weight:700; font-size:1.1rem; color:#475569;">Registry Ledger</h3>
                        <div style="flex:1; max-width: 400px; position:relative; margin-left: 2rem;">
                            <input type="text" id="registrySearch" oninput="applyRegistrySearch()" placeholder="Search by personnel name or trade..." 
                                style="width:100%; height:42px; padding:0 1rem 0 2.8rem; border-radius:12px; border:1px solid #e2e8f0; background:#f8fafc; font-size:0.9rem; font-weight:500; outline:none; transition:0.3s;"
                                onfocus="this.style.border='1.5px solid var(--primary)'; this.style.background='#fff';"
                                onblur="this.style.border='1px solid #e2e8f0'; this.style.background='#f8fafc';">
                            <i class="fas fa-search" style="position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:#94a3b8; font-size:0.95rem;"></i>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="assets-table">
                            <thead>
                                <tr>
                                    <th>Personnel Detail</th>
                                    <th>Trade Category</th>
                                    <th>Marked Status</th>
                                    <th>Attendance Control</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceTable">
                                <tr><td colspan="4" style="text-align:center; padding:5rem; color:var(--text-muted);">Please select a project site to view assigned personnel.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <script>
        let allPersonnelForSite = [];
        let currentAttendanceRecords = [];
        
        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('attendanceDate').value = today;
            loadSites();
        };

        async function loadSites() {
            try {
                const res = await fetch('/api/sites/all');
                const sites = await res.json();
                const siteFilter = document.getElementById('siteFilter');
                let availableSites = sites;

                let checkUser = setInterval(() => {
                    if (window.userContext) {
                        clearInterval(checkUser);
                        const user = window.userContext;
                        if (user.userRole === 'SITE_MANAGER' && user.assignedSiteNames) {
                            availableSites = sites.filter(s => user.assignedSiteNames.includes(s.name));
                        }
                        siteFilter.innerHTML = '<option value="">Select Project Site</option>' + availableSites.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                        if (user.userRole === 'SITE_MANAGER' && user.assignedSiteNames?.length === 1) {
                            const mySite = availableSites.find(s => s.name === user.assignedSiteNames[0]);
                            if (mySite) { siteFilter.value = mySite.id; siteFilter.disabled = true; loadView(); }
                        }
                    }
                }, 100);
            } catch (err) { console.error('Site sync failed'); }
        }

        async function loadView() {
            const siteFilter = document.getElementById('siteFilter');
            const table = document.getElementById('attendanceTable');
            const dateInput = document.getElementById('attendanceDate');
            if (!dateInput.value) dateInput.value = new Date().toISOString().split('T')[0];
            const date = dateInput.value;
            const siteId = siteFilter.value;

            if (!siteId) {
                table.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:5rem; color:var(--text-muted);">Please select a project site to view assigned personnel.</td></tr>';
                return;
            }

            try {
                const siteName = siteFilter.options[siteFilter.selectedIndex].text;
                const [labRes, attRes] = await Promise.all([
                    fetch(`/api/labour/by-site?siteName=${encodeURIComponent(siteName)}`),
                    fetch(`/api/attendance/by-date?date=${date}`)
                ]);
                allPersonnelForSite = await labRes.json();
                currentAttendanceRecords = await attRes.json();

                const stats = { total: allPersonnelForSite.length, present: 0, half: 0, absent: 0 };
                allPersonnelForSite.forEach(lab => {
                    const record = currentAttendanceRecords.find(r => r.labourer.id === lab.id);
                    if (record?.status === 'PRESENT') stats.present++;
                    else if (record?.status === 'HALF_DAY') stats.half++;
                    else if (record?.status === 'ABSENT') stats.absent++;
                });

                document.getElementById('totalCount').innerText = stats.total;
                document.getElementById('presentCount').innerText = stats.present;
                document.getElementById('halfDayCount').innerText = stats.half;
                document.getElementById('absentCount').innerText = stats.absent;

                renderRegistryTable(allPersonnelForSite);
            } catch (err) { table.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red; padding:3rem;">Connection error.</td></tr>'; }
        }

        function applyRegistrySearch() {
            const query = document.getElementById('registrySearch').value.toLowerCase();
            const filtered = allPersonnelForSite.filter(lab => 
                (lab.name && lab.name.toLowerCase().includes(query)) ||
                (lab.personnelId && lab.personnelId.toLowerCase().includes(query)) ||
                (lab.trade && lab.trade.toLowerCase().includes(query))
            );
            renderRegistryTable(filtered);
        }

        function renderRegistryTable(personnelList) {
            const table = document.getElementById('attendanceTable');
            if (personnelList.length === 0) {
                table.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:5rem; color:var(--text-muted);">No matching personnel found.</td></tr>';
                return;
            }
            table.innerHTML = personnelList.map(lab => {
                const record = currentAttendanceRecords.find(r => r.labourer.id === lab.id);
                const status = record ? record.status : 'UNMARKED';
                let style = 'background:#f1f5f9; color:#64748b;';
                if (status === 'PRESENT') style = 'background:rgba(16,185,129,0.1); color:var(--green);';
                if (status === 'ABSENT') style = 'background:rgba(239,68,68,0.1); color:var(--red);';
                if (status === 'HALF_DAY') style = 'background:rgba(245,158,11,0.1); color:#b45309;';

                return `<tr>
                    <td><div style="display:flex; align-items:center; gap:0.75rem; text-align:left;"><img src="${lab.hasImage ? '/api/labour/' + lab.id + '/image' : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(lab.name) + '&background=6366f1&color=fff&size=32'}" style="width:32px; height:32px; border-radius:8px;"><div><strong class="a-title">${lab.name}</strong><br><small>${lab.personnelId}</small></div></div></td>
                    <td><span style="font-weight:600;">${lab.trade}</span></td>
                    <td><span id="status-${lab.id}" class="status-badge" style="${style}">${status}</span></td>
                    <td><div style="display:flex; gap:0.5rem; justify-content:center;"><button class="attendance-btn present" onclick="markStatus(${lab.id}, 'PRESENT')"><i class="fas fa-check"></i> Present</button><button class="attendance-btn half-day" onclick="markStatus(${lab.id}, 'HALF_DAY')">Half Day</button><button class="attendance-btn absent" onclick="markStatus(${lab.id}, 'ABSENT')"><i class="fas fa-times"></i> Absent</button></div></td>
                </tr>`;
            }).join('');
        }

        async function markStatus(labId, status) {
            const date = document.getElementById('attendanceDate').value;
            const siteId = document.getElementById('siteFilter').value;
            try {
                const res = await fetch(`/api/attendance/mark?labourerId=${labId}&date=${date}&status=${status}&siteId=${siteId}`, { method: 'POST' });
                if (res.ok) {
                    const badge = document.getElementById(`status-${labId}`);
                    badge.innerText = status;
                    badge.style.background = (status === 'PRESENT' ? 'rgba(16,185,129,0.1)' : (status === 'ABSENT' ? 'rgba(239,68,68,0.1)' : 'rgba(245,158,11,0.1)'));
                    badge.style.color = (status === 'HALF_DAY' ? '#b45309' : '');
                }
                await updateSummaryOnly();
            } catch (err) { alert('Failed to contact server.'); }
        }

        async function updateSummaryOnly() {
            const date = document.getElementById('attendanceDate').value;
            const siteName = document.getElementById('siteFilter').options[document.getElementById('siteFilter').selectedIndex].text;
            try {
                const [labRes, attRes] = await Promise.all([fetch(`/api/labour/by-site?siteName=${encodeURIComponent(siteName)}`), fetch(`/api/attendance/by-date?date=${date}`)]);
                const labs = await labRes.json(); const records = await attRes.json();
                const stats = { present: 0, half: 0, absent: 0 };
                labs.forEach(lab => {
                    const record = records.find(r => r.labourer.id === lab.id);
                    if (record?.status === 'PRESENT') stats.present++; else if (record?.status === 'HALF_DAY') stats.half++; else if (record?.status === 'ABSENT') stats.absent++;
                });
                document.getElementById('presentCount').innerText = stats.present; document.getElementById('halfDayCount').innerText = stats.half; document.getElementById('absentCount').innerText = stats.absent;
            } catch (e) { }
        }
    </script>
</body>
</html>
