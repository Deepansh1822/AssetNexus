<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Maintenance Request | AssetNexus</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/png" href="/images/AssetNexus.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script src="/public/js/layout-loader.js" defer></script>
    <style>
        .btn-switch:hover { border-color: var(--primary) !important; background-color: rgba(99, 102, 241, 0.05) !important; color: var(--primary) !important; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15); }
        .animate-slide-up { animation: slideUp 0.5s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .duration-badge { display: inline-flex; align-items: center; border-radius: 6px; font-weight: 600; }
    </style>
</head>

<body class="loading" data-page="maintenance">
    <div class="app-container">
        <!-- Sidebar -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <div id="topbar-container"></div>

            <div class="dashboard-scrollable">
                <section class="welcome-section" id="maintenanceWelcome">
                    <h1><i class="fas fa-clipboard-list" style="margin-right: 0.5rem; color: var(--primary);"></i>Create Maintenance Request</h1>
                    <p>Submit a new maintenance request for an asset</p>
                </section>

                <!-- Branch Selection Landing -->
                <section class="card glass branch-landing" id="branchLanding">
                    <div class="card-header" style="border-bottom: none; text-align: center; display: block; padding-top: 3rem;">
                        <div class="kpi-icon indigo" style="width: 80px; height: 80px; font-size: 2rem; margin: 0 auto 1.5rem;"><i class="fas fa-tools"></i></div>
                        <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Select Branch for Maintenance</h2>
                        <p style="color: var(--text-muted);">Identify the location to find local assets needing service.</p>
                    </div>
                    <div class="card-body" style="padding: 2rem 3rem 4rem; max-width: 600px; margin: 0 auto;">
                        <div class="form-group">
                            <label style="font-weight: 600; margin-bottom: 1rem; display: block; text-align: center;">Branch Selection</label>
                            <select id="initialBranchFilter" class="form-control" style="height: 55px; border-radius: 15px; font-size: 1.1rem; text-align-last: center; border: 2px solid var(--border); background: var(--card-bg); cursor: pointer; transition: all 0.3s ease;">
                                <option value="" disabled selected>-- Choose a Branch --</option>
                                <option value="ALL">All Branches (Global Inventory)</option>
                            </select>
                        </div>
                        <div style="margin-top: 2rem; text-align: center;">
                            <button class="btn-submit" onclick="revealForm()" style="width: 100%; height: 55px; border-radius: 15px; font-size: 1rem;">
                                <i class="fas fa-arrow-right"></i> Continue to Form
                            </button>
                        </div>
                    </div>
                </section>

                <div id="mainFormContent" style="display: none;">
                    <section class="card glass form-card" style="padding: 1.5rem;">
                        <div class="card-header">
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <div class="kpi-icon blue" style="width: 40px; height: 40px; font-size: 1rem;"><i class="fas fa-plus-circle"></i></div>
                                <h2 style="margin:0;">New Maintenance Request</h2>
                            </div>
                            <!-- Switch Branch Button -->
                            <div style="margin-left: auto; display: flex; align-items: center; gap: 0.75rem;">
                                <div class="duration-badge" style="background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); color: var(--primary); font-size: 0.75rem; padding: 0.2rem 0.6rem;">
                                    <i class="fas fa-building" style="margin-right: 4px;"></i>
                                    <span id="activeBranchName">Branch</span>
                                </div>
                                <button onclick="switchBranchMode()" class="btn-icon btn-switch" title="Change Branch" style="background: var(--card-bg); border: 1px solid var(--border); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; display:flex; align-items:center; justify-content:center;">
                                    <i class="fas fa-random" style="font-size: 0.7rem;"></i>
                                </button>
                            </div>
                        </div>
                        <div class="card-body">
                            <form id="maintenanceForm" class="asset-form">
                                <div class="form-grid">
                                    <div class="form-group full-width">
                                        <label for="assetSelect">Select Asset *</label>
                                        <select id="assetSelect" class="form-control" required>
                                            <option value="">-- Choose Asset --</option>
                                        </select>
                                    </div>

                                    <div class="form-group">
                                        <label for="priority">Priority *</label>
                                        <select id="priority" class="form-control" required>
                                            <option value="LOW">Low</option>
                                            <option value="MEDIUM" selected>Medium</option>
                                            <option value="HIGH">High</option>
                                            <option value="URGENT">Urgent</option>
                                        </select>
                                    </div>

                                    <div class="form-group">
                                        <label for="type">Type *</label>
                                        <select id="type" class="form-control" required>
                                            <option value="REPAIR" selected>Repair</option>
                                            <option value="UPGRADE">Upgrade</option>
                                            <option value="PREVENTIVE">Preventive</option>
                                            <option value="INSPECTION">Inspection</option>
                                        </select>
                                    </div>

                                    <div class="form-group full-width">
                                        <label for="assignedTechnician">Assigned Technician / Vendor</label>
                                        <input type="text" id="assignedTechnician" class="form-control" placeholder="e.g. John Doe, Dell Service Unit...">
                                    </div>
                                
                                    <div class="form-group full-width">
                                        <label for="issueDescription">Issue Description *</label>
                                        <textarea id="issueDescription" class="form-control" rows="5" placeholder="Describe the maintenance issue in detail..." required></textarea>
                                    </div>

                                    <div class="form-group full-width" id="adminNotesGroup" style="display: none;">
                                        <label for="adminNotes">Admin Notes (Optional)</label>
                                        <textarea id="adminNotes" class="form-control" rows="3" placeholder="Add any internal notes..."></textarea>
                                    </div>
                                </div>

                                <div class="form-actions" style="margin-top:2rem;">
                                    <button type="button" class="btn-secondary" onclick="window.history.back()">Cancel</button>
                                    <button type="submit" class="btn-submit">Create Request</button>
                                </div>
                            </form>
                        </div>
                    </section>

                    <!-- Asset Preview Card -->
                    <section id="assetPreview" class="card glass form-card" style="display: none; margin-top: 1.5rem; padding: 1.5rem;">
                        <div class="card-header">
                            <h3>Selected Asset Details</h3>
                        </div>
                        <div class="card-body">
                            <div class="asset-preview-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                                <div class="preview-item">
                                    <span class="label" style="font-weight: 600; color: var(--text-muted); display:block; margin-bottom: 0.25rem;">Asset Name:</span>
                                    <span id="previewName" style="font-weight: 600;">-</span>
                                </div>
                                <div class="preview-item">
                                    <span class="label" style="font-weight: 600; color: var(--text-muted); display:block; margin-bottom: 0.25rem;">Asset Tag:</span>
                                    <span id="previewTag" style="font-weight: 600;">-</span>
                                </div>
                                <div class="preview-item">
                                    <span class="label" style="font-weight: 600; color: var(--text-muted); display:block; margin-bottom: 0.25rem;">Category:</span>
                                    <span id="previewCategory" style="font-weight: 600;">-</span>
                                </div>
                                <div class="preview-item">
                                    <span class="label" style="font-weight: 600; color: var(--text-muted); display:block; margin-bottom: 0.25rem;">Status:</span>
                                    <span id="previewStatus">-</span>
                                </div>
                                <div class="preview-item">
                                    <span class="label" style="font-weight: 600; color: var(--text-muted); display:block; margin-bottom: 0.25rem;">Assigned To:</span>
                                    <span id="previewEmployee" style="font-weight: 600;">-</span>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
                <!-- Footer -->
                <div id="footer-container"></div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8085/api';
        let assets = [];
        let currentUser = null;

        function showToast(message, type = 'success') {
            Toastify({
                text: message,
                duration: 3000,
                close: true,
                gravity: "top",
                position: "right",
                backgroundColor: type === 'success' ? "#10b981" : "#ef4444",
                style: { borderRadius: "10px", padding: "12px 24px", fontSize: "14px", fontWeight: "600" }
            }).showToast();
        }

        function setBtnLoading(btn, isLoading, text = 'Processing...') {
            if (isLoading) {
                btn.dataset.originalText = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${text}`;
                btn.disabled = true;
            } else {
                btn.innerHTML = btn.dataset.originalText || btn.innerHTML;
                btn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCurrentUser();
            loadAssets();

            document.getElementById('assetSelect').addEventListener('change', showAssetPreview);
            document.getElementById('maintenanceForm').addEventListener('submit', handleSubmit);
        });

        async function loadCurrentUser() {
            try {
                const res = await fetch(`${API_BASE}/auth/me`);
                if (res.ok) {
                    currentUser = await res.json();
                    if (currentUser.userRole === 'ADMIN') {
                        document.getElementById('adminNotesGroup').style.display = 'block';
                    }
                } else {
                    console.error('Failed to authenticate');
                    showToast('Authentication error. Please log in again.', 'error');
                }
            } catch (err) {
                console.error('Error fetching user info', err);
            }
        }

        async function loadAssets() {
            try {
                const [assetsRes, requestsRes, branchRes] = await Promise.all([
                    fetch(`${API_BASE}/assets`),
                    fetch(`${API_BASE}/maintenance`),
                    fetch(`${API_BASE}/employees/branches`)
                ]);
                const data = await assetsRes.json();
                const requests = await requestsRes.json();
                const branches = await branchRes.json();
                
                // Active maintenance check
                const blockedAssetIds = new Set(
                    requests.filter(r => r.status === 'PENDING' || r.status === 'IN_PROGRESS').map(r => r.asset.id)
                );
                
                assets = data.filter(a => a.status !== 'DISPOSED' && !blockedAssetIds.has(a.id));
                populateBranchDropdown(branches, assets);
            } catch (err) {
                console.error('Error loading assets:', err);
            }
        }

        function populateBranchDropdown(systemBranches, data) {
            const initialSelect = document.getElementById('initialBranchFilter');
            const currentValue = initialSelect.value;
            
            initialSelect.innerHTML = `
                <option value="" disabled ${!currentValue ? 'selected' : ''}>-- Choose a Branch --</option>
                <option value="ALL" ${currentValue === 'ALL' ? 'selected' : ''}>All Branches (Global Inventory)</option>
            `;

            const assetBranches = data.map(a => a.employee ? a.employee.branchName : a.location).filter(b => b);
            const allBranches = [...new Set([...systemBranches, ...assetBranches])].filter(b => b).sort();
            
            allBranches.forEach(branch => {
                const opt = document.createElement('option');
                opt.value = branch;
                opt.textContent = branch;
                if (branch === currentValue) opt.selected = true;
                initialSelect.appendChild(opt);
            });
        }

        window.revealForm = function() {
            const selected = document.getElementById('initialBranchFilter').value;
            if (!selected) {
                showToast('Please select a branch first', 'error');
                return;
            }

            const select = document.getElementById('assetSelect');
            select.innerHTML = '<option value="">-- Choose Asset --</option>';
            
            const filteredAssets = selected === 'ALL' 
                ? assets 
                : assets.filter(a => (a.employee && a.employee.branchName === selected) || (!a.employee && a.location === selected));

            filteredAssets.forEach(asset => {
                const option = document.createElement('option');
                option.value = asset.id;
                option.textContent = `${asset.name} - #${asset.assetTag || 'N/A'}`;
                select.appendChild(option);
            });

            document.getElementById('activeBranchName').textContent = selected === 'ALL' ? 'All Branches' : selected;
            document.getElementById('branchLanding').style.display = 'none';
            document.getElementById('mainFormContent').style.display = 'block';
        };

        window.switchBranchMode = function() {
            document.getElementById('branchLanding').style.display = 'block';
            document.getElementById('mainFormContent').style.display = 'none';
            document.getElementById('initialBranchFilter').value = '';
            document.getElementById('assetSelect').value = '';
            document.getElementById('assetPreview').style.display = 'none';
        };

        function showAssetPreview() {
            const assetId = document.getElementById('assetSelect').value;
            if (!assetId) {
                document.getElementById('assetPreview').style.display = 'none';
                return;
            }

            const asset = assets.find(a => a.id == assetId);
            if (asset) {
                document.getElementById('previewName').textContent = asset.name;
                document.getElementById('previewTag').textContent = asset.assetTag || 'N/A';
                document.getElementById('previewCategory').textContent = asset.category ? asset.category.name : 'N/A';
                document.getElementById('previewStatus').innerHTML = `<span class="status-badge ${asset.status.toLowerCase().replace('_', '-')}">${asset.status}</span>`;
                document.getElementById('previewEmployee').textContent = asset.employee ? asset.employee.name : 'Unassigned';
                document.getElementById('assetPreview').style.display = 'block';
            }
        }

        function handleSubmit(e) {
            e.preventDefault();

            if (!currentUser) {
                showToast('Unable to identify current user. Please log in again.', 'error');
                return;
            }

            const assetId = document.getElementById('assetSelect').value;
            const priority = document.getElementById('priority').value;
            const type = document.getElementById('type').value;
            const issueDescription = document.getElementById('issueDescription').value;
            const adminNotesInput = document.getElementById('adminNotes');
            const adminNotes = adminNotesInput ? adminNotesInput.value : null;
            const assignedTechnician = document.getElementById('assignedTechnician').value;

            if(!assetId) {
                showToast('Please select an asset', 'error');
                return;
            }

            const submitBtn = e.target.querySelector('.btn-submit');
            setBtnLoading(submitBtn, true, 'Creating...');

            const requestData = {
                asset: { id: parseInt(assetId) },
                requestedBy: { id: currentUser.id },
                issueDescription: issueDescription,
                priority: priority,
                status: 'PENDING',
                maintenanceType: type,
                adminNotes: adminNotes || null,
                assignedTechnician: assignedTechnician || null,
                requestedByAdmin: currentUser.userRole === 'ADMIN'
            };

            fetch(`${API_BASE}/maintenance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            })
            .then(async res => {
                if (res.ok) {
                    showToast('Maintenance request created successfully!');
                    setTimeout(() => window.location.href = currentUser.userRole === 'ADMIN' ? '/maintenance-requests.html' : '/employee-dashboard.html', 1500); // or wherever the user should go
                } else {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.message || errData.error || 'Failed to create request');
                }
            })
            .catch(err => {
                console.error('Error:', err);
                showToast(err.message || 'Failed to create maintenance request.', 'error');
                setBtnLoading(submitBtn, false);
            });
        }
    </script>
</body>
</html>
